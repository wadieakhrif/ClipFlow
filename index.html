<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clipflow Pro</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&family=Cairo:wght@400;700&display=swap');

        :root {
            --primary: #6c63ff; --primary-hover: #5a52d6;
            --bg: #05060f; --card-bg: rgba(17, 19, 34, 0.8);
            --nav-bg: rgba(13, 15, 30, 0.9); --text: #ffffff;
            --text-muted: #94a3b8; --border: rgba(255, 255, 255, 0.1);
            --danger: #ff4757;
        }

        [data-theme="light"] {
            --bg: #f8fafc; --card-bg: rgba(255, 255, 255, 0.8);
            --nav-bg: rgba(255, 255, 255, 0.9); --text: #0f172a;
            --text-muted: #64748b; --border: rgba(0, 0, 0, 0.1);
        }

        body {
            margin: 0; font-family: 'Inter', sans-serif;
            background: var(--bg); color: var(--text);
            transition: 0.3s; line-height: 1.6; overflow-x: hidden;
        }
        body.rtl { direction: rtl; font-family: 'Cairo', sans-serif; }

        #bgCanvas { position: fixed; top: 0; left: 0; z-index: -1; pointer-events: none; }

        header {
            position: sticky; top: 0; z-index: 1000;
            background: var(--nav-bg); backdrop-filter: blur(12px);
            border-bottom: 1px solid var(--border); padding: 15px 30px;
            display: flex; align-items: center; justify-content: space-between;
        }

        /* Search Fix */
        .header-center { flex: 1; max-width: 650px; margin: 0 20px; display: flex; flex-direction: column; gap: 12px; }
        
        .search-bar { position: relative; width: 100%; display: flex; align-items: center; }
        .search-bar i { position: absolute; left: 15px; color: var(--text-muted); pointer-events: none; z-index: 5; }
        .search-bar input {
            width: 100%; background: var(--bg); border: 1px solid var(--border);
            padding: 12px 15px 12px 45px; border-radius: 12px; color: var(--text);
            outline: none; transition: 0.3s; box-sizing: border-box;
        }

        /* Horizontal Scroll Categories */
        .category-nav { 
            display: flex; gap: 10px; overflow-x: auto; padding-bottom: 5px; 
            scrollbar-width: none; -ms-overflow-style: none;
        }
        .category-nav::-webkit-scrollbar { display: none; }
        .cat-item {
            background: var(--card-bg); border: 1px solid var(--border); color: var(--text-muted);
            padding: 8px 16px; border-radius: 10px; font-size: 13px; cursor: pointer;
            display: flex; align-items: center; gap: 8px; transition: 0.2s; white-space: nowrap;
        }
        .cat-item:hover { border-color: var(--primary); color: var(--text); }
        .cat-item.active { background: var(--primary); color: white; border-color: var(--primary); }

        /* Card System & Vertical Fix */
        .grid {
            display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 25px; padding: 40px 30px; max-width: 1600px; margin: 0 auto;
        }

        .card {
            background: var(--card-bg); border-radius: 20px; border: 1px solid var(--border);
            overflow: hidden; position: relative; transition: 0.3s cubic-bezier(0.2, 1, 0.2, 1);
            backdrop-filter: blur(10px);
        }

        /* Vertical Scaling Fix: Half length/Narrower */
        .card.vertical { width: 220px; justify-self: center; }
        .card.vertical .card-thumb { aspect-ratio: 9/16; }
        .card.horizontal .card-thumb { aspect-ratio: 16/9; }

        .card-thumb { 
            width: 100%; background: #000; cursor: pointer; overflow: hidden; 
            display: flex; align-items: center; justify-content: center; position: relative; 
        }
        .card-thumb img { width: 100%; height: 100%; object-fit: cover; transition: 0.5s; }
        
        /* Play Indicator */
        .play-overlay {
            position: absolute; inset: 0; background: rgba(0,0,0,0.3);
            display: flex; align-items: center; justify-content: center;
            opacity: 0; transition: 0.3s;
        }
        .card-thumb:hover .play-overlay { opacity: 1; }
        .play-icon-circle {
            width: 50px; height: 50px; background: var(--primary); 
            border-radius: 50%; display: flex; align-items: center; justify-content: center;
            box-shadow: 0 0 20px rgba(108,99,255,0.6); color: white;
        }

        .card-body { padding: 15px; }
        .card-body h3 { margin: 5px 0; font-size: 16px; }

        /* Unified Buttons */
        .btn { display: inline-flex; align-items: center; gap: 8px; padding: 10px 20px; border-radius: 12px; border: none; font-weight: 700; cursor: pointer; transition: 0.2s; }
        .btn-primary { background: var(--primary); color: white; }
        .btn-ghost { background: transparent; color: var(--text); border: 1px solid var(--border); }

        /* Dropdown & Modals */
        .dropdown { 
            position: absolute; top: 55px; right: 10px; background: var(--nav-bg); 
            border: 1px solid var(--border); border-radius: 12px; display: none; 
            flex-direction: column; overflow: hidden; z-index: 100;
        }
        .dropdown.active { display: flex; animation: menuIn 0.2s ease-out; }
        @keyframes menuIn { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }
        .dropdown button { padding: 12px 20px; border: none; background: none; color: var(--text); text-align: left; cursor: pointer; font-size: 14px; display: flex; align-items: center; gap: 8px; }
        .dropdown button:hover { background: var(--primary); color: white; }

        /* In-App Player Modal */
        #videoPlayerOverlay {
            position: fixed; inset: 0; background: rgba(0,0,0,0.95);
            z-index: 3000; display: none; align-items: center; justify-content: center;
        }
        .player-container { width: 90%; max-width: 1000px; position: relative; }
        .close-player { position: absolute; top: -50px; right: 0; color: white; cursor: pointer; background: none; border: none; }

        .overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.8); display: none; align-items: center; justify-content: center; z-index: 2000; backdrop-filter: blur(10px); }
        .modal { background: var(--card-bg); width: 95%; max-width: 550px; border-radius: 25px; padding: 30px; border: 1px solid var(--border); max-height: 90vh; overflow-y: auto; }

        .video-preview-box { width: 100%; border-radius: 15px; background: #000; margin-bottom: 15px; overflow: hidden; display: none; }
        .video-preview-box video { width: 100%; max-height: 250px; }

        .check-item { background: var(--bg); border: 1px solid var(--border); padding: 10px; border-radius: 10px; display: flex; align-items: center; gap: 8px; cursor: pointer; font-size: 13px; }
        .check-item:has(input:checked) { border-color: var(--primary); background: rgba(108,99,255,0.1); }
        
        .logo-img { height: 32px; border-radius: 6px; }
    </style>
</head>
<body>

<canvas id="bgCanvas"></canvas>

<header>
    <div style="display:flex; align-items:center; gap:12px;">
        <img src="https://freeimage.host/i/qOZgrWx" alt="Clipflow" class="logo-img" onerror="this.src='https://via.placeholder.com/32?text=C'">
        <h1 style="font-size:22px; margin:0; letter-spacing:-1px; font-weight:800;">Clipflow</h1>
    </div>

    <div class="header-center">
        <div class="search-bar">
            <i data-lucide="search" size="18"></i>
            <input type="text" id="mainSearch" placeholder="Search your projects..." oninput="renderProjects()">
        </div>
        <div class="category-nav" id="catNav">
            <div class="cat-item active" onclick="setFilter('all')">All</div>
            <div class="cat-item" onclick="setFilter('youtube')">YouTube</div>
            <div class="cat-item" onclick="setFilter('shorts')">Shorts</div>
            <div class="cat-item" onclick="setFilter('tiktok')">TikTok</div>
            <div class="cat-item" onclick="setFilter('reels')">Instagram</div>
            <div class="cat-item" onclick="setFilter('facebook')">Facebook</div>
        </div>
    </div>

    <div style="display:flex; gap:10px;">
        <button class="btn btn-ghost" onclick="toggleLanguage()" id="langBtn">AR</button>
        <button class="btn btn-primary" onclick="openModal('add')"><i data-lucide="plus"></i> New Project</button>
    </div>
</header>

<main>
    <div id="projectsContainer" class="grid"></div>
    <div id="setupView" style="text-align:center; padding:100px 0;" class="hidden">
        <i data-lucide="folder-search" size="64" style="opacity:0.2; margin-bottom:20px;"></i>
        <h2 style="opacity:0.6">Connect workspace to begin</h2>
        <button class="btn btn-primary" onclick="initWorkspace()">Select Workspace Folder</button>
    </div>
</main>

<div id="videoPlayerOverlay" onclick="closePlayer()">
    <div class="player-container" onclick="event.stopPropagation()">
        <button class="close-player" onclick="closePlayer()"><i data-lucide="x" size="32"></i></button>
        <video id="mainPlayer" controls autoplay style="width:100%; border-radius:15px; box-shadow: 0 0 50px rgba(0,0,0,0.8);"></video>
    </div>
</div>

<div class="overlay" id="formModal">
    <div class="modal">
        <h2 id="modalTitle" style="margin-top:0">New Project</h2>
        
        <div id="videoPreviewBox" class="video-preview-box">
            <video id="newVideoPreview" controls></video>
        </div>

        <div id="videoUploadBox" style="margin-bottom:20px;">
            <div onclick="triggerVideo()" style="border:2px dashed var(--primary); padding:30px; text-align:center; border-radius:15px; cursor:pointer;">
                <i data-lucide="video" size="24"></i><br>
                <span id="videoLabelText">Upload Video</span>
            </div>
        </div>

        <div style="display:grid; grid-template-columns: repeat(3, 1fr); gap:10px; margin-bottom:20px;">
            <div class="thumb-slot" onclick="pickThumb(0)">
                <button class="remove-thumb-btn" id="rm0" onclick="removeThumb(event, 0)" style="display:none; position:absolute; top:2px; right:2px; background:var(--danger); border:none; color:white; border-radius:50%; cursor:pointer;">×</button>
                <img id="pre0" style="width:100%; height:100%; object-fit:cover; display:none"><i data-lucide="image"></i>
            </div>
            <div class="thumb-slot" onclick="pickThumb(1)">
                <button class="remove-thumb-btn" id="rm1" onclick="removeThumb(event, 1)" style="display:none; position:absolute; top:2px; right:2px; background:var(--danger); border:none; color:white; border-radius:50%; cursor:pointer;">×</button>
                <img id="pre1" style="width:100%; height:100%; object-fit:cover; display:none"><i data-lucide="image"></i>
            </div>
            <div class="thumb-slot" onclick="pickThumb(2)">
                <button class="remove-thumb-btn" id="rm2" onclick="removeThumb(event, 2)" style="display:none; position:absolute; top:2px; right:2px; background:var(--danger); border:none; color:white; border-radius:50%; cursor:pointer;">×</button>
                <img id="pre2" style="width:100%; height:100%; object-fit:cover; display:none"><i data-lucide="image"></i>
            </div>
        </div>

        <input type="date" id="projDate" style="width:100%; padding:12px; background:var(--bg); border:1px solid var(--border); border-radius:10px; color:var(--text); margin-bottom:10px;">
        <input type="text" id="projTitle" placeholder="Title" style="width:100%; padding:12px; background:var(--bg); border:1px solid var(--border); border-radius:10px; color:var(--text); margin-bottom:15px; box-sizing:border-box;">
        
        <div class="checkbox-group" style="display:grid; grid-template-columns: 1fr 1fr; gap:10px; margin-bottom:20px;">
            <label class="check-item"><input type="checkbox" value="youtube"> YouTube</label>
            <label class="check-item"><input type="checkbox" value="shorts"> Shorts</label>
            <label class="check-item"><input type="checkbox" value="tiktok"> TikTok</label>
            <label class="check-item"><input type="checkbox" value="reels"> Instagram</label>
            <label class="check-item"><input type="checkbox" value="facebook"> Facebook</label>
        </div>

        <div style="display:flex; gap:10px;">
            <button class="btn btn-ghost" style="flex:1" onclick="closeModal()">Cancel</button>
            <button class="btn btn-primary" style="flex:2" onclick="saveData()">Save Project</button>
        </div>
    </div>
</div>

<script>
    let workspace = null;
    let projects = [];
    let selectedVideo = null;
    let tempThumbs = [null, null, null];
    let editMode = false;
    let currentEditName = null;
    let currentFilter = 'all';

    const PLATFORM_ICONS = {
        youtube: 'youtube', shorts: 'play', tiktok: 'music', reels: 'instagram', facebook: 'facebook'
    };

    // Auto-connect workspace
    async function autoConnect() {
        const db = await new Promise(r => {
            const req = indexedDB.open("ClipflowDB", 1);
            req.onupgradeneeded = () => req.result.createObjectStore("settings");
            req.onsuccess = () => r(req.result);
        });
        const req = db.transaction("settings").objectStore("settings").get("folderHandle");
        req.onsuccess = async () => {
            if (req.result && (await req.result.queryPermission({mode: 'readwrite'})) === 'granted') {
                workspace = req.result;
                document.getElementById('setupView').classList.add('hidden');
                loadProjects();
            } else {
                document.getElementById('setupView').classList.remove('hidden');
            }
        };
    }

    async function initWorkspace() {
        workspace = await window.showDirectoryPicker({ mode: 'readwrite' });
        const db = await new Promise(r => {
            const req = indexedDB.open("ClipflowDB", 1);
            req.onsuccess = () => r(req.result);
        });
        db.transaction("settings", "readwrite").objectStore("settings").put(workspace, "folderHandle");
        document.getElementById('setupView').classList.add('hidden');
        loadProjects();
    }

    async function loadProjects() {
        projects = [];
        const root = await workspace.getDirectoryHandle('Clipflow_Projects', { create: true });
        for await (const [name, handle] of root.entries()) {
            if(handle.kind === 'directory') {
                const mFile = await (await handle.getFileHandle('meta.json')).getFile();
                const meta = JSON.parse(await mFile.text());
                const vFile = await handle.getFileHandle('video.mp4');
                projects.push({ name, meta, videoFile: vFile });
            }
        }
        renderProjects();
    }

    function setFilter(cat) {
        currentFilter = cat;
        document.querySelectorAll('.cat-item').forEach(el => el.classList.remove('active'));
        event.currentTarget.classList.add('active');
        renderProjects();
    }

    function renderProjects() {
        const container = document.getElementById('projectsContainer');
        const q = document.getElementById('mainSearch').value.toLowerCase();
        container.innerHTML = '';

        // Newest First
        const sorted = projects.sort((a,b) => new Date(b.meta.date) - new Date(a.meta.date));

        sorted.forEach((p, idx) => {
            if(!p.meta.title.toLowerCase().includes(q)) return;
            if(currentFilter !== 'all' && !p.meta.platforms.includes(currentFilter)) return;

            const isShort = p.meta.platforms.some(x => ['shorts','reels','tiktok','facebook'].includes(x));
            const div = document.createElement('div');
            div.className = `card ${isShort ? 'vertical' : 'horizontal'}`;
            div.innerHTML = `
                <div class="dots-btn" onclick="toggleMenu(event, ${idx})"><i data-lucide="more-horizontal" size="18"></i></div>
                <div class="dropdown" id="menu-${idx}">
                    <button onclick="openModal('edit', ${idx})"><i data-lucide="edit-3" size="14"></i> Edit</button>
                    <button onclick="deleteProject(${idx})" style="color:var(--danger)"><i data-lucide="trash-2" size="14"></i> Delete</button>
                </div>
                <div class="card-thumb" onclick="playInApp(${idx})">
                    <img src="${p.meta.thumbs[0] || ''}">
                    <div class="play-overlay"><div class="play-icon-circle"><i data-lucide="play" fill="white"></i></div></div>
                </div>
                <div class="card-body">
                    <span style="font-size:10px; opacity:0.6;"><i data-lucide="calendar" size="10"></i> ${p.meta.date}</span>
                    <h3>${p.meta.title}</h3>
                    <div style="display:flex; gap:6px; margin-top:5px;">
                        ${p.meta.platforms.map(t => `<i data-lucide="${PLATFORM_ICONS[t]}" size="14" color="var(--primary)"></i>`).join('')}
                    </div>
                </div>
            `;
            container.appendChild(div);
        });
        lucide.createIcons();
    }

    // Capture first frame if no thumbnail is provided
    async function getFirstFrame(videoFile) {
        return new Promise((resolve) => {
            const video = document.createElement('video');
            video.preload = 'metadata';
            video.src = URL.createObjectURL(videoFile);
            video.onloadeddata = () => {
                video.currentTime = 0.1; // Seek slightly in
            };
            video.onseeked = () => {
                const canvas = document.createElement('canvas');
                canvas.width = video.videoWidth;
                canvas.height = video.videoHeight;
                canvas.getContext('2d').drawImage(video, 0, 0);
                resolve(canvas.toDataURL('image/jpeg', 0.8));
                URL.revokeObjectURL(video.src);
            };
        });
    }

    function triggerVideo() {
        const input = document.createElement('input');
        input.type = 'file'; input.accept = 'video/mp4';
        input.onchange = e => {
            selectedVideo = e.target.files[0];
            const url = URL.createObjectURL(selectedVideo);
            const previewBox = document.getElementById('videoPreviewBox');
            const previewVid = document.getElementById('newVideoPreview');
            previewVid.src = url;
            previewBox.style.display = 'block';
            document.getElementById('videoUploadBox').style.display = 'none';
        };
        input.click();
    }

    async function saveData() {
        const title = document.getElementById('projTitle').value;
        const date = document.getElementById('projDate').value;
        const plats = Array.from(document.querySelectorAll('.check-item input:checked')).map(i => i.value);
        if(!title || (!selectedVideo && !editMode)) return alert("Required fields missing");

        // Auto-thumbnail logic
        if(!tempThumbs[0] && selectedVideo) {
            tempThumbs[0] = await getFirstFrame(selectedVideo);
        }

        const root = await workspace.getDirectoryHandle('Clipflow_Projects', { create: true });
        const folderName = editMode ? currentEditName : title.replace(/\s+/g,'_') + "_" + Date.now();
        const pFolder = await root.getDirectoryHandle(folderName, { create: true });

        const writer = await (await pFolder.getFileHandle('meta.json', { create: true })).createWritable();
        await writer.write(JSON.stringify({ title, date, platforms: plats, thumbs: tempThumbs }));
        await writer.close();

        if(selectedVideo) {
            const vWriter = await (await pFolder.getFileHandle('video.mp4', { create: true })).createWritable();
            await vWriter.write(selectedVideo);
            await vWriter.close();
        }
        closeModal(); loadProjects();
    }

    function playInApp(idx) {
        const p = projects[idx];
        const player = document.getElementById('mainPlayer');
        p.videoFile.getFile().then(file => {
            player.src = URL.createObjectURL(file);
            document.getElementById('videoPlayerOverlay').style.display = 'flex';
        });
    }

    function closePlayer() {
        const player = document.getElementById('mainPlayer');
        player.pause();
        player.src = "";
        document.getElementById('videoPlayerOverlay').style.display = 'none';
    }

    function toggleMenu(e, idx) {
        e.stopPropagation();
        const m = document.getElementById(`menu-${idx}`);
        const active = m.classList.contains('active');
        document.querySelectorAll('.dropdown').forEach(d => d.classList.remove('active'));
        if(!active) m.classList.add('active');
    }

    window.onclick = () => document.querySelectorAll('.dropdown').forEach(d => d.classList.remove('active'));
    
    function closeModal() { 
        document.getElementById('formModal').style.display = 'none'; 
        document.getElementById('videoPreviewBox').style.display = 'none';
        document.getElementById('videoUploadBox').style.display = 'block';
        document.getElementById('newVideoPreview').src = "";
    }

    function openModal(mode, idx = null) {
        editMode = mode === 'edit';
        document.getElementById('modalTitle').innerText = editMode ? "Edit Project" : "New Project";
        if(!editMode) {
            document.getElementById('projTitle').value = "";
            document.getElementById('projDate').value = new Date().toISOString().split('T')[0];
            tempThumbs = [null, null, null];
            document.querySelectorAll('.check-item input').forEach(c => c.checked = false);
        }
        refreshThumbs();
        document.getElementById('formModal').style.display = 'flex';
    }

    function refreshThumbs() {
        tempThumbs.forEach((src, i) => {
            const img = document.getElementById(`pre${i}`);
            const rm = document.getElementById(`rm${i}`);
            if(src) { img.src = src; img.style.display = 'block'; rm.style.display = 'block'; }
            else { img.style.display = 'none'; rm.style.display = 'none'; }
        });
    }

    function pickThumb(i) {
        const input = document.createElement('input'); input.type = 'file'; input.accept = 'image/*';
        input.onchange = e => {
            const r = new FileReader();
            r.onload = f => { tempThumbs[i] = f.target.result; refreshThumbs(); };
            r.readAsDataURL(e.target.files[0]);
        };
        input.click();
    }

    function removeThumb(e, i) { e.stopPropagation(); tempThumbs[i] = null; refreshThumbs(); }

    async function deleteProject(idx) {
        if(confirm("Delete permanently?")) {
            const root = await workspace.getDirectoryHandle('Clipflow_Projects');
            await root.removeEntry(projects[idx].name, { recursive: true });
            loadProjects();
        }
    }

    // Canvas Background
    const canvas = document.getElementById('bgCanvas');
    const ctx = canvas.getContext('2d');
    let shapes = [];
    function initShapes() {
        canvas.width = window.innerWidth; canvas.height = window.innerHeight;
        shapes = Array.from({length: 12}, () => ({
            x: Math.random()*canvas.width, y: Math.random()*canvas.height,
            s: Math.random()*150+50, dx: (Math.random()-0.5)*0.5, dy: (Math.random()-0.5)*0.5,
            t: Math.floor(Math.random()*3)
        }));
    }
    function drawShapes() {
        ctx.clearRect(0,0,canvas.width, canvas.height);
        ctx.strokeStyle = getComputedStyle(document.documentElement).getPropertyValue('--text') + '10';
        shapes.forEach(p => {
            ctx.beginPath();
            if(p.t===0) ctx.arc(p.x, p.y, p.s/2, 0, Math.PI*2);
            else if(p.t===1) ctx.rect(p.x, p.y, p.s, p.s);
            else { ctx.moveTo(p.x, p.y); ctx.lineTo(p.x+p.s, p.y); ctx.lineTo(p.x+p.s/2, p.y-p.s); ctx.closePath(); }
            ctx.stroke();
            p.x += p.dx; p.y += p.dy;
            if(p.x < -200 || p.x > canvas.width+200) p.dx *= -1;
            if(p.y < -200 || p.y > canvas.height+200) p.dy *= -1;
        });
        requestAnimationFrame(drawShapes);
    }

    initShapes(); drawShapes();
    autoConnect();
    lucide.createIcons();
</script>
</body>
</html>
