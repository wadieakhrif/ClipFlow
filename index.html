<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>ClipFlow</title>

<style>
body { font-family:sans-serif; margin:0; background:white; color:black; }

nav {
 display:flex;
 justify-content:space-between;
 padding:15px;
 border-bottom:1px solid black;
}

#projects {
 display:flex;
 flex-wrap:wrap;
 gap:10px;
 padding:10px;
}

.card {
 border:1px solid black;
 width:200px;
 padding:10px;
 cursor:pointer;
}

.card img {
 width:100%;
 height:120px;
 object-fit:cover;
}

#player { padding:10px; }
video { width:100%; }

/* ===== MODAL ===== */
#startupModal {
 position:fixed;
 top:0; left:0;
 width:100%; height:100%;
 background:rgba(0,0,0,0.6);
 display:flex;
 justify-content:center;
 align-items:center;
 z-index:999;
}

.modal-box {
 background:white;
 padding:25px;
 width:350px;
 border-radius:10px;
 text-align:center;
}

button {
 padding:6px 12px;
 cursor:pointer;
 margin-top:10px;
}
</style>
</head>

<body>

<nav>
  <b>ClipFlow</b>
  <div>
    <button onclick="openNewProject()">+ مشروع</button>
  </div>
</nav>

<div id="projects"></div>
<div id="player"></div>

<!-- نافذة البداية -->
<div id="startupModal">
  <div class="modal-box">
    <h3>اختيار مكان التخزين</h3>

    <p id="statusText">
      يجب اختيار فولدر لحفظ مشاريعك.<br>
      ملفاتك تُحفظ في جهازك وليس على الإنترنت.
    </p>

    <button onclick="connectFolder()">التالي</button>
  </div>
</div>

<script>
let dir;

/* ===== IndexedDB ===== */
function openDB(){
  return new Promise(res=>{
    let req = indexedDB.open("clipflowDB",1);
    req.onupgradeneeded = ()=>req.result.createObjectStore("store");
    req.onsuccess = ()=>res(req.result);
  });
}

async function saveDir(handle){
  let db = await openDB();
  db.transaction("store","readwrite").objectStore("store").put(handle,"dir");
}

async function getDir(){
  let db = await openDB();
  return db.transaction("store","readonly").objectStore("store").get("dir");
}

/* ===== عند فتح الموقع ===== */
window.onload = async ()=>{
  dir = await getDir();

  if(dir){
    document.getElementById("statusText").innerHTML =
      "تم العثور على مكان التخزين السابق.<br>اضغط 'التالي' للموافقة عليه.";

  } else {
    document.getElementById("statusText").innerHTML =
      "لا يوجد مكان تخزين.<br>يجب اختيار فولدر لحفظ مشاريعك.";
  }
};

/* ===== الاتصال بالفولدر ===== */
async function connectFolder(){
  try{

    if(!dir){
      dir = await window.showDirectoryPicker({mode:"readwrite"});
    }

    let perm = await dir.requestPermission({mode:"readwrite"});

    if(perm !== "granted"){
      alert("يجب الموافقة للمتابعة");
      return;
    }

    await saveDir(dir);

    document.getElementById("startupModal").style.display="none";

    loadProjects();

  }catch{
    alert("لم يتم اختيار فولدر");
  }
}

/* ===== مشروع جديد ===== */
function openNewProject(){
  let title = prompt("عنوان المشروع");
  if(!title) return;

  let videoInput = document.createElement("input");
  videoInput.type="file";
  videoInput.accept="video/*";
  videoInput.click();

  videoInput.onchange = async ()=>{
    let video = videoInput.files[0];

    let thumbInput = document.createElement("input");
    thumbInput.type="file";
    thumbInput.accept="image/*";
    thumbInput.click();

    thumbInput.onchange = async ()=>{
      let thumb = thumbInput.files[0];

      let name = title.replace(/[\\/:*?"<>|]/g,"") || "مشروع";

      let final=name, i=1;
      while(true){
        try{
          await dir.getDirectoryHandle(final);
          final = name+"_"+i++;
        }catch{ break; }
      }

      let p = await dir.getDirectoryHandle(final,{create:true});

      // video
      let v = await p.getFileHandle("video.mp4",{create:true});
      let vw = await v.createWritable();
      await vw.write(video); await vw.close();

      // thumb
      let t = await p.getFileHandle("thumb.png",{create:true});
      let tw = await t.createWritable();
      await tw.write(thumb); await tw.close();

      // data
      let d = await p.getFileHandle("data.json",{create:true});
      let dw = await d.createWritable();
      await dw.write(JSON.stringify({title}));
      await dw.close();

      loadProjects();
    }
  }
}

/* ===== تحميل المشاريع ===== */
async function loadProjects(){
  projects.innerHTML="";

  for await (const entry of dir.values()){
    if(entry.kind==="directory"){
      try{
        let f = await entry.getFileHandle("data.json");
        let data = JSON.parse(await (await f.getFile()).text());

        let thumbURL="";
        try{
          let t = await entry.getFileHandle("thumb.png");
          thumbURL = URL.createObjectURL(await t.getFile());
        }catch{}

        let div=document.createElement("div");
        div.className="card";
        div.innerHTML=`<img src="${thumbURL}"><b>${data.title}</b>`;

        div.onclick = async ()=>{
          let v = await entry.getFileHandle("video.mp4");
          let url = URL.createObjectURL(await v.getFile());
          player.innerHTML=`<video src="${url}" controls autoplay></video>`;
        };

        projects.appendChild(div);

      }catch{}
    }
  }
}
</script>

</body>
</html>
