<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>ClipFlow</title>

<style>
body { font-family:sans-serif; margin:0; background:white; color:black; }

nav {
 display:flex;
 justify-content:space-between;
 padding:15px;
 border-bottom:1px solid black;
}

#projects {
 display:flex;
 flex-wrap:wrap;
 gap:10px;
 padding:10px;
}

.card {
 border:1px solid black;
 width:200px;
 padding:10px;
 cursor:pointer;
}

.card img {
 width:100%;
 height:120px;
 object-fit:cover;
}

#player { padding:10px; }
video { width:100%; }

/* MODAL */
#modal {
 position:fixed;
 top:0; left:0;
 width:100%; height:100%;
 background:rgba(0,0,0,0.6);
 display:flex;
 justify-content:center;
 align-items:center;
}

.box {
 background:white;
 padding:20px;
 width:350px;
 border-radius:10px;
 text-align:center;
}

button { padding:6px 12px; margin:5px; cursor:pointer; }
</style>
</head>

<body>

<nav>
  <b>ClipFlow</b>
  <button onclick="newProject()">+ مشروع</button>
</nav>

<div id="projects"></div>
<div id="player"></div>

<!-- نافذة البداية -->
<div id="modal">
  <div class="box">
    <h3 id="title">اختيار مكان الحفظ</h3>
    <p id="desc"></p>

    <div id="actions"></div>
  </div>
</div>

<script>
let rootDir;      // الفولدر الذي يختاره المستخدم
let appDir;       // ClipFlow folder

/* ===== IndexedDB ===== */
function openDB(){
  return new Promise(res=>{
    let req=indexedDB.open("clipflowDB",1);
    req.onupgradeneeded=()=>req.result.createObjectStore("store");
    req.onsuccess=()=>res(req.result);
  });
}

async function saveDir(handle){
  let db=await openDB();
  db.transaction("store","readwrite").objectStore("store").put(handle,"dir");
}

async function getDir(){
  let db=await openDB();
  return db.transaction("store","readonly").objectStore("store").get("dir");
}

/* ===== عند فتح الموقع ===== */
window.onload = async ()=>{
  rootDir = await getDir();

  if(rootDir){
    showConfirmUI();
  }else{
    showFirstUI();
  }
};

/* ===== واجهة أول مرة ===== */
function showFirstUI(){
  title.innerText = "اختيار مكان الحفظ";
  desc.innerHTML = "اختر فولدر (مثل Documents).<br>سيتم إنشاء مجلد ClipFlow داخله.";
  actions.innerHTML = `<button onclick="chooseFolder()">اختيار</button>`;
}

/* ===== واجهة التأكيد ===== */
function showConfirmUI(){
  title.innerText = "تأكيد مكان الحفظ";
  desc.innerHTML = "تم العثور على مكان الحفظ السابق.<br>هل تريد استخدامه؟";

  actions.innerHTML = `
    <button onclick="confirmFolder()">نعم</button>
    <button onclick="chooseFolder()">تغيير</button>
  `;
}

/* ===== اختيار فولدر جديد ===== */
async function chooseFolder(){
  try{
    rootDir = await window.showDirectoryPicker({mode:"readwrite"});

    await rootDir.requestPermission({mode:"readwrite"});

    // إنشاء مجلد ClipFlow
    appDir = await rootDir.getDirectoryHandle("ClipFlow",{create:true});

    await saveDir(rootDir);

    closeModal();
    loadProjects();

  }catch{}
}

/* ===== تأكيد الفولدر القديم ===== */
async function confirmFolder(){
  try{
    let perm = await rootDir.requestPermission({mode:"readwrite"});
    if(perm !== "granted") return;

    appDir = await rootDir.getDirectoryHandle("ClipFlow",{create:true});

    closeModal();
    loadProjects();

  }catch{
    showFirstUI();
  }
}

/* ===== إغلاق المودال ===== */
function closeModal(){
  modal.style.display="none";
}

/* ===== إنشاء مشروع ===== */
function newProject(){
  let titleName = prompt("عنوان المشروع");
  if(!titleName) return;

  let videoInput=document.createElement("input");
  videoInput.type="file";
  videoInput.accept="video/*";
  videoInput.click();

  videoInput.onchange=async ()=>{
    let video=videoInput.files[0];

    let thumbInput=document.createElement("input");
    thumbInput.type="file";
    thumbInput.accept="image/*";
    thumbInput.click();

    thumbInput.onchange=async ()=>{
      let thumb=thumbInput.files[0];

      let name = titleName.replace(/[\\/:*?"<>|]/g,"") || "مشروع";

      let final=name, i=1;
      while(true){
        try{
          await appDir.getDirectoryHandle(final);
          final=name+"_"+i++;
        }catch{ break; }
      }

      let p = await appDir.getDirectoryHandle(final,{create:true});

      // video
      let v=await p.getFileHandle("video.mp4",{create:true});
      let vw=await v.createWritable();
      await vw.write(video); await vw.close();

      // thumb
      let t=await p.getFileHandle("thumb.png",{create:true});
      let tw=await t.createWritable();
      await tw.write(thumb); await tw.close();

      // data
      let d=await p.getFileHandle("data.json",{create:true});
      let dw=await d.createWritable();
      await dw.write(JSON.stringify({title:titleName}));
      await dw.close();

      loadProjects();
    }
  }
}

/* ===== تحميل المشاريع ===== */
async function loadProjects(){
  projects.innerHTML="";

  for await (const entry of appDir.values()){
    if(entry.kind==="directory"){
      try{
        let f=await entry.getFileHandle("data.json");
        let data=JSON.parse(await (await f.getFile()).text());

        let thumbURL="";
        try{
          let t=await entry.getFileHandle("thumb.png");
          thumbURL=URL.createObjectURL(await t.getFile());
        }catch{}

        let div=document.createElement("div");
        div.className="card";
        div.innerHTML=`<img src="${thumbURL}"><b>${data.title}</b>`;

        div.onclick=async ()=>{
          let v=await entry.getFileHandle("video.mp4");
          let url=URL.createObjectURL(await v.getFile());
          player.innerHTML=`<video src="${url}" controls autoplay></video>`;
        };

        projects.appendChild(div);

      }catch{}
    }
  }
}
</script>

</body>
</html>
