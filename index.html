<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>ClipFlow Auto</title>
</head>
<body>

<button onclick="manualPick()">Choose Folder (First time only)</button>
<div id="projects"></div>

<script>
let rootDir;
let appDir;

/* IndexedDB */
function openDB(){
 return new Promise(res=>{
  let r=indexedDB.open("db",1);
  r.onupgradeneeded=()=>r.result.createObjectStore("s");
  r.onsuccess=()=>res(r.result);
 });
}

async function saveDir(h){
 let db=await openDB();
 db.transaction("s","readwrite").objectStore("s").put(h,"dir");
}

async function getDir(){
 let db=await openDB();
 return db.transaction("s","readonly").objectStore("s").get("dir");
}

/* أول مرة */
async function manualPick(){
 rootDir = await window.showDirectoryPicker({mode:"readwrite"});
 await rootDir.requestPermission({mode:"readwrite"});

 appDir = await rootDir.getDirectoryHandle("clipflow",{create:true});

 await saveDir(rootDir);

 load();
}

/* أوتوماتيك عند الدخول */
window.onload = async ()=>{
 rootDir = await getDir();

 if(rootDir){
   let perm = await rootDir.queryPermission({mode:"readwrite"});

   if(perm !== "granted"){
     perm = await rootDir.requestPermission({mode:"readwrite"});
   }

   if(perm === "granted"){
     appDir = await rootDir.getDirectoryHandle("clipflow",{create:true});
     load();
   }
 }
};

/* عرض المشاريع */
async function load(){
 projects.innerHTML="";

 for await (const entry of appDir.values()){
  if(entry.kind==="directory"){
   let div=document.createElement("div");
   div.innerText=entry.name;
   projects.appendChild(div);
  }
 }
}
</script>

</body>
</html>
