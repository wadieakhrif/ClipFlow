<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Clip Flow</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap');

/* الألوان الأساسية */
:root {
  --dark-bg:#0d0f25;
  --dark-secondary:#1a0a36;
  --light-bg:#f5f5f5;
  --light-secondary:#ffffff;
  --blue-dark:#0d6cff;
  --blue-light:#63a4ff;
  --purple-dark:#6c63ff;
  --purple-light:#a394ff;
  --text-light:#fff;
  --text-dark:#000;
}

/* body */
body {
  margin:0;
  font-family:'Roboto',sans-serif;
  background:var(--dark-bg);
  color:var(--text-light);
  transition:0.5s;
  overflow-x:hidden;
}

/* Navbar */
nav {
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding:15px 25px;
  background: linear-gradient(90deg,var(--purple-dark),var(--blue-dark));
}

nav .logo {
  display:flex;
  align-items:center;
  gap:10px;
}

nav .logo img {
  width:40px;
  height:40px;
}

nav .logo h1 {
  font-size:22px;
  background: linear-gradient(90deg,#fff,#ddd);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
}

nav button {
  padding:8px 15px;
  border:none;
  border-radius:8px;
  font-weight:bold;
  cursor:pointer;
  transition:0.3s;
}

/* خلفية هندسية Outline */
#bgCanvas {
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  z-index:-1;
}

/* مشاريع */
#projectsContainer {
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(220px,1fr));
  gap:20px;
  padding:20px;
}

.project {
  background: linear-gradient(145deg,var(--dark-secondary),var(--dark-bg));
  border-radius:15px;
  overflow:hidden;
  box-shadow:0 5px 15px rgba(0,0,0,0.5);
  display:flex;
  flex-direction:column;
  cursor:pointer;
  transition:0.3s;
  position:relative;
}

.project:hover{ transform:translateY(-5px); }

.project img { width:100%; height:140px; object-fit:cover; }

.project-info { padding:10px; display:flex; flex-direction:column; gap:5px; }
.project-info h3{ font-size:16px; margin:0; font-weight:bold; }
.project-info p{ font-size:12px; margin:0; display:flex; align-items:center; gap:5px; }

.platform-label { padding:2px 6px; border-radius:5px; font-size:11px; font-weight:bold; color:#fff; }
.youtube { background:#FF0000; }
.youtube-shorts { background:#FF5555; }
.tiktok { background:#000; color:#fff; }
.instagram { background: linear-gradient(45deg,#feda75,#d62976,#8134af); }
.facebook { background:#1877F2; }
.snapchat { background:#FFFC00; color:#000; }
.linkedin { background:#0077B5; }
.twitter { background:#1DA1F2; }
.pinterest { background:#E60023; }

/* قائمة الثلاث نقاط */
.project .menu-btn {
  position:absolute;
  top:10px; right:10px;
  background:rgba(255,255,255,0.2);
  border:none;
  border-radius:50%;
  width:30px;
  height:30px;
  cursor:pointer;
  font-weight:bold;
  display:flex;
  align-items:center;
  justify-content:center;
}

.project .menu-content {
  display:none;
  position:absolute;
  top:40px;
  right:10px;
  background:var(--dark-secondary);
  border-radius:8px;
  overflow:hidden;
  z-index:5;
  flex-direction:column;
}

.project .menu-content button {
  background:none;
  color:#fff;
  padding:8px 12px;
  text-align:left;
  border:none;
  width:100%;
  cursor:pointer;
}

.project .menu-content button:hover{ background:rgba(255,255,255,0.2); }

/* نافذة popup */
#folderPopup, #projectPopup {
  position:fixed;
  top:50%; left:50%;
  transform:translate(-50%,-50%);
  background:var(--dark-secondary);
  padding:20px;
  border-radius:15px;
  z-index:10;
  display:none;
  width:350px;
  box-shadow:0 10px 25px rgba(0,0,0,0.7);
}

#folderPopup h2,#projectPopup h2{text-align:center; margin-bottom:15px;}

button.popupBtn{
  padding:10px 15px;
  margin:5px 0;
  border:none;
  border-radius:8px;
  cursor:pointer;
  width:100%;
  font-weight:bold;
}

/* Input الملفات */
#dropZone, #dropThumbs {
  border:2px dashed var(--purple-dark);
  border-radius:10px;
  padding:20px;
  text-align:center;
  margin:10px 0;
  cursor:pointer;
  transition:0.3s;
}
#dropZone:hover, #dropThumbs:hover { border-color:#fff; }

#thumbPreview img { margin:3px; border-radius:5px; width:50px; height:35px; object-fit:cover; }

input,textarea { width:100%; padding:8px; margin:5px 0; border-radius:8px; border:none; background:var(--dark-bg); color:var(--text-light); }

/* المنصات */
.platformBtn{ padding:5px 10px; margin:2px; border-radius:6px; background:var(--purple-dark); cursor:pointer; transition:0.3s; }
.platformBtn.selected{ background:#ff6c63; }
</style>
</head>
<body>

<canvas id="bgCanvas"></canvas>

<nav>
<div class="logo">
<img src="https://img.sanishtech.com/u/8a6ce39c01afd349c83d1c5b8f4cd7ac.png">
<h1>Clip Flow</h1>
</div>
<div>
<button id="toggleLang">EN/AR</button>
<button id="toggleMode">Dark/Light</button>
</div>
</nav>

<div id="projectsContainer"></div>

<!-- Popup اختيار مجلد -->
<div id="folderPopup">
<h2>اختر مجلد المشاريع</h2>
<button class="popupBtn" id="chooseFolderBtn">اختر مجلد</button>
</div>

<!-- Popup إنشاء مشروع -->
<div id="projectPopup">
<h2>مشروع جديد</h2>
<div id="dropZone">اسحب الفيديو هنا أو اضغط لاختياره</div>
<div id="dropThumbs">اسحب الصور المصغرة هنا أو اضغط لاختيارها (1-3)</div>
<div id="thumbPreview"></div>
<input type="text" id="title" placeholder="عنوان المشروع">
<textarea id="description" placeholder="الوصف"></textarea>
<label>اختر المنصات:</label>
<div id="platformsContainer"></div>
<label>اختر التاريخ والوقت:</label>
<input type="datetime-local" id="datetime">
<button class="popupBtn" id="saveProjectBtn">حفظ المشروع</button>
<button class="popupBtn" id="cancelProjectBtn">إلغاء</button>
</div>

<script>
// هنا سأجهز لك كامل الكود JS لإدارة المجلدات، المشاريع، الصور المصغرة، Drag&Drop، Light/Dark Mode، اللغات، الخلفية الهندسية
// هذا الكود كبير جدًا وسأرسله لك في رسالة ثانية لتجنب القطع. 
</script>
</body>
</html>
