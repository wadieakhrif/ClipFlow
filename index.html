<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clipflow | Project Manager</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&family=Cairo:wght@400;700&display=swap');

        :root {
            --primary: #6c63ff;
            --primary-hover: #5a52d6;
            --bg: #05060f;
            --card-bg: #111322;
            --nav-bg: rgba(13, 15, 30, 0.8);
            --text: #ffffff;
            --text-muted: #94a3b8;
            --border: rgba(255, 255, 255, 0.08);
            --danger: #ff4757;
            --success: #2ed573;
        }

        [data-theme="light"] {
            --bg: #f8fafc;
            --card-bg: #ffffff;
            --nav-bg: rgba(255, 255, 255, 0.9);
            --text: #0f172a;
            --text-muted: #64748b;
            --border: rgba(0, 0, 0, 0.05);
        }

        body {
            margin: 0;
            font-family: 'Inter', sans-serif;
            background: var(--bg);
            color: var(--text);
            transition: all 0.3s ease;
            line-height: 1.6;
        }

        body[dir="rtl"] { font-family: 'Cairo', sans-serif; }

        /* --- Header & Navigation --- */
        header {
            position: sticky;
            top: 0;
            z-index: 1000;
            background: var(--nav-bg);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid var(--border);
            padding: 10px 24px;
        }

        .top-bar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            max-width: 1400px;
            margin: 0 auto;
            gap: 20px;
        }

        .logo {
            font-weight: 700;
            font-size: 22px;
            color: var(--primary);
            display: flex;
            align-items: center;
            gap: 10px;
            text-decoration: none;
        }

        .search-wrapper {
            flex: 1;
            max-width: 500px;
            position: relative;
        }

        .search-wrapper input {
            width: 100%;
            background: var(--bg);
            border: 1px solid var(--border);
            padding: 10px 15px 10px 40px;
            border-radius: 10px;
            color: var(--text);
            outline: none;
            transition: border 0.3s;
        }

        .search-wrapper input:focus { border-color: var(--primary); }
        .search-wrapper::before {
            content: "🔍";
            position: absolute;
            left: 12px;
            top: 50%;
            transform: translateY(-50%);
            opacity: 0.5;
        }

        .nav-btns { display: flex; gap: 12px; align-items: center; }

        /* --- Buttons --- */
        .btn {
            padding: 10px 18px;
            border-radius: 8px;
            border: none;
            font-weight: 600;
            cursor: pointer;
            transition: 0.2s;
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 14px;
        }

        .btn-primary { background: var(--primary); color: white; }
        .btn-primary:hover { background: var(--primary-hover); }
        .btn-ghost { background: transparent; color: var(--text); border: 1px solid var(--border); }
        .btn-ghost:hover { background: var(--border); }

        /* --- Content Layout --- */
        main { max-width: 1400px; margin: 0 auto; padding: 24px; }

        .category-scroll {
            display: flex;
            gap: 10px;
            margin-bottom: 30px;
            overflow-x: auto;
            padding-bottom: 10px;
        }

        .tab {
            padding: 8px 16px;
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 20px;
            white-space: nowrap;
            cursor: pointer;
            font-size: 13px;
        }

        .tab.active { background: var(--primary); color: white; border-color: var(--primary); }

        /* --- Project Grid --- */
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 25px;
        }

        .card {
            background: var(--card-bg);
            border-radius: 16px;
            border: 1px solid var(--border);
            overflow: hidden;
            position: relative;
            transition: transform 0.3s, box-shadow 0.3s;
        }

        .card:hover {
            transform: translateY(-5px);
            box-shadow: 0 12px 30px rgba(0,0,0,0.2);
        }

        .card-thumb {
            width: 100%;
            aspect-ratio: 16/9;
            background: #000;
            position: relative;
            cursor: pointer;
        }
        
        .card-thumb img { width: 100%; height: 100%; object-fit: cover; }

        .card-body { padding: 18px; }
        .card-body h3 { margin: 0 0 8px; font-size: 18px; }
        .card-body p { margin: 0; font-size: 13px; color: var(--text-muted); height: 40px; overflow: hidden; }

        /* Menu Dots */
        .dots-btn {
            position: absolute; top: 10px; right: 10px;
            width: 34px; height: 34px; border-radius: 50%;
            background: rgba(0,0,0,0.6); color: white;
            display: flex; align-items: center; justify-content: center;
            cursor: pointer; z-index: 10;
        }

        .dropdown {
            position: absolute; top: 50px; right: 10px;
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 10px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.4);
            display: none; flex-direction: column;
            width: 160px; z-index: 100;
        }

        .dropdown button {
            padding: 12px 15px; border: none; background: none; color: var(--text);
            text-align: left; cursor: pointer; border-bottom: 1px solid var(--border);
            font-size: 13px;
        }
        .dropdown button:hover { background: var(--primary); color: white; }

        /* --- Modals --- */
        .overlay {
            position: fixed; inset: 0; background: rgba(0,0,0,0.8);
            display: none; align-items: center; justify-content: center;
            z-index: 2000; backdrop-filter: blur(8px);
        }

        .modal {
            background: var(--card-bg);
            width: 100%; max-width: 600px;
            border-radius: 24px; padding: 32px;
            border: 1px solid var(--border);
            max-height: 90vh; overflow-y: auto;
        }

        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; margin-bottom: 8px; font-size: 13px; color: var(--text-muted); }
        input, textarea, select {
            width: 100%; padding: 12px; background: var(--bg);
            border: 1px solid var(--border); border-radius: 12px;
            color: var(--text); outline: none; box-sizing: border-box;
        }

        .thumb-grid {
            display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; margin-bottom: 20px;
        }

        .thumb-upload {
            aspect-ratio: 1; border: 2px dashed var(--border);
            border-radius: 12px; display: flex; align-items: center;
            justify-content: center; cursor: pointer; overflow: hidden;
            background: var(--bg);
        }
        .thumb-upload img { width: 100%; height: 100%; object-fit: cover; }

        /* Utility */
        .hidden { display: none; }
        .visible { display: flex; }
    </style>
</head>
<body>

<header>
    <div class="top-bar">
        <a href="#" class="logo">⚡ Clipflow</a>
        
        <div class="search-wrapper">
            <input type="text" id="mainSearch" placeholder="Search by title..." oninput="renderProjects()">
        </div>

        <div class="nav-btns">
            <button class="btn btn-ghost" onclick="toggleTheme()">🌓</button>
            <button class="btn btn-primary" onclick="openModal('add')">＋ New Project</button>
        </div>
    </div>
</header>

<main>
    <div class="category-scroll" id="catBar">
        <div class="tab active" onclick="filterBy('all')">All Projects</div>
        <div class="tab" onclick="filterBy('yt')">YouTube</div>
        <div class="tab" onclick="filterBy('reels')">Reels / Shorts</div>
        <div class="tab" onclick="filterBy('fb')">Facebook</div>
    </div>

    <div id="projectsContainer" class="grid">
        </div>

    <div id="setupView" style="text-align: center; padding: 100px 20px;" class="hidden">
        <h2>Welcome to Clipflow</h2>
        <p>Please select a folder on your computer to use as a workspace.</p>
        <button class="btn btn-primary" style="margin: 0 auto;" onclick="initWorkspace()">Select Workspace Folder</button>
    </div>
</main>

<div class="overlay" id="formModal">
    <div class="modal">
        <h2 id="modalTitle">New Project</h2>
        
        <div class="form-group" id="videoInputGroup">
            <label>1. Select Video</label>
            <div id="dropZone" style="border: 2px dashed var(--primary); padding: 30px; text-align: center; border-radius: 15px; cursor: pointer;">
                <span id="videoLabel">Click to upload .mp4</span>
            </div>
        </div>

        <div class="form-group">
            <label>2. Thumbnails (First image is the cover)</label>
            <div class="thumb-grid">
                <div class="thumb-upload" onclick="pickImage(0)"><img id="pre0" class="hidden"><span>+</span></div>
                <div class="thumb-upload" onclick="pickImage(1)"><img id="pre1" class="hidden"><span>+</span></div>
                <div class="thumb-upload" onclick="pickImage(2)"><img id="pre2" class="hidden"><span>+</span></div>
            </div>
        </div>

        <div class="form-group">
            <label>Project Title</label>
            <input type="text" id="projTitle" placeholder="Awesome Video Title">
        </div>

        <div class="form-group">
            <label>Description</label>
            <textarea id="projDesc" rows="3" placeholder="What's this video about?"></textarea>
        </div>

        <div class="form-group">
            <label>Platform Layout</label>
            <select id="projPlat">
                <option value="yt">YouTube (16:9)</option>
                <option value="reels">TikTok / Reels / Shorts (9:16)</option>
                <option value="fb">Facebook (16:9)</option>
            </select>
        </div>

        <div style="display: flex; gap: 10px; margin-top: 30px;">
            <button class="btn btn-ghost" style="flex: 1;" onclick="closeModal()">Cancel</button>
            <button class="btn btn-primary" style="flex: 2;" onclick="saveProject()">Save Project</button>
        </div>
    </div>
</div>

<script>
    let workspace = null;
    let projects = [];
    let selectedVideoFile = null;
    let tempThumbs = [null, null, null];
    let editMode = false;
    let currentEditName = null;
    let currentFilter = 'all';

    // Initialize
    async function checkStorage() {
        if (!workspace) {
            document.getElementById('setupView').classList.remove('hidden');
            document.getElementById('projectsContainer').classList.add('hidden');
        }
    }
    checkStorage();

    async function initWorkspace() {
        try {
            workspace = await window.showDirectoryPicker({ mode: 'readwrite' });
            document.getElementById('setupView').classList.add('hidden');
            document.getElementById('projectsContainer').classList.remove('hidden');
            loadProjects();
        } catch (e) { console.error("Workspace access denied"); }
    }

    async function loadProjects() {
        projects = [];
        const root = await workspace.getDirectoryHandle('Clipflow_Data', { create: true });
        
        for await (const [name, handle] of root.entries()) {
            if (handle.kind === 'directory') {
                try {
                    const mFile = await handle.getFileHandle('meta.json');
                    const meta = JSON.parse(await (await mFile.getFile()).text());
                    const vFile = await handle.getFileHandle('video.mp4');
                    projects.push({ folderName: name, meta, videoFile: vFile, handle });
                } catch (e) { console.warn("Skipping corrupt project: " + name); }
            }
        }
        renderProjects();
    }

    function renderProjects() {
        const container = document.getElementById('projectsContainer');
        const query = document.getElementById('mainSearch').value.toLowerCase();
        container.innerHTML = '';

        // SORTING: Newest to Oldest
        const sorted = projects.sort((a, b) => b.meta.timestamp - a.meta.timestamp);

        sorted.forEach((p, idx) => {
            if (currentFilter !== 'all' && p.meta.platform !== currentFilter) return;
            if (!p.meta.title.toLowerCase().includes(query)) return;

            const div = document.createElement('div');
            div.className = 'card';
            div.innerHTML = `
                <div class="dots-btn" onclick="toggleMenu(event, ${idx})">⋮</div>
                <div class="dropdown" id="dropdown-${idx}">
                    <button onclick="openModal('edit', ${idx})">✏️ Edit Details</button>
                    <button onclick="downloadBundle(${idx})">📦 Download ZIP</button>
                    <button onclick="deleteProject(${idx})" style="color:var(--danger)">🗑️ Delete File</button>
                </div>
                <div class="card-thumb" onclick="previewVideo(${idx})">
                    <img src="${p.meta.thumbs[0] || ''}">
                </div>
                <div class="card-body">
                    <h3>${p.meta.title}</h3>
                    <p>${p.meta.desc || 'No description provided.'}</p>
                    <div style="font-size: 11px; margin-top: 10px; opacity: 0.5;">
                        ${new Date(p.meta.timestamp).toLocaleString()}
                    </div>
                </div>
            `;
            container.appendChild(div);
        });
    }

    // --- Actions ---
    function openModal(mode, idx = null) {
        editMode = (mode === 'edit');
        currentEditName = idx !== null ? projects[idx].folderName : null;
        
        document.getElementById('modalTitle').innerText = editMode ? "Edit Project" : "New Project";
        document.getElementById('videoInputGroup').style.display = editMode ? 'none' : 'block';

        if (editMode) {
            const p = projects[idx];
            document.getElementById('projTitle').value = p.meta.title;
            document.getElementById('projDesc').value = p.meta.desc;
            document.getElementById('projPlat').value = p.meta.platform;
            tempThumbs = [...p.meta.thumbs];
        } else {
            document.getElementById('projTitle').value = "";
            document.getElementById('projDesc').value = "";
            selectedVideoFile = null;
            tempThumbs = [null, null, null];
            document.getElementById('videoLabel').innerText = "Click to upload .mp4";
        }

        updateThumbUI();
        document.getElementById('formModal').style.display = 'flex';
    }

    async function saveProject() {
        const title = document.getElementById('projTitle').value;
        const desc = document.getElementById('projDesc').value;
        const plat = document.getElementById('projPlat').value;

        if (!title || (!selectedVideoFile && !editMode)) return alert("Please fill in the title and select a video.");

        const root = await workspace.getDirectoryHandle('Clipflow_Data', { create: true });
        
        // If editing, use the old folder name, otherwise create new unique name
        const folderName = editMode ? currentEditName : title.replace(/\s+/g, '_') + "_" + Date.now();
        const pFolder = await root.getDirectoryHandle(folderName, { create: true });

        // Meta File
        const mFile = await pFolder.getFileHandle('meta.json', { create: true });
        const writer = await mFile.createWritable();
        const metaData = {
            title, desc, 
            platform: plat, 
            thumbs: tempThumbs, 
            timestamp: editMode ? projects.find(p => p.folderName === currentEditName).meta.timestamp : Date.now()
        };
        await writer.write(JSON.stringify(metaData));
        await writer.close();

        // Video File (Only save if a new file was picked)
        if (selectedVideoFile) {
            const vFile = await pFolder.getFileHandle('video.mp4', { create: true });
            const vWriter = await vFile.createWritable();
            await vWriter.write(selectedVideoFile);
            await vWriter.close();
        }

        closeModal();
        loadProjects();
    }

    async function downloadBundle(idx) {
        const p = projects[idx];
        const zip = new JSZip();
        
        // 1. Add Text Info
        const info = `Title: ${p.meta.title}\nDescription: ${p.meta.desc}\nPlatform: ${p.meta.platform}\nDate: ${new Date(p.meta.timestamp).toString()}`;
        zip.file("project_info.txt", info);

        // 2. Add Video
        const vBlob = await p.videoFile.getFile();
        zip.file("video.mp4", vBlob);

        // 3. Add Thumbnails (Base64 conversion)
        p.meta.thumbs.forEach((data, i) => {
            if (data) {
                const imgData = data.split(',')[1];
                zip.file(`thumbnail_${i+1}.png`, imgData, {base64: true});
            }
        });

        // Generate and Download
        const content = await zip.generateAsync({type:"blob"});
        saveAs(content, `${p.meta.title}_bundle.zip`);
    }

    async function deleteProject(idx) {
        if (confirm("⚠️ PERMANENT DELETE: This will remove the folder from your workspace. This cannot be undone.")) {
            const root = await workspace.getDirectoryHandle('Clipflow_Data');
            await root.removeEntry(projects[idx].folderName, { recursive: true });
            loadProjects();
        }
    }

    // --- UI Helpers ---
    function pickImage(i) {
        const input = document.createElement('input');
        input.type = 'file'; input.accept = 'image/*';
        input.onchange = e => {
            const reader = new FileReader();
            reader.onload = f => {
                tempThumbs[i] = f.target.result;
                updateThumbUI();
            };
            reader.readAsDataURL(e.target.files[0]);
        };
        input.click();
    }

    function updateThumbUI() {
        tempThumbs.forEach((src, i) => {
            const img = document.getElementById(`pre${i}`);
            if (src) {
                img.src = src; img.classList.remove('hidden');
                img.nextElementSibling.classList.add('hidden');
            } else {
                img.classList.add('hidden');
                img.nextElementSibling.classList.remove('hidden');
            }
        });
    }

    document.getElementById('dropZone').onclick = () => {
        const input = document.createElement('input');
        input.type = 'file'; input.accept = 'video/mp4';
        input.onchange = e => {
            selectedVideoFile = e.target.files[0];
            document.getElementById('videoLabel').innerText = selectedVideoFile.name;
        };
        input.click();
    };

    function toggleMenu(e, idx) {
        e.stopPropagation();
        const menu = document.getElementById(`dropdown-${idx}`);
        const isVisible = menu.style.display === 'flex';
        document.querySelectorAll('.dropdown').forEach(d => d.style.display = 'none');
        menu.style.display = isVisible ? 'none' : 'flex';
    }

    window.onclick = () => document.querySelectorAll('.dropdown').forEach(d => d.style.display = 'none');

    function closeModal() { document.getElementById('formModal').style.display = 'none'; }

    function toggleTheme() {
        const theme = document.documentElement.getAttribute('data-theme');
        document.documentElement.setAttribute('data-theme', theme === 'dark' ? 'light' : 'dark');
    }

    function filterBy(plat) {
        currentFilter = plat;
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        event.target.classList.add('active');
        renderProjects();
    }

    async function previewVideo(idx) {
        const p = projects[idx];
        const file = await p.videoFile.getFile();
        const url = URL.createObjectURL(file);
        const win = window.open("", "_blank");
        win.document.write(`<video src="${url}" controls style="width:100%; height:100%; background:black;"></video>`);
    }
</script>

</body>
</html>
