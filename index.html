<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clipflow Pro</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&family=Cairo:wght@400;700&display=swap');

        :root {
            --primary: #6c63ff; --primary-hover: #5a52d6;
            --bg: #05060f; --card-bg: rgba(17, 19, 34, 0.8);
            --nav-bg: rgba(13, 15, 30, 0.9); --text: #ffffff;
            --text-muted: #94a3b8; --border: rgba(255, 255, 255, 0.1);
            --danger: #ff4757;
        }

        [data-theme="light"] {
            --bg: #f8fafc; --card-bg: rgba(255, 255, 255, 0.8);
            --nav-bg: rgba(255, 255, 255, 0.9); --text: #0f172a;
            --text-muted: #64748b; --border: rgba(0, 0, 0, 0.1);
        }

        body {
            margin: 0; font-family: 'Inter', sans-serif;
            background: var(--bg); color: var(--text);
            transition: 0.3s; line-height: 1.6; overflow-x: hidden;
        }
        body.rtl { direction: rtl; font-family: 'Cairo', sans-serif; }

        #bgCanvas { position: fixed; top: 0; left: 0; z-index: -1; pointer-events: none; }

        header {
            position: sticky; top: 0; z-index: 1000;
            background: var(--nav-bg); backdrop-filter: blur(12px);
            border-bottom: 1px solid var(--border); padding: 15px 30px;
            display: flex; align-items: center; justify-content: space-between;
        }

        .header-center { flex: 1; max-width: 650px; margin: 0 20px; display: flex; flex-direction: column; gap: 12px; }
        
        .search-bar { position: relative; width: 100%; display: flex; align-items: center; }
        .search-bar i { position: absolute; left: 15px; color: var(--text-muted); pointer-events: none; z-index: 5; }
        body.rtl .search-bar i { left: auto; right: 15px; }
        .search-bar input {
            width: 100%; background: var(--bg); border: 1px solid var(--border);
            padding: 12px 15px 12px 45px; border-radius: 12px; color: var(--text);
            outline: none; transition: 0.3s; box-sizing: border-box;
        }
        body.rtl .search-bar input { padding: 12px 45px 12px 15px; }

        .category-nav { display: flex; gap: 10px; overflow-x: auto; padding-bottom: 4px; scrollbar-width: none; }
        .cat-item {
            background: var(--card-bg); border: 1px solid var(--border); color: var(--text-muted);
            padding: 6px 14px; border-radius: 10px; font-size: 13px; cursor: pointer;
            display: flex; align-items: center; gap: 8px; transition: 0.2s; white-space: nowrap;
        }
        .cat-item:hover { border-color: var(--primary); color: var(--text); }
        .cat-item.active { background: var(--primary); color: white; border-color: var(--primary); }
        .cat-count { font-size: 10px; background: rgba(0,0,0,0.3); padding: 2px 6px; border-radius: 6px; font-weight: bold; }

        .grid {
            display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 25px; padding: 40px 30px; max-width: 1500px; margin: 0 auto;
        }

        .card {
            background: var(--card-bg); border-radius: 20px; border: 1px solid var(--border);
            overflow: hidden; position: relative; transition: 0.4s cubic-bezier(0.2, 1, 0.2, 1);
            backdrop-filter: blur(10px); animation: fadeInUp 0.6s ease-out forwards;
            display: flex; flex-direction: column; aspect-ratio: 16/11;
        }
        @keyframes fadeInUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }
        .card:hover { transform: translateY(-10px); border-color: var(--primary); box-shadow: 0 20px 40px rgba(0,0,0,0.4); }

        .card-thumb { width: 100%; height: 70%; background: #000; cursor: pointer; overflow: hidden; position: relative; }
        .card-thumb img { width: 100%; height: 100%; object-fit: cover; display: block; transition: 0.5s; }
        .card:hover .card-thumb img { transform: scale(1.05); }

        .card-body { padding: 15px; flex-grow: 1; display: flex; flex-direction: column; justify-content: space-between; }
        .card-body h3 { margin: 2px 0; font-size: 16px; font-weight: 700; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .project-date { font-size: 10px; color: var(--text-muted); display: flex; align-items: center; gap: 5px; margin-bottom: 2px; }

        .dots-btn { 
            position: absolute; top: 12px; right: 12px; background: rgba(0,0,0,0.6); 
            color: white; border-radius: 50%; width: 32px; height: 32px; 
            display: flex; align-items: center; justify-content: center; cursor: pointer; 
            z-index: 10; transition: 0.3s;
        }
        body.rtl .dots-btn { right: auto; left: 12px; }

        .dropdown { 
            position: absolute; top: 50px; right: 12px; background: var(--nav-bg); 
            border: 1px solid var(--border); border-radius: 12px; display: none; 
            flex-direction: column; overflow: hidden; box-shadow: 0 15px 30px rgba(0,0,0,0.6); 
            z-index: 100; transform-origin: top right;
        }
        body.rtl .dropdown { right: auto; left: 12px; transform-origin: top left; }
        .dropdown.active { display: flex; animation: menuIn 0.25s ease-out; }
        @keyframes menuIn { from { opacity: 0; transform: scale(0.85); } to { opacity: 1; transform: scale(1); } }

        .dropdown button { padding: 10px 16px; border: none; background: none; color: var(--text); text-align: left; cursor: pointer; font-size: 13px; display: flex; align-items: center; gap: 10px; transition: 0.2s; width: 100%; }
        body.rtl .dropdown button { text-align: right; }
        .dropdown button:hover { background: var(--primary); color: white; }

        .btn { display: inline-flex; align-items: center; gap: 10px; padding: 12px 24px; border-radius: 14px; border: none; font-weight: 700; cursor: pointer; transition: 0.3s; }
        .btn-primary { background: var(--primary); color: white; }
        .btn-ghost { background: transparent; color: var(--text); border: 1px solid var(--border); }

        .overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.85); display: none; align-items: center; justify-content: center; z-index: 2000; backdrop-filter: blur(15px); }
        .modal { background: var(--card-bg); width: 90%; max-width: 550px; border-radius: 30px; padding: 35px; border: 1px solid var(--border); max-height: 85vh; overflow-y: auto; }

        .thumb-slot { position: relative; aspect-ratio: 16/9; background: var(--bg); border: 1.5px dashed var(--border); border-radius: 15px; overflow: hidden; display: flex; align-items: center; justify-content: center; cursor: pointer; }
        .thumb-slot img { width: 100%; height: 100%; object-fit: cover; display: none; }
        
        .check-item { background: var(--bg); border: 1px solid var(--border); padding: 8px 12px; border-radius: 12px; display: flex; align-items: center; gap: 6px; cursor: pointer; white-space: nowrap; font-size: 12px; }
        .check-item input { cursor: pointer; }
        .checkbox-group { display: flex; flex-wrap: nowrap; overflow-x: auto; gap: 8px; padding-bottom: 5px; scrollbar-width: none; }
        .hidden { display: none !important; }
    </style>
</head>
<body>

<canvas id="bgCanvas"></canvas>

<header>
    <div style="display:flex; align-items:center; gap:12px;">
        <div style="width:42px; height:42px; background:var(--primary); border-radius:12px; display:flex; align-items:center; justify-content:center;"><i data-lucide="zap" size="24" color="white"></i></div>
        <h1 style="font-size:24px; margin:0; letter-spacing:-1px; font-weight:800;">Clipflow<span style="color:var(--primary)">.</span></h1>
    </div>

    <div class="header-center">
        <div class="search-bar">
            <i data-lucide="search" size="18"></i>
            <input type="text" id="mainSearch" data-i18n="searchPlaceholder" placeholder="Search projects..." oninput="renderProjects()">
        </div>
        <div class="category-nav" id="catNav">
            <div class="cat-item active" onclick="setFilter('all')"><i data-lucide="layout-grid" size="14"></i> <span data-i18n="catAll">All</span> <span class="cat-count" id="cnt-all">0</span></div>
            <div class="cat-item" onclick="setFilter('youtube')"><i data-lucide="youtube" size="14"></i> YouTube <span class="cat-count" id="cnt-youtube">0</span></div>
            <div class="cat-item" onclick="setFilter('shorts')"><i data-lucide="play" size="14"></i> YT Shorts <span class="cat-count" id="cnt-shorts">0</span></div>
            <div class="cat-item" onclick="setFilter('reels')"><i data-lucide="instagram" size="14"></i> Instagram <span class="cat-count" id="cnt-reels">0</span></div>
            <div class="cat-item" onclick="setFilter('tiktok')"><i data-lucide="music" size="14"></i> TikTok <span class="cat-count" id="cnt-tiktok">0</span></div>
            <div class="cat-item" onclick="setFilter('fbshorts')"><i data-lucide="facebook" size="14"></i> FB Shorts <span class="cat-count" id="cnt-fb">0</span></div>
        </div>
    </div>

    <div style="display:flex; gap:12px;">
        <button class="btn btn-ghost" onclick="toggleLanguage()" id="langBtn">AR</button>
        <button class="btn btn-ghost" onclick="toggleTheme()"><i data-lucide="sun" id="themeIcon"></i></button>
        <button class="btn btn-primary" onclick="openModal('add')"><i data-lucide="plus"></i> <span data-i18n="newProject">New</span></button>
    </div>
</header>

<main>
    <div id="projectsContainer" class="grid"></div>
    <div id="setupView" style="text-align:center; padding:120px 0;" class="hidden">
        <i data-lucide="folder-lock" size="64" style="opacity:0.2; margin-bottom:20px;"></i>
        <h2 style="opacity:0.6" data-i18n="welcomeMsg">Welcome. Please connect your workspace.</h2>
        <button class="btn btn-primary" onclick="initWorkspace()"><i data-lucide="hard-drive"></i> <span data-i18n="selectFolder">Select Folder</span></button>
    </div>
</main>

<div class="overlay" id="formModal">
    <div class="modal">
        <h2 id="modalTitle" style="margin-top:0" data-i18n="createProject">Create Project</h2>
        
        <div id="videoUploadBox" style="margin-bottom:20px;">
            <div onclick="triggerVideo()" id="dropZone" style="border:2.5px dashed var(--primary); padding:35px; text-align:center; border-radius:20px; cursor:pointer;">
                <i data-lucide="upload-cloud" size="32"></i><br>
                <span id="videoLabelText" data-i18n="clickUpload">Click to Upload Video (.mp4)</span>
            </div>
        </div>

        <div style="display:grid; grid-template-columns: repeat(3, 1fr); gap:12px; margin-bottom:20px;">
            <div class="thumb-slot" onclick="pickThumb(0)">
                <button type="button" class="remove-thumb-btn" style="position:absolute; top:5px; right:5px; background:var(--danger); border:none; border-radius:50%; color:white; width:24px; height:24px; cursor:pointer; display:none; z-index:5;" id="rm0" onclick="removeThumb(event, 0)">×</button>
                <img id="pre0" alt="thumb"><i data-lucide="image-plus"></i>
            </div>
            <div class="thumb-slot" onclick="pickThumb(1)">
                <button type="button" class="remove-thumb-btn" style="position:absolute; top:5px; right:5px; background:var(--danger); border:none; border-radius:50%; color:white; width:24px; height:24px; cursor:pointer; display:none; z-index:5;" id="rm1" onclick="removeThumb(event, 1)">×</button>
                <img id="pre1" alt="thumb"><i data-lucide="image-plus"></i>
            </div>
            <div class="thumb-slot" onclick="pickThumb(2)">
                <button type="button" class="remove-thumb-btn" style="position:absolute; top:5px; right:5px; background:var(--danger); border:none; border-radius:50%; color:white; width:24px; height:24px; cursor:pointer; display:none; z-index:5;" id="rm2" onclick="removeThumb(event, 2)">×</button>
                <img id="pre2" alt="thumb"><i data-lucide="image-plus"></i>
            </div>
        </div>

        <div style="display:grid; grid-template-columns: 1fr; gap:15px;">
            <div>
                <label style="font-size:12px; color:var(--text-muted)" data-i18n="dateLabel">Project Date</label>
                <input type="date" id="projDate" style="width:100%; padding:14px; background:var(--bg); border:1px solid var(--border); border-radius:12px; color:var(--text); box-sizing:border-box;">
            </div>
            <input type="text" id="projTitle" data-i18n="titlePlaceholder" placeholder="Project Title" style="width:100%; padding:14px; background:var(--bg); border:1px solid var(--border); border-radius:12px; color:var(--text); box-sizing:border-box;">
            <textarea id="projDesc" data-i18n="descPlaceholder" placeholder="Description..." rows="3" style="width:100%; padding:14px; background:var(--bg); border:1px solid var(--border); border-radius:12px; color:var(--text); box-sizing:border-box;"></textarea>
        </div>

        <div class="checkbox-group" style="margin-top:15px;">
            <label class="check-item"><input type="checkbox" value="youtube"> YouTube</label>
            <label class="check-item"><input type="checkbox" value="shorts"> YT Shorts</label>
            <label class="check-item"><input type="checkbox" value="reels"> Instagram</label>
            <label class="check-item"><input type="checkbox" value="tiktok"> TikTok</label>
            <label class="check-item"><input type="checkbox" value="fbshorts"> FB Shorts</label>
        </div>

        <div style="display:flex; gap:12px; margin-top:30px;">
            <button class="btn btn-ghost" style="flex:1" onclick="closeModal()" data-i18n="cancel">Cancel</button>
            <button class="btn btn-primary" style="flex:2" onclick="saveData()"><i data-lucide="save"></i> <span data-i18n="saveBtn">Save Project</span></button>
        </div>
    </div>
</div>

<script>
    let workspace = null;
    let projects = [];
    let selectedVideo = null;
    let tempThumbs = [null, null, null];
    let editMode = false;
    let currentEditName = null;
    let currentLang = localStorage.getItem('clipflow_lang') || 'en';
    let currentFilter = 'all';

    const i18n = {
        en: { searchPlaceholder: "Find a project...", newProject: "New Project", welcomeMsg: "Connect workspace", selectFolder: "Select Folder", createProject: "Create Project", editProject: "Edit Project", videoLabel: "Video (.mp4)", clickUpload: "Upload Video", thumbLabel: "Thumbnails", dateLabel: "Project Date", titlePlaceholder: "Project Title", descPlaceholder: "Description...", platformLabel: "Platforms:", cancel: "Cancel", saveBtn: "Save Project", edit: "Edit", download: "Download ZIP", delete: "Delete", catAll: "All" },
        ar: { searchPlaceholder: "ابحث عن مشروع...", newProject: "مشروع جديد", welcomeMsg: "يرجى ربط مجلد العمل", selectFolder: "اختيار المجلد", createProject: "إنشاء مشروع", editProject: "تعديل مشروع", videoLabel: "الفيديو (.mp4)", clickUpload: "اضغط لرفع فيديو", thumbLabel: "الصور المصغرة", dateLabel: "تاريخ المشروع", titlePlaceholder: "عنوان المشروع", descPlaceholder: "وصف المشروع...", platformLabel: "المنصات:", cancel: "إلغاء", saveBtn: "حفظ المشروع", edit: "تعديل", download: "تحميل ZIP", delete: "حذف", catAll: "الكل" }
    };

    const PLATFORM_ICONS = {
        youtube: '<i data-lucide="youtube" size="16"></i>',
        shorts: '<i data-lucide="play" size="16"></i>',
        reels: '<i data-lucide="instagram" size="16"></i>',
        tiktok: '<i data-lucide="music" size="16"></i>',
        fbshorts: '<i data-lucide="facebook" size="16"></i>'
    };

    async function openDB() {
        return new Promise(res => {
            const req = indexedDB.open("ClipflowDB", 1);
            req.onupgradeneeded = () => req.result.createObjectStore("settings");
            req.onsuccess = () => res(req.result);
        });
    }

    async function initWorkspace() {
        try {
            workspace = await window.showDirectoryPicker({ mode: 'readwrite' });
            const db = await openDB();
            const tx = db.transaction("settings", "readwrite");
            tx.objectStore("settings").put(workspace, "folderHandle");
            document.getElementById('setupView').classList.add('hidden');
            loadProjects();
        } catch(e) { console.error("Workspace access denied", e); }
    }

    async function autoConnect() {
        const db = await openDB();
        const req = db.transaction("settings").objectStore("settings").get("folderHandle");
        req.onsuccess = async () => {
            const handle = req.result;
            if (handle && (await handle.queryPermission({mode: 'readwrite'})) === 'granted') {
                workspace = handle;
                document.getElementById('setupView').classList.add('hidden');
                loadProjects();
            } else {
                document.getElementById('setupView').classList.remove('hidden');
            }
        };
    }

    async function loadProjects() {
        projects = [];
        if(!workspace) return;
        const root = await workspace.getDirectoryHandle('Clipflow_Projects', { create: true });
        for await (const [name, handle] of root.entries()) {
            if(handle.kind === 'directory') {
                try {
                    const mFile = await (await handle.getFileHandle('meta.json')).getFile();
                    const meta = JSON.parse(await mFile.text());
                    const vFile = await handle.getFileHandle('video.mp4');
                    projects.push({ name, meta, videoFile: vFile });
                } catch(e) {}
            }
        }
        updateCounters();
        renderProjects();
    }

    function updateCounters() {
        document.getElementById('cnt-all').innerText = projects.length;
        document.getElementById('cnt-youtube').innerText = projects.filter(p => p.meta.platforms.includes('youtube')).length;
        document.getElementById('cnt-shorts').innerText = projects.filter(p => p.meta.platforms.includes('shorts')).length;
        document.getElementById('cnt-reels').innerText = projects.filter(p => p.meta.platforms.includes('reels')).length;
        document.getElementById('cnt-tiktok').innerText = projects.filter(p => p.meta.platforms.includes('tiktok')).length;
        document.getElementById('cnt-fb').innerText = projects.filter(p => p.meta.platforms.includes('fbshorts')).length;
    }

    function setFilter(cat) {
        currentFilter = cat;
        document.querySelectorAll('.cat-item').forEach(el => el.classList.remove('active'));
        event.currentTarget.classList.add('active');
        renderProjects();
    }

    function renderProjects() {
        const container = document.getElementById('projectsContainer');
        const q = document.getElementById('mainSearch').value.toLowerCase();
        container.innerHTML = '';

        const sorted = projects.sort((a,b) => new Date(b.meta.date || 0) - new Date(a.meta.date || 0));

        sorted.forEach((p, idx) => {
            const matchesSearch = p.meta.title.toLowerCase().includes(q);
            const matchesCat = currentFilter === 'all' || p.meta.platforms.includes(currentFilter);
            
            if(!matchesSearch || !matchesCat) return;

            const div = document.createElement('div');
            div.className = `card`;
            div.innerHTML = `
                <div class="dots-btn" onclick="toggleMenu(event, ${idx})"><i data-lucide="more-vertical" size="18"></i></div>
                <div class="dropdown" id="menu-${idx}">
                    <button onclick="openModal('edit', ${idx}, event)"><i data-lucide="edit-3" size="14"></i> ${i18n[currentLang].edit}</button>
                    <button onclick="downloadZip(${idx}, event)"><i data-lucide="download" size="14"></i> ZIP</button>
                    <button onclick="deleteProject(${idx}, event)" style="color:var(--danger)"><i data-lucide="trash-2" size="14"></i> ${i18n[currentLang].delete}</button>
                </div>
                <div class="card-thumb" onclick="playVideo(${idx})">
                    <img src="${p.meta.thumbs[0] || 'https://via.placeholder.com/400x225?text=No+Thumbnail'}">
                </div>
                <div class="card-body">
                    <div>
                        <span class="project-date"><i data-lucide="calendar" size="12"></i> ${p.meta.date || ''}</span>
                        <h3>${p.meta.title}</h3>
                    </div>
                    <div style="display:flex; gap:6px;">
                        ${p.meta.platforms.map(t => `<span style="color:var(--primary)">${PLATFORM_ICONS[t] || t}</span>`).join('')}
                    </div>
                </div>
            `;
            container.appendChild(div);
        });
        lucide.createIcons();
    }

    function toggleMenu(e, idx) {
        e.stopPropagation();
        const menu = document.getElementById(`menu-${idx}`);
        const wasOpen = menu.classList.contains('active');
        document.querySelectorAll('.dropdown').forEach(d => d.classList.remove('active'));
        if(!wasOpen) menu.classList.add('active');
    }

    window.onclick = () => document.querySelectorAll('.dropdown').forEach(d => d.classList.remove('active'));

    function openModal(mode, idx = null, e = null) {
        if(e) e.stopPropagation();
        editMode = mode === 'edit';
        document.getElementById('modalTitle').innerText = editMode ? i18n[currentLang].editProject : i18n[currentLang].createProject;
        document.getElementById('videoUploadBox').classList.toggle('hidden', editMode);
        
        if(editMode) {
            const p = projects[idx];
            currentEditName = p.name;
            document.getElementById('projTitle').value = p.meta.title;
            document.getElementById('projDesc').value = p.meta.desc;
            document.getElementById('projDate').value = p.meta.date || "";
            tempThumbs = [...p.meta.thumbs];
            document.querySelectorAll('.check-item input').forEach(cb => {
                cb.checked = p.meta.platforms.includes(cb.value);
            });
        } else {
            document.getElementById('projTitle').value = "";
            document.getElementById('projDesc').value = "";
            document.getElementById('projDate').value = new Date().toISOString().split('T')[0];
            tempThumbs = [null, null, null];
            selectedVideo = null;
            document.getElementById('videoLabelText').innerText = i18n[currentLang].clickUpload;
            document.querySelectorAll('.check-item input').forEach(cb => cb.checked = false);
        }
        refreshThumbs();
        document.getElementById('formModal').style.display = 'flex';
    }

    async function captureFirstFrame(videoFile) {
        return new Promise((resolve) => {
            const video = document.createElement('video');
            video.preload = 'metadata';
            video.onloadedmetadata = () => {
                video.currentTime = 0.5; // Slight delay to ensure it's not a black frame
            };
            video.onseeked = () => {
                const canvas = document.createElement('canvas');
                canvas.width = video.videoWidth;
                canvas.height = video.videoHeight;
                const ctx = canvas.getContext('2d');
                ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
                resolve(canvas.toDataURL('image/jpeg', 0.8));
            };
            video.src = URL.createObjectURL(videoFile);
        });
    }

    async function saveData() {
        const title = document.getElementById('projTitle').value;
        const date = document.getElementById('projDate').value;
        const desc = document.getElementById('projDesc').value;
        const plats = Array.from(document.querySelectorAll('.check-item input:checked')).map(i => i.value);
        
        if(!title || (!selectedVideo && !editMode)) return alert("Missing Title or Video");

        if (!tempThumbs[0] && selectedVideo) {
            tempThumbs[0] = await captureFirstFrame(selectedVideo);
        }

        const root = await workspace.getDirectoryHandle('Clipflow_Projects', { create: true });
        const folderName = editMode ? currentEditName : title.replace(/[^\w\s]/gi, '').replace(/\s+/g,'_') + "_" + Date.now();
        const pFolder = await root.getDirectoryHandle(folderName, { create: true });

        const mHandle = await pFolder.getFileHandle('meta.json', { create: true });
        const writer = await mHandle.createWritable();
        await writer.write(JSON.stringify({
            title, date, desc,
            platforms: plats, thumbs: tempThumbs,
            timestamp: Date.now()
        }));
        await writer.close();

        if(selectedVideo) {
            const vHandle = await pFolder.getFileHandle('video.mp4', { create: true });
            const vWriter = await vHandle.createWritable();
            await vWriter.write(selectedVideo);
            await vWriter.close();
        }
        closeModal(); 
        loadProjects();
    }

    async function deleteProject(idx, e) {
        e.stopPropagation();
        if(confirm(currentLang === 'ar' ? "حذف هذا المشروع نهائياً؟" : "Delete this project permanently?")) {
            const root = await workspace.getDirectoryHandle('Clipflow_Projects');
            await root.removeEntry(projects[idx].name, { recursive: true });
            loadProjects();
        }
    }

    async function downloadZip(idx, e) {
        e.stopPropagation();
        const p = projects[idx];
        const zip = new JSZip();
        const vFile = await p.videoFile.getFile();
        zip.file("video.mp4", vFile);
        zip.file("metadata.txt", `Title: ${p.meta.title}\nDate: ${p.meta.date}\nPlatforms: ${p.meta.platforms.join(', ')}\nDescription: ${p.meta.desc}`);
        p.meta.thumbs.forEach((img, i) => { if(img) zip.file(`thumb_${i}.png`, img.split(',')[1], {base64: true}); });
        const blob = await zip.generateAsync({type:"blob"});
        saveAs(blob, `${p.meta.title.replace(/\s+/g,'_')}_Archive.zip`);
    }

    function toggleLanguage() {
        currentLang = currentLang === 'en' ? 'ar' : 'en';
        localStorage.setItem('clipflow_lang', currentLang);
        location.reload();
    }

    function toggleTheme() {
        const current = document.documentElement.getAttribute('data-theme');
        const t = current === 'dark' ? 'light' : 'dark';
        document.documentElement.setAttribute('data-theme', t);
        localStorage.setItem('clipflow_theme', t);
        lucide.createIcons();
    }

    function refreshThumbs() {
        tempThumbs.forEach((src, i) => {
            const img = document.getElementById(`pre${i}`);
            const rmBtn = document.getElementById(`rm${i}`);
            const icon = img.nextElementSibling;
            
            if(src) {
                img.src = src; 
                img.style.display = 'block';
                if(icon) icon.style.display = 'none';
                rmBtn.style.display = 'block';
            } else {
                img.style.display = 'none';
                if(icon) icon.style.display = 'block';
                rmBtn.style.display = 'none';
            }
        });
    }

    function removeThumb(e, i) { 
        e.stopPropagation(); 
        tempThumbs[i] = null; 
        refreshThumbs(); 
    }

    function triggerVideo() { 
        const input = document.createElement('input'); 
        input.type = 'file'; 
        input.accept = 'video/mp4'; 
        input.onchange = e => { 
            selectedVideo = e.target.files[0]; 
            document.getElementById('videoLabelText').innerText = selectedVideo.name; 
        }; 
        input.click(); 
    }

    function pickThumb(i) { 
        const input = document.createElement('input'); 
        input.type = 'file'; 
        input.accept = 'image/*'; 
        input.onchange = e => { 
            const r = new FileReader(); 
            r.onload = f => { 
                tempThumbs[i] = f.target.result; 
                refreshThumbs(); 
            }; 
            r.readAsDataURL(e.target.files[0]); 
        }; 
        input.click(); 
    }

    function closeModal() { document.getElementById('formModal').style.display = 'none'; }
    
    async function playVideo(idx) { 
        const f = await projects[idx].videoFile.getFile(); 
        const url = URL.createObjectURL(f); 
        const win = window.open(""); 
        win.document.write(`<body style="margin:0;background:#000;display:flex;align-items:center;justify-content:center;"><video src="${url}" controls autoplay style="max-height:100vh;max-width:100%"></video></body>`); 
    }

    const canvas = document.getElementById('bgCanvas');
    const ctx = canvas.getContext('2d');
    let shapes = [];
    function initShapes() {
        canvas.width = window.innerWidth; canvas.height = window.innerHeight;
        shapes = Array.from({length: 15}, () => ({
            x: Math.random()*canvas.width, y: Math.random()*canvas.height,
            s: Math.random()*150+50, dx: (Math.random()-0.5)*0.5, dy: (Math.random()-0.5)*0.5,
            t: Math.floor(Math.random()*3)
        }));
    }
    function drawShapes() {
        ctx.clearRect(0,0,canvas.width, canvas.height);
        ctx.strokeStyle = getComputedStyle(document.documentElement).getPropertyValue('--text') + '10';
        shapes.forEach(p => {
            ctx.beginPath();
            if(p.t===0) ctx.arc(p.x, p.y, p.s/2, 0, Math.PI*2);
            else if(p.t===1) ctx.rect(p.x, p.y, p.s, p.s);
            else { ctx.moveTo(p.x, p.y); ctx.lineTo(p.x+p.s, p.y); ctx.lineTo(p.x+p.s/2, p.y-p.s); ctx.closePath(); }
            ctx.stroke();
            p.x += p.dx; p.y += p.dy;
            if(p.x < -200 || p.x > canvas.width+200) p.dx *= -1;
            if(p.y < -200 || p.y > canvas.height+200) p.dy *= -1;
        });
        requestAnimationFrame(drawShapes);
    }

    initShapes(); drawShapes();
    autoConnect();

    if(currentLang === 'ar') {
        document.body.classList.add('rtl');
        document.getElementById('langBtn').innerText = 'EN';
        document.querySelectorAll('[data-i18n]').forEach(el => {
            const key = el.getAttribute('data-i18n');
            if(el.tagName === 'INPUT' || el.tagName === 'TEXTAREA') el.placeholder = i18n.ar[key];
            else el.innerText = i18n.ar[key];
        });
    }
    lucide.createIcons();
</script>
</body>
</html>
