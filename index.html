<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clipflow Pro | Creator Workspace</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Cairo:wght@400;700&display=swap');

        :root {
            --primary: #8b5cf6; 
            --primary-glow: rgba(139, 92, 246, 0.3);
            --bg: #030712; 
            --card-bg: rgba(17, 24, 39, 0.7);
            --nav-bg: rgba(3, 7, 18, 0.9);
            --text: #f9fafb;
            --text-muted: #9ca3af;
            --border: rgba(255, 255, 255, 0.08);
            --accent: #10b981;
        }

        body {
            margin: 0; font-family: 'Inter', sans-serif;
            background: var(--bg); color: var(--text);
            transition: background 0.3s; line-height: 1.5;
        }

        #bgCanvas { position: fixed; top: 0; left: 0; z-index: -1; opacity: 0.4; }

        header {
            position: sticky; top: 0; z-index: 1000;
            background: var(--nav-bg); backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--border); padding: 12px 40px;
            display: flex; align-items: center; justify-content: space-between;
        }

        .logo { display: flex; align-items: center; gap: 10px; font-weight: 800; font-size: 22px; }
        .logo-icon { width: 36px; height: 36px; background: linear-gradient(135deg, var(--primary), #d946ef); border-radius: 10px; display: flex; align-items: center; justify-content: center; color: white; }

        /* SEARCH BAR FIX */
        .header-center { flex: 1; max-width: 500px; margin: 0 40px; }
        .search-bar { position: relative; display: flex; align-items: center; }
        .search-bar i { position: absolute; left: 16px; color: var(--text-muted); pointer-events: none; }
        .search-bar input {
            width: 100%; background: rgba(255,255,255,0.05); border: 1px solid var(--border);
            padding: 10px 15px 10px 48px; border-radius: 20px; color: var(--text);
            font-size: 14px; outline: none; transition: 0.2s;
        }
        .search-bar input:focus { border-color: var(--primary); background: rgba(255,255,255,0.08); }

        /* YOUTUBE STYLE DIVISIONS */
        .filter-tabs {
            display: flex; gap: 10px; padding: 15px 40px;
            overflow-x: auto; scrollbar-width: none;
            background: var(--bg); border-bottom: 1px solid var(--border);
        }
        .filter-tabs::-webkit-scrollbar { display: none; }
        .tab {
            padding: 8px 16px; background: rgba(255,255,255,0.05); border-radius: 8px;
            font-size: 13px; font-weight: 600; cursor: pointer; white-space: nowrap;
            border: 1px solid var(--border); transition: 0.2s;
        }
        .tab:hover { background: rgba(255,255,255,0.1); }
        .tab.active { background: var(--primary); border-color: var(--primary); color: white; }

        .grid {
            display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 24px; padding: 30px 40px; max-width: 1600px; margin: 0 auto;
        }

        /* CARD */
        .card {
            background: var(--card-bg); border-radius: 20px; border: 1px solid var(--border);
            overflow: hidden; transition: 0.3s; backdrop-filter: blur(10px);
        }
        .card:hover { transform: translateY(-5px); border-color: rgba(255,255,255,0.2); }

        .card-thumb { width: 100%; background: #000; position: relative; overflow: hidden; cursor: pointer; }
        .ratio-16-9 { aspect-ratio: 16/9; }
        .ratio-9-16 { aspect-ratio: 9/16; }
        .card-thumb img { width: 100%; height: 100%; object-fit: cover; }

        .card-body { padding: 18px; }
        .card-title { font-weight: 700; margin: 0 0 4px 0; font-size: 16px; }
        .card-platform { font-size: 11px; color: var(--primary); font-weight: 800; text-transform: uppercase; margin-bottom: 8px; display: block; }
        .card-meta { font-size: 12px; color: var(--text-muted); display: flex; flex-direction: column; gap: 4px; }
        
        .card-actions { display: flex; gap: 8px; margin-top: 15px; border-top: 1px solid var(--border); padding-top: 15px; }

        .btn { 
            padding: 10px 20px; border-radius: 12px; border: none; font-weight: 600; 
            cursor: pointer; display: inline-flex; align-items: center; gap: 8px; font-size: 14px;
        }
        .btn-primary { background: var(--primary); color: white; }
        .btn-ghost { background: rgba(255,255,255,0.05); color: var(--text); border: 1px solid var(--border); }
        .btn-ghost:hover { background: rgba(255,255,255,0.1); }
        .btn-icon { padding: 8px; border-radius: 10px; }

        /* MODAL */
        .overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.85); backdrop-filter: blur(10px); display: none; align-items: center; justify-content: center; z-index: 2000; }
        .modal { background: #111827; width: 95%; max-width: 550px; border-radius: 24px; padding: 30px; border: 1px solid var(--border); max-height: 90vh; overflow-y: auto; }

        .input-group { margin-bottom: 15px; }
        .input-group label { display: block; font-size: 11px; font-weight: 700; color: var(--text-muted); margin-bottom: 6px; text-transform: uppercase; }
        .input-group input, .input-group textarea, .input-group select {
            width: 100%; background: #030712; border: 1px solid var(--border); padding: 12px; border-radius: 12px; color: var(--text); outline: none; box-sizing: border-box;
        }

        .thumb-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 15px; }
        .thumb-slot { aspect-ratio: 16/9; background: #000; border: 1px solid var(--border); border-radius: 10px; display: flex; align-items: center; justify-content: center; overflow: hidden; cursor: pointer; }
        .thumb-slot img { width: 100%; height: 100%; object-fit: cover; }

        .hidden { display: none !important; }
    </style>
</head>
<body>

<canvas id="bgCanvas"></canvas>

<header>
    <div class="logo">
        <div class="logo-icon"><i data-lucide="clapperboard" size="20"></i></div>
        Clipflow
    </div>

    <div class="header-center">
        <div class="search-bar">
            <i data-lucide="search" size="18"></i>
            <input type="text" id="mainSearch" placeholder="Search projects..." oninput="renderProjects()">
        </div>
    </div>

    <button class="btn btn-primary" onclick="openModal('add')">
        <i data-lucide="plus"></i> New Project
    </button>
</header>

<div class="filter-tabs">
    <div class="tab active" onclick="setFilter('All', this)">All</div>
    <div class="tab" onclick="setFilter('YouTube', this)">YouTube</div>
    <div class="tab" onclick="setFilter('Shorts', this)">YouTube Shorts</div>
    <div class="tab" onclick="setFilter('Instagram', this)">Instagram Reels</div>
    <div class="tab" onclick="setFilter('TikTok', this)">TikTok</div>
    <div class="tab" onclick="setFilter('Facebook', this)">Facebook</div>
</div>

<main>
    <div id="projectsContainer" class="grid"></div>
</main>

<div class="overlay" id="formModal">
    <div class="modal">
        <h2 id="modalTitle" style="margin:0 0 20px 0;">Create Project</h2>
        
        <div class="input-group">
            <label>Platform & Format</label>
            <div style="display:flex; gap:10px;">
                <select id="projPlatform" style="flex:2;">
                    <option value="YouTube">YouTube</option>
                    <option value="Shorts">YouTube Shorts</option>
                    <option value="Instagram">Instagram Reels</option>
                    <option value="TikTok">TikTok</option>
                    <option value="Facebook">Facebook</option>
                </select>
                <select id="projFormat" style="flex:1;">
                    <option value="landscape">$16:9$</option>
                    <option value="portrait">$9:16$</option>
                </select>
            </div>
        </div>

        <div class="input-group">
            <label>Title & Scheduled Date</label>
            <input type="text" id="projTitle" placeholder="Video Title..." style="margin-bottom:10px;">
            <input type="datetime-local" id="projDate">
        </div>

        <div id="videoSection" class="input-group">
            <label>Video File</label>
            <div onclick="triggerVideo()" style="border:2px dashed var(--border); padding:20px; text-align:center; border-radius:12px; cursor:pointer;">
                <p id="videoStatus" style="margin:0; font-size:13px; color:var(--text-muted)">Click to select .mp4 file</p>
            </div>
        </div>

        <label>Thumbnails</label>
        <div class="thumb-grid">
            <div class="thumb-slot" onclick="pickThumb(0)"><img id="pre0" class="hidden"><i data-lucide="image"></i></div>
            <div class="thumb-slot" onclick="pickThumb(1)"><img id="pre1" class="hidden"><i data-lucide="image"></i></div>
            <div class="thumb-slot" onclick="pickThumb(2)"><img id="pre2" class="hidden"><i data-lucide="image"></i></div>
        </div>

        <div style="display:flex; gap:10px; margin-top:25px;">
            <button class="btn btn-ghost" style="flex:1" onclick="closeModal()">Cancel</button>
            <button class="btn btn-primary" style="flex:2" onclick="saveData()">Save Project</button>
        </div>
    </div>
</div>

<script>
    let workspace = null;
    let projects = [];
    let currentFilter = 'All';
    let selectedVideo = null;
    let tempThumbs = [null, null, null];
    let editMode = false;
    let editingFolderName = null;

    async function openDB() {
        return new Promise(res => {
            const req = indexedDB.open("ClipflowProDB", 1);
            req.onupgradeneeded = () => req.result.createObjectStore("settings");
            req.onsuccess = () => res(req.result);
        });
    }

    async function autoConnect() {
        const db = await openDB();
        const req = db.transaction("settings").objectStore("settings").get("folderHandle");
        req.onsuccess = async () => {
            if (req.result) {
                workspace = req.result;
                if (await workspace.queryPermission({mode: 'readwrite'}) === 'granted') loadProjects();
            }
        };
    }

    async function loadProjects() {
        projects = [];
        try {
            const root = await workspace.getDirectoryHandle('Clipflow_Vault', { create: true });
            for await (const [name, handle] of root.entries()) {
                if(handle.kind === 'directory') {
                    const mFile = await (await handle.getFileHandle('meta.json')).getFile();
                    const meta = JSON.parse(await mFile.text());
                    const vFile = await handle.getFileHandle('video.mp4');
                    projects.push({ folderName: name, meta, videoFile: vFile });
                }
            }
        } catch(e) {}
        renderProjects();
    }

    function setFilter(platform, el) {
        currentFilter = platform;
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        el.classList.add('active');
        renderProjects();
    }

    function renderProjects() {
        const container = document.getElementById('projectsContainer');
        const query = document.getElementById('mainSearch').value.toLowerCase();
        container.innerHTML = '';

        const filtered = projects.filter(p => {
            const matchesTab = currentFilter === 'All' || p.meta.platform === currentFilter;
            const matchesSearch = p.meta.title.toLowerCase().includes(query);
            return matchesTab && matchesSearch;
        });

        filtered.forEach((p, idx) => {
            const ratioClass = p.meta.format === 'portrait' ? 'ratio-9-16' : 'ratio-16-9';
            const date = new Date(p.meta.publishDate);
            const isFuture = date > new Date();
            const timeText = isFuture ? `Scheduled: ${date.toLocaleString()}` : `Uploaded: ${date.toLocaleDateString()}`;

            const card = document.createElement('div');
            card.className = 'card';
            card.innerHTML = `
                <div class="card-thumb ${ratioClass}" onclick="playVideo('${p.folderName}')">
                    <img src="${p.meta.thumbs[0] || ''}">
                </div>
                <div class="card-body">
                    <span class="card-platform">${p.meta.platform}</span>
                    <h3 class="card-title">${p.meta.title}</h3>
                    <div class="card-meta">
                        <span><i data-lucide="calendar" size="12"></i> ${timeText}</span>
                    </div>
                    <div class="card-actions">
                        <button class="btn btn-ghost btn-icon" onclick="openModal('edit', '${p.folderName}')"><i data-lucide="edit-3" size="16"></i></button>
                        <button class="btn btn-ghost btn-icon" onclick="downloadZip(${idx})"><i data-lucide="download" size="16"></i></button>
                        <button class="btn btn-ghost btn-icon" style="color:#ef4444" onclick="deleteProject('${p.folderName}')"><i data-lucide="trash-2" size="16"></i></button>
                    </div>
                </div>
            `;
            container.appendChild(card);
        });
        lucide.createIcons();
    }

    function openModal(mode, folderName = null) {
        editMode = mode === 'edit';
        editingFolderName = folderName;
        document.getElementById('formModal').style.display = 'flex';
        
        if(editMode) {
            const p = projects.find(proj => proj.folderName === folderName);
            document.getElementById('modalTitle').innerText = "Edit Project";
            document.getElementById('projTitle').value = p.meta.title;
            document.getElementById('projPlatform').value = p.meta.platform;
            document.getElementById('projFormat').value = p.meta.format;
            document.getElementById('projDate').value = p.meta.publishDate;
            document.getElementById('videoSection').classList.add('hidden'); // Skip video upload on edit
            tempThumbs = [...p.meta.thumbs];
        } else {
            document.getElementById('modalTitle').innerText = "New Project";
            document.getElementById('projTitle').value = "";
            document.getElementById('projDate').value = new Date().toISOString().slice(0, 16);
            document.getElementById('videoSection').classList.remove('hidden');
            tempThumbs = [null, null, null];
        }
        refreshThumbs();
    }

    async function saveData() {
        const title = document.getElementById('projTitle').value;
        const platform = document.getElementById('projPlatform').value;
        const format = document.getElementById('projFormat').value;
        const publishDate = document.getElementById('projDate').value;

        if(!title || (!editMode && !selectedVideo)) return alert("Missing Info");

        const root = await workspace.getDirectoryHandle('Clipflow_Vault', { create: true });
        let folder;

        if(editMode) {
            folder = await root.getDirectoryHandle(editingFolderName);
        } else {
            const folderName = title.replace(/\s+/g, '_') + "_" + Date.now();
            folder = await root.getDirectoryHandle(folderName, { create: true });
            const vFile = await folder.getFileHandle('video.mp4', { create: true });
            const vWriter = await vFile.createWritable();
            await vWriter.write(selectedVideo);
            await vWriter.close();
        }

        const meta = { title, platform, format, publishDate, thumbs: tempThumbs, timestamp: Date.now() };
        const mFile = await folder.getFileHandle('meta.json', { create: true });
        const writer = await mFile.createWritable();
        await writer.write(JSON.stringify(meta));
        await writer.close();

        closeModal();
        loadProjects();
    }

    function closeModal() { document.getElementById('formModal').style.display = 'none'; }
    
    function triggerVideo() {
        const inp = document.createElement('input');
        inp.type = 'file'; inp.accept = 'video/mp4';
        inp.onchange = e => {
            selectedVideo = e.target.files[0];
            document.getElementById('videoStatus').innerText = "Selected: " + selectedVideo.name;
        };
        inp.click();
    }

    function pickThumb(i) {
        const inp = document.createElement('input');
        inp.type = 'file'; inp.accept = 'image/*';
        inp.onchange = e => {
            const reader = new FileReader();
            reader.onload = f => { tempThumbs[i] = f.target.result; refreshThumbs(); };
            reader.readAsDataURL(e.target.files[0]);
        };
        inp.click();
    }

    function refreshThumbs() {
        tempThumbs.forEach((src, i) => {
            const img = document.getElementById(`pre${i}`);
            if(src) { img.src = src; img.classList.remove('hidden'); }
            else { img.classList.add('hidden'); }
        });
    }

    async function deleteProject(folderName) {
        if(confirm("Delete this project?")) {
            const root = await workspace.getDirectoryHandle('Clipflow_Vault');
            await root.removeEntry(folderName, { recursive: true });
            loadProjects();
        }
    }

    // Canvas Background
    const canvas = document.getElementById('bgCanvas');
    const ctx = canvas.getContext('2d');
    function init() {
        canvas.width = window.innerWidth; canvas.height = window.innerHeight;
        ctx.fillStyle = "#8b5cf6";
    }
    window.onresize = init; init();
    autoConnect();
    lucide.createIcons();
</script>
</body>
</html>
