<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clipflow Pro | Stable</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap');

        :root {
            --primary: #6c63ff; --bg: #05060f; --card-bg: rgba(17, 19, 34, 0.8);
            --text: #ffffff; --text-muted: #94a3b8; --border: rgba(255, 255, 255, 0.1); --danger: #ff4757;
        }

        [data-theme="light"] {
            --bg: #f8fafc; --card-bg: rgba(255, 255, 255, 0.8);
            --text: #0f172a; --text-muted: #64748b; --border: rgba(0, 0, 0, 0.1);
        }

        body { margin: 0; font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); transition: 0.3s; overflow-x: hidden; }
        #bgCanvas { position: fixed; top: 0; left: 0; z-index: -1; pointer-events: none; }

        header {
            position: sticky; top: 0; z-index: 1000; background: var(--bg); 
            backdrop-filter: blur(12px); border-bottom: 1px solid var(--border); 
            padding: 15px 30px; display: flex; align-items: center; justify-content: space-between;
        }

        /* --- THE FIX: Uniform Grid & Vertical Constraint --- */
        .grid {
            display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
            gap: 25px; padding: 40px 30px; max-width: 1400px; margin: 0 auto;
        }

        .card {
            background: var(--card-bg); border-radius: 20px; border: 1px solid var(--border);
            height: 400px; /* Forces uniform height */
            display: flex; flex-direction: column; overflow: hidden; position: relative; transition: 0.3s;
        }
        .card:hover { transform: translateY(-5px); border-color: var(--primary); }

        .card-thumb { 
            width: 100%; height: 250px; background: #000; 
            display: flex; align-items: center; justify-content: center; cursor: pointer; overflow: hidden;
        }
        
        /* Ensures vertical videos don't stretch the card */
        .card.vertical .card-thumb img { height: 100%; width: auto; object-fit: contain; }
        .card.horizontal .card-thumb img { width: 100%; height: 100%; object-fit: cover; }

        .card-body { padding: 15px; flex-grow: 1; display: flex; flex-direction: column; justify-content: space-between; }
        .card-body h3 { margin: 0; font-size: 16px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        
        .platform-tags { display: flex; flex-wrap: wrap; gap: 4px; margin-top: 8px; }
        .tag { font-size: 9px; padding: 3px 8px; border-radius: 4px; background: var(--primary); color: white; font-weight: bold; text-transform: uppercase; }

        /* --- UI Elements --- */
        .btn { padding: 10px 20px; border-radius: 10px; border: none; font-weight: 700; cursor: pointer; transition: 0.2s; }
        .btn-primary { background: var(--primary); color: white; }
        .overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.8); display: none; align-items: center; justify-content: center; z-index: 2000; backdrop-filter: blur(10px); }
        .modal { background: var(--card-bg); width: 90%; max-width: 500px; border-radius: 20px; padding: 30px; border: 1px solid var(--border); }
        .dots-btn { position: absolute; top: 10px; right: 10px; background: rgba(0,0,0,0.5); color: white; border-radius: 50%; width: 30px; height: 30px; display: flex; align-items: center; justify-content: center; cursor: pointer; z-index: 10; }
        .dropdown { position: absolute; top: 45px; right: 10px; background: var(--card-bg); border: 1px solid var(--border); border-radius: 10px; display: none; flex-direction: column; overflow: hidden; z-index: 100; }
        .dropdown button { padding: 10px 15px; border: none; background: none; color: var(--text); text-align: left; cursor: pointer; border-bottom: 1px solid var(--border); }
        
        .hidden { display: none; }
    </style>
</head>
<body>

<canvas id="bgCanvas"></canvas>

<header>
    <h1 style="font-size:20px; margin:0;">Clipflow<span style="color:var(--primary)">.</span></h1>
    <div style="display:flex; gap:10px;">
        <button id="restoreBtn" class="btn btn-primary hidden" onclick="restoreWorkspace()">📂 Restore Workspace</button>
        <button class="btn btn-primary" onclick="openModal('add')">＋ New</button>
    </div>
</header>

<main>
    <div id="projectsContainer" class="grid"></div>
    <div id="setupView" style="text-align:center; padding:100px 0;" class="hidden">
        <h2>Workspace Disconnected</h2>
        <button class="btn btn-primary" onclick="initWorkspace()">Select Folder Location</button>
    </div>
</main>

<div class="overlay" id="formModal">
    <div class="modal">
        <h3 id="modalTitle">Project Settings</h3>
        <input type="text" id="projTitle" placeholder="Project Title">
        <textarea id="projDesc" placeholder="Description" rows="3" style="width:100%; border-radius:8px; background:var(--bg); color:var(--text); border:1px solid var(--border); padding:10px; box-sizing:border-box;"></textarea>
        
        <div style="margin:15px 0;">
            <label style="font-size:12px; color:var(--text-muted)">Platforms (Multi-select):</label>
            <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px; margin-top:5px;">
                <label><input type="checkbox" class="plt" value="youtube"> YouTube</label>
                <label><input type="checkbox" class="plt" value="shorts"> Shorts</label>
                <label><input type="checkbox" class="plt" value="reels"> Reels</label>
                <label><input type="checkbox" class="plt" value="tiktok"> TikTok</label>
            </div>
        </div>

        <button class="btn btn-primary" style="width:100%" onclick="saveData()">Save Project</button>
        <button class="btn" style="width:100%; margin-top:10px; background:none; color:var(--text)" onclick="closeModal()">Cancel</button>
    </div>
</div>

<script>
    let workspace = null;
    let projects = [];

    // --- 1. PERSISTENCE ENGINE (IndexedDB) ---
    const dbName = "ClipflowDB";
    async function saveHandle(handle) {
        const db = await openDB();
        const tx = db.transaction("settings", "readwrite");
        tx.objectStore("settings").put(handle, "folderHandle");
    }

    async function restoreWorkspace() {
        const db = await openDB();
        const tx = db.transaction("settings", "readonly");
        const handle = await tx.objectStore("settings").get("folderHandle");
        if (handle) {
            // Check if we still have permission
            if (await handle.queryPermission({mode: 'readwrite'}) === 'granted') {
                workspace = handle;
                onWorkspaceConnected();
            } else {
                // Just ask for permission once, don't make them re-pick
                if (await handle.requestPermission({mode: 'readwrite'}) === 'granted') {
                    workspace = handle;
                    onWorkspaceConnected();
                }
            }
        }
    }

    function openDB() {
        return new Promise((resolve) => {
            const req = indexedDB.open(dbName, 1);
            req.onupgradeneeded = () => req.result.createObjectStore("settings");
            req.onsuccess = () => resolve(req.result);
        });
    }

    // --- 2. WORKSPACE & LOADING ---
    async function initWorkspace() {
        workspace = await window.showDirectoryPicker({ mode: 'readwrite' });
        await saveHandle(workspace);
        onWorkspaceConnected();
    }

    function onWorkspaceConnected() {
        document.getElementById('setupView').classList.add('hidden');
        document.getElementById('restoreBtn').classList.add('hidden');
        loadProjects();
    }

    async function loadProjects() {
        projects = [];
        const root = await workspace.getDirectoryHandle('Clipflow_Vault', { create: true });
        for await (const [name, handle] of root.entries()) {
            if(handle.kind === 'directory') {
                try {
                    const mFile = await (await handle.getFileHandle('meta.json')).getFile();
                    const meta = JSON.parse(await mFile.text());
                    projects.push({ name, meta, handle });
                } catch(e) {}
            }
        }
        renderProjects();
    }

    function renderProjects() {
        const container = document.getElementById('projectsContainer');
        container.innerHTML = '';
        projects.sort((a,b) => b.meta.timestamp - a.meta.timestamp).forEach((p, idx) => {
            const isVertical = p.meta.platforms.some(x => ['reels','tiktok','shorts'].includes(x));
            const div = document.createElement('div');
            div.className = `card ${isVertical ? 'vertical' : 'horizontal'}`;
            div.innerHTML = `
                <div class="dots-btn" onclick="toggleMenu(event, ${idx})">⋮</div>
                <div class="dropdown" id="menu-${idx}">
                    <button onclick="deleteProject(${idx})">🗑️ Delete</button>
                </div>
                <div class="card-thumb">
                    <img src="${p.meta.thumbs?.[0] || 'https://via.placeholder.com/300x500?text=Clipflow'}">
                </div>
                <div class="card-body">
                    <h3>${p.meta.title}</h3>
                    <div class="platform-tags">${p.meta.platforms.map(t => `<span class="tag">${t}</span>`).join('')}</div>
                </div>
            `;
            container.appendChild(div);
        });
    }

    // --- 3. UI & BACKGROUND ---
    const canvas = document.getElementById('bgCanvas');
    const ctx = canvas.getContext('2d');
    function draw() {
        canvas.width = window.innerWidth; canvas.height = window.innerHeight;
        const color = getComputedStyle(document.documentElement).getPropertyValue('--text');
        ctx.strokeStyle = color; ctx.globalAlpha = 0.05; ctx.lineWidth = 2;
        ctx.strokeRect(canvas.width * 0.1, canvas.height * 0.2, 300, 300);
        ctx.beginPath(); ctx.arc(canvas.width * 0.8, canvas.height * 0.7, 150, 0, Math.PI*2); ctx.stroke();
        requestAnimationFrame(draw);
    }
    draw();

    function openModal() { document.getElementById('formModal').style.display = 'flex'; }
    function closeModal() { document.getElementById('formModal').style.display = 'none'; }
    function toggleMenu(e, i) {
        e.stopPropagation();
        const d = document.getElementById(`menu-${i}`);
        d.style.display = d.style.display === 'flex' ? 'none' : 'flex';
    }

    async function saveData() {
        const title = document.getElementById('projTitle').value;
        const plats = Array.from(document.querySelectorAll('.plt:checked')).map(c => c.value);
        if(!title) return;

        const root = await workspace.getDirectoryHandle('Clipflow_Vault', { create: true });
        const pFolder = await root.getDirectoryHandle(title.replace(/\s/g,'_'), { create: true });
        const mHandle = await pFolder.getFileHandle('meta.json', { create: true });
        const writer = await mHandle.createWritable();
        await writer.write(JSON.stringify({ title, platforms: plats, timestamp: Date.now() }));
        await writer.close();
        closeModal(); loadProjects();
    }

    async function deleteProject(idx) {
        const root = await workspace.getDirectoryHandle('Clipflow_Vault');
        await root.removeEntry(projects[idx].name, { recursive: true });
        loadProjects();
    }

    // Check for existing handle on startup
    window.onload = async () => {
        const db = await openDB();
        const tx = db.transaction("settings", "readonly");
        const handle = await tx.objectStore("settings").get("folderHandle");
        if (handle) {
            document.getElementById('restoreBtn').classList.remove('hidden');
        } else {
            document.getElementById('setupView').classList.remove('hidden');
        }
    };
</script>
</body>
</html>
