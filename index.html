<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clipflow Pro | Video Workspace</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap');

        :root {
            --primary: #6c63ff; --primary-hover: #5a52d6;
            --bg: #05060f; --card-bg: rgba(17, 19, 34, 0.8);
            --nav-bg: rgba(13, 15, 30, 0.9); --text: #ffffff;
            --text-muted: #94a3b8; --border: rgba(255, 255, 255, 0.1);
            --danger: #ff4757; --success: #2ed573;
        }

        [data-theme="light"] {
            --bg: #f8fafc; --card-bg: rgba(255, 255, 255, 0.8);
            --nav-bg: rgba(255, 255, 255, 0.9); --text: #0f172a;
            --text-muted: #64748b; --border: rgba(0, 0, 0, 0.1);
        }

        body {
            margin: 0; font-family: 'Inter', sans-serif;
            background: var(--bg); color: var(--text);
            transition: 0.3s; line-height: 1.6; overflow-x: hidden;
        }

        /* --- Animations --- */
        @keyframes pulse-focus {
            0% { box-shadow: 0 0 0 0px rgba(108, 99, 255, 0.4); }
            100% { box-shadow: 0 0 0 10px rgba(108, 99, 255, 0); }
        }

        .focus-anim:focus-within {
            border-color: var(--primary) !important;
            animation: pulse-focus 0.6s ease-out;
        }

        header {
            position: sticky; top: 0; z-index: 1000;
            background: var(--nav-bg); backdrop-filter: blur(12px);
            border-bottom: 1px solid var(--border); padding: 15px 30px;
            display: flex; align-items: center; justify-content: space-between;
        }

        .search-bar { flex: 1; max-width: 450px; margin: 0 20px; position: relative; }
        .search-bar input {
            width: 100%; background: var(--bg); border: 1px solid var(--border);
            padding: 12px 15px 12px 40px; border-radius: 25px; color: var(--text);
            outline: none; transition: 0.3s;
        }

        .grid {
            display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 25px; padding: 40px 30px; max-width: 1600px; margin: 0 auto;
        }

        .card {
            background: var(--card-bg); border-radius: 24px; border: 1px solid var(--border);
            overflow: hidden; position: relative; transition: 0.4s cubic-bezier(0.2, 1, 0.2, 1);
            backdrop-filter: blur(10px); height: 450px; display: flex; flex-direction: column;
        }

        .card:hover { transform: translateY(-8px); border-color: var(--primary); box-shadow: 0 20px 40px rgba(0,0,0,0.3); }

        /* --- Smart Thumbnail Container --- */
        .card-thumb { 
            width: 100%; height: 280px; background: #000; 
            cursor: pointer; overflow: hidden; display: flex; align-items: center; justify-content: center;
            position: relative;
        }
        
        /* The logic: Vertical clips get contained (show all), wide clips cover */
        .card.vertical .card-thumb img { height: 100%; width: auto; object-fit: contain; }
        .card.horizontal .card-thumb img { width: 100%; height: 100%; object-fit: cover; }

        .card-body { padding: 20px; flex-grow: 1; display: flex; flex-direction: column; justify-content: space-between; }
        .card-body h3 { margin: 0; font-size: 18px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        
        .tag { font-size: 10px; padding: 4px 10px; border-radius: 6px; background: var(--primary); color: white; font-weight: 800; text-transform: uppercase; }

        .overlay {
            position: fixed; inset: 0; background: rgba(0,0,0,0.85);
            display: none; align-items: center; justify-content: center;
            z-index: 2000; backdrop-filter: blur(15px);
        }

        .modal {
            background: var(--card-bg); width: 95%; max-width: 600px;
            border-radius: 30px; padding: 30px; border: 1px solid var(--border);
            max-height: 90vh; overflow-y: auto;
        }

        .btn { padding: 12px 20px; border-radius: 12px; border: none; font-weight: 700; cursor: pointer; transition: 0.2s; display: inline-flex; align-items: center; gap: 8px; }
        .btn-primary { background: var(--primary); color: white; }
        .btn-ghost { background: transparent; color: var(--text); border: 1px solid var(--border); }
        .btn-danger { background: var(--danger); color: white; }

        .thumb-box { 
            aspect-ratio: 1; background: var(--bg); border: 1px solid var(--border); 
            border-radius: 15px; overflow: hidden; position: relative; 
            display: flex; align-items: center; justify-content: center; cursor: pointer;
        }
        .thumb-del { position: absolute; top: 5px; right: 5px; background: var(--danger); border-radius: 50%; width: 22px; height: 22px; color: white; font-size: 12px; display: none; align-items: center; justify-content: center; z-index: 5; }

        .hidden { display: none !important; }
    </style>
</head>
<body>

<header>
    <div style="display:flex; align-items:center; gap:12px;">
        <div style="width:38px; height:38px; background:linear-gradient(45deg, var(--primary), #a29bfe); border-radius:10px; display:grid; place-items:center; font-weight:bold;">C</div>
        <h1 style="font-size:22px; margin:0; letter-spacing:-1px;">Clipflow<span style="color:var(--primary)">.</span>Pro</h1>
    </div>
    
    <div class="search-bar">
        <input type="text" id="mainSearch" placeholder="🔍 Search your clips..." oninput="renderProjects()">
    </div>

    <div style="display:flex; gap:12px;">
        <button id="restoreBtn" class="btn btn-ghost hidden" onclick="restoreWorkspace()">📂 Restore</button>
        <button class="btn btn-ghost" onclick="toggleTheme()">🌓</button>
        <button class="btn btn-primary" onclick="openModal('add')">＋ New Project</button>
    </div>
</header>

<main id="mainContent">
    <div id="projectsContainer" class="grid"></div>
    <div id="setupView" style="text-align:center; padding:120px 20px;" class="hidden">
        <h2 style="font-size:32px; margin-bottom:10px;">Ready to organize?</h2>
        <p style="color:var(--text-muted); margin-bottom:30px;">Select a local folder to use as your high-speed workspace.</p>
        <button class="btn btn-primary" style="padding:18px 40px; font-size:18px;" onclick="initWorkspace()">🚀 Select Workspace Folder</button>
    </div>
</main>

<div class="overlay" id="formModal">
    <div class="modal">
        <h2 id="modalTitle" style="margin-top:0">Create Project</h2>
        
        <div id="videoUploadBox" class="focus-anim" style="margin-bottom:20px;">
            <label style="font-size:12px; color:var(--text-muted); text-transform:uppercase; font-weight:700;">1. Source Video</label>
            <div onclick="triggerVideo()" id="dropZone" style="border:2px dashed var(--border); padding:40px; text-align:center; border-radius:20px; cursor:pointer; margin-top:10px; transition:0.3s;">
                <div id="videoIcon" style="font-size:30px; margin-bottom:10px;">🎬</div>
                <span id="videoLabel" style="font-weight:600;">Click to upload MP4</span>
                <p id="videoStatus" style="font-size:11px; color:var(--text-muted); margin-top:5px;">System will auto-generate thumb if left blank</p>
            </div>
        </div>

        <label style="font-size:12px; color:var(--text-muted); text-transform:uppercase; font-weight:700;">2. Visuals (Set of 3)</label>
        <div style="display:grid; grid-template-columns: repeat(3, 1fr); gap:15px; margin:10px 0 25px;">
            <div class="thumb-box focus-anim" id="box0" onclick="pickThumb(0)">
                <div class="thumb-del" id="del0" onclick="removeThumb(event, 0)">×</div>
                <img id="pre0" style="width:100%; height:100%; object-fit:contain; display:none">
                <span style="font-size:20px; opacity:0.3;">📸</span>
            </div>
            <div class="thumb-box focus-anim" id="box1" onclick="pickThumb(1)">
                <div class="thumb-del" id="del1" onclick="removeThumb(event, 1)">×</div>
                <img id="pre1" style="width:100%; height:100%; object-fit:contain; display:none">
                <span style="font-size:20px; opacity:0.3;">📸</span>
            </div>
            <div class="thumb-box focus-anim" id="box2" onclick="pickThumb(2)">
                <div class="thumb-del" id="del2" onclick="removeThumb(event, 2)">×</div>
                <img id="pre2" style="width:100%; height:100%; object-fit:contain; display:none">
                <span style="font-size:20px; opacity:0.3;">📸</span>
            </div>
        </div>

        <label style="font-size:12px; color:var(--text-muted); text-transform:uppercase; font-weight:700;">3. Details</label>
        <input type="text" id="projTitle" placeholder="Project Title..." class="focus-anim" style="width:100%; padding:15px; background:var(--bg); border:1px solid var(--border); border-radius:12px; color:var(--text); margin:10px 0; box-sizing:border-box; outline:none;">
        <textarea id="projDesc" placeholder="Caption/Description..." rows="3" class="focus-anim" style="width:100%; padding:15px; background:var(--bg); border:1px solid var(--border); border-radius:12px; color:var(--text); box-sizing:border-box; outline:none; resize:none;"></textarea>

        <div style="display:flex; gap:12px; margin-top:30px;">
            <button class="btn btn-ghost" style="flex:1" onclick="closeModal()">Cancel</button>
            <button class="btn btn-primary" style="flex:2; justify-content:center;" onclick="saveData()">💾 Save Project</button>
        </div>
    </div>
</div>

<script>
    let workspace = null;
    let projects = [];
    let selectedVideo = null;
    let tempThumbs = [null, null, null];
    let editMode = false;
    let currentEditName = null;

    async function getDB() {
        return new Promise(res => {
            const req = indexedDB.open("ClipflowStorage", 1);
            req.onupgradeneeded = () => req.result.createObjectStore("handles");
            req.onsuccess = () => res(req.result);
        });
    }

    async function initWorkspace() {
        try {
            workspace = await window.showDirectoryPicker({ mode: 'readwrite' });
            const db = await getDB();
            db.transaction("handles", "readwrite").objectStore("handles").put(workspace, "last_folder");
            onConnected();
        } catch(e) { console.log("User cancelled folder picker"); }
    }

    async function restoreWorkspace() {
        const db = await getDB();
        const handle = await new Promise(res => {
            const req = db.transaction("handles").objectStore("handles").get("last_folder");
            req.onsuccess = () => res(req.result);
        });
        if (handle) {
            if (await handle.requestPermission({mode: 'readwrite'}) === 'granted') {
                workspace = handle;
                onConnected();
            }
        }
    }

    function onConnected() {
        document.getElementById('setupView').classList.add('hidden');
        document.getElementById('restoreBtn').classList.add('hidden');
        loadProjects();
    }

    async function loadProjects() {
        projects = [];
        const root = await workspace.getDirectoryHandle('Clipflow_Projects', { create: true });
        for await (const [name, handle] of root.entries()) {
            if(handle.kind === 'directory') {
                try {
                    const mFile = await (await handle.getFileHandle('meta.json')).getFile();
                    const meta = JSON.parse(await mFile.text());
                    const vFile = await handle.getFileHandle('video.mp4');
                    projects.push({ name, meta, videoFile: vFile, handle });
                } catch(e) {}
            }
        }
        renderProjects();
    }

    function renderProjects() {
        const container = document.getElementById('projectsContainer');
        const q = document.getElementById('mainSearch').value.toLowerCase();
        container.innerHTML = '';
        const sorted = projects.sort((a,b) => b.meta.timestamp - a.meta.timestamp);
        
        sorted.forEach((p, idx) => {
            if(!p.meta.title.toLowerCase().includes(q)) return;
            const isVertical = p.meta.isVertical;
            const div = document.createElement('div');
            div.className = `card ${isVertical ? 'vertical' : 'horizontal'}`;
            div.innerHTML = `
                <div class="card-thumb" onclick="playVideo(${idx})">
                    <img src="${p.meta.thumbs[0] || ''}">
                </div>
                <div class="card-body">
                    <div>
                        <h3>${p.meta.title}</h3>
                        <p style="font-size:12px; color:var(--text-muted); margin:5px 0;">${isVertical ? '📱 Vertical' : '🖥️ Horizontal'}</p>
                    </div>
                    <div style="display:flex; justify-content:space-between; align-items:center;">
                        <button class="btn btn-ghost" style="padding:6px 12px; font-size:12px;" onclick="downloadZip(${idx})">📦 ZIP</button>
                        <div style="display:flex; gap:5px;">
                            <button class="btn btn-ghost" style="padding:6px 12px;" onclick="openModal('edit', ${idx})">✏️</button>
                            <button class="btn btn-danger" style="padding:6px 12px;" onclick="deleteProject(${idx})">🗑️</button>
                        </div>
                    </div>
                </div>
            `;
            container.appendChild(div);
        });
    }

    // --- Video First Frame Extractor ---
    async function captureFirstFrame(file) {
        return new Promise((res) => {
            const video = document.createElement('video');
            video.preload = 'metadata';
            video.src = URL.createObjectURL(file);
            video.onloadeddata = () => {
                video.currentTime = 0.1; // Seek slightly to avoid black frame
            };
            video.onseeked = () => {
                const canvas = document.createElement('canvas');
                canvas.width = video.videoWidth;
                canvas.height = video.videoHeight;
                canvas.getContext('2d').drawImage(video, 0, 0);
                const data = canvas.toDataURL('image/jpeg', 0.8);
                URL.revokeObjectURL(video.src);
                res({data, isVertical: video.videoHeight > video.videoWidth});
            };
        });
    }

    async function saveData() {
        const title = document.getElementById('projTitle').value;
        if(!title || (!selectedVideo && !editMode)) return alert("Missing Title or Video");

        let videoMeta = { isVertical: false };
        if (selectedVideo) {
            const frame = await captureFirstFrame(selectedVideo);
            videoMeta.isVertical = frame.isVertical;
            if (!tempThumbs[0]) tempThumbs[0] = frame.data;
        }

        const root = await workspace.getDirectoryHandle('Clipflow_Projects', { create: true });
        const folderName = editMode ? currentEditName : title.replace(/\s+/g,'_') + "_" + Date.now();
        const pFolder = await root.getDirectoryHandle(folderName, { create: true });
        
        const meta = {
            title, 
            desc: document.getElementById('projDesc').value,
            thumbs: tempThumbs,
            isVertical: editMode ? projects.find(p => p.name === currentEditName).meta.isVertical : videoMeta.isVertical,
            timestamp: editMode ? projects.find(p => p.name === currentEditName).meta.timestamp : Date.now()
        };

        const mHandle = await pFolder.getFileHandle('meta.json', { create: true });
        const writer = await mHandle.createWritable();
        await writer.write(JSON.stringify(meta));
        await writer.close();

        if(selectedVideo) {
            const vHandle = await pFolder.getFileHandle('video.mp4', { create: true });
            const vWriter = await vHandle.createWritable();
            await vWriter.write(selectedVideo);
            await vWriter.close();
        }

        closeModal(); loadProjects();
    }

    function removeThumb(e, i) {
        e.stopPropagation();
        tempThumbs[i] = null;
        refreshThumbs();
    }

    function pickThumb(i) {
        const input = document.createElement('input'); input.type = 'file'; input.accept = 'image/*';
        input.onchange = e => {
            const r = new FileReader();
            r.onload = f => { tempThumbs[i] = f.target.result; refreshThumbs(); };
            r.readAsDataURL(e.target.files[0]);
        };
        input.click();
    }

    function refreshThumbs() {
        tempThumbs.forEach((src, i) => {
            const img = document.getElementById(`pre${i}`);
            const del = document.getElementById(`del${i}`);
            if(src) { 
                img.src = src; img.style.display = 'block'; 
                img.nextElementSibling.style.display = 'none';
                del.style.display = 'flex';
            } else { 
                img.style.display = 'none'; 
                img.nextElementSibling.style.display = 'block';
                del.style.display = 'none';
            }
        });
    }

    function triggerVideo() {
        const i = document.createElement('input'); i.type = 'file'; i.accept = 'video/mp4';
        i.onchange = e => { 
            selectedVideo = e.target.files[0]; 
            document.getElementById('videoLabel').innerText = selectedVideo.name;
            document.getElementById('dropZone').style.borderColor = "var(--success)";
        };
        i.click();
    }

    function openModal(mode, idx = null) {
        editMode = mode === 'edit';
        document.getElementById('formModal').style.display = 'flex';
        if(editMode) {
            const p = projects[idx];
            currentEditName = p.name;
            document.getElementById('projTitle').value = p.meta.title;
            document.getElementById('projDesc').value = p.meta.desc;
            tempThumbs = [...p.meta.thumbs];
            document.getElementById('videoUploadBox').style.display = 'none';
        } else {
            document.getElementById('projTitle').value = "";
            document.getElementById('projDesc').value = "";
            document.getElementById('videoUploadBox').style.display = 'block';
            document.getElementById('videoLabel').innerText = "Click to upload MP4";
            document.getElementById('dropZone').style.borderColor = "var(--border)";
            tempThumbs = [null, null, null];
            selectedVideo = null;
        }
        refreshThumbs();
    }

    function closeModal() { document.getElementById('formModal').style.display = 'none'; }

    async function playVideo(idx) {
        const f = await projects[idx].videoFile.getFile();
        const url = URL.createObjectURL(f);
        const win = window.open("");
        win.document.write(`<body style="margin:0;background:#000;display:flex;align-items:center;justify-content:center;"><video src="${url}" controls autoplay style="max-height:100vh;max-width:100%"></video></body>`);
    }

    async function deleteProject(idx) {
        if(confirm("Delete this clip permanently?")) {
            const root = await workspace.getDirectoryHandle('Clipflow_Projects');
            await root.removeEntry(projects[idx].name, { recursive: true });
            loadProjects();
        }
    }

    async function downloadZip(idx) {
        const p = projects[idx];
        const zip = new JSZip();
        zip.file("video.mp4", await p.videoFile.getFile());
        zip.file("metadata.txt", `Title: ${p.meta.title}\nDescription: ${p.meta.desc}`);
        p.meta.thumbs.forEach((img, i) => { if(img) zip.file(`thumbnail_${i}.png`, img.split(',')[1], {base64: true}); });
        const blob = await zip.generateAsync({type:"blob"});
        saveAs(blob, `${p.meta.title}_Export.zip`);
    }

    function toggleTheme() {
        const t = document.documentElement.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
        document.documentElement.setAttribute('data-theme', t);
    }

    window.onload = async () => {
        const db = await getDB();
        const req = db.transaction("handles").objectStore("handles").get("last_folder");
        req.onsuccess = () => {
            if (req.result) document.getElementById('restoreBtn').classList.remove('hidden');
            else document.getElementById('setupView').classList.remove('hidden');
        };
    };
</script>
</body>
</html>
