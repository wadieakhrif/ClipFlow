<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clipflow Pro</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&family=Cairo:wght@400;700&display=swap');

        :root {
            --primary: #6c63ff; --primary-hover: #5a52d6;
            --bg: #05060f; --card-bg: rgba(17, 19, 34, 0.8);
            --nav-bg: rgba(13, 15, 30, 0.9); --text: #ffffff;
            --text-muted: #94a3b8; --border: rgba(255, 255, 255, 0.1);
            --danger: #ff4757;
        }

        [data-theme="light"] {
            --bg: #f8fafc; --card-bg: rgba(255, 255, 255, 0.8);
            --nav-bg: rgba(255, 255, 255, 0.9); --text: #0f172a;
            --text-muted: #64748b; --border: rgba(0, 0, 0, 0.1);
        }

        body {
            margin: 0; font-family: 'Inter', sans-serif;
            background: var(--bg); color: var(--text);
            transition: 0.3s; line-height: 1.6; overflow-x: hidden;
        }
        body.rtl { direction: rtl; font-family: 'Cairo', sans-serif; }

        #bgCanvas { position: fixed; top: 0; left: 0; z-index: -1; pointer-events: none; }

        header {
            position: sticky; top: 0; z-index: 1000;
            background: var(--nav-bg); backdrop-filter: blur(12px);
            border-bottom: 1px solid var(--border); padding: 15px 30px;
            display: flex; align-items: center; justify-content: space-between;
        }

        .header-center { flex: 1; max-width: 650px; margin: 0 20px; display: flex; flex-direction: column; gap: 12px; }
        
        .search-bar { position: relative; width: 100%; display: flex; align-items: center; }
        .search-bar i { position: absolute; left: 15px; color: var(--text-muted); pointer-events: none; z-index: 5; }
        body.rtl .search-bar i { left: auto; right: 15px; }
        .search-bar input {
            width: 100%; background: var(--bg); border: 1px solid var(--border);
            padding: 12px 15px 12px 45px; border-radius: 12px; color: var(--text);
            outline: none; transition: 0.3s; box-sizing: border-box;
        }
        body.rtl .search-bar input { padding: 12px 45px 12px 15px; }

        .category-nav { display: flex; gap: 10px; overflow-x: auto; padding-bottom: 4px; scrollbar-width: none; }
        .cat-item {
            background: var(--card-bg); border: 1px solid var(--border); color: var(--text-muted);
            padding: 6px 14px; border-radius: 10px; font-size: 13px; cursor: pointer;
            display: flex; align-items: center; gap: 8px; transition: 0.2s; white-space: nowrap;
        }
        .cat-item:hover { border-color: var(--primary); color: var(--text); }
        .cat-item.active { background: var(--primary); color: white; border-color: var(--primary); }
        .cat-count { font-size: 10px; background: rgba(0,0,0,0.3); padding: 2px 6px; border-radius: 6px; font-weight: bold; }

        /* Updated Grid for Mixed Sizes */
        .grid {
            display: flex; flex-wrap: wrap; align-items: flex-start;
            gap: 20px; padding: 40px 30px; max-width: 1500px; margin: 0 auto;
        }

        .card {
            background: var(--card-bg); border-radius: 20px; border: 1px solid var(--border);
            overflow: hidden; position: relative; transition: 0.4s cubic-bezier(0.2, 1, 0.2, 1);
            backdrop-filter: blur(10px); animation: fadeInUp 0.6s ease-out forwards;
            display: flex; flex-direction: column;
        }

        /* Horizontal Style */
        .card.is-horizontal { width: 320px; aspect-ratio: 16/11; }
        /* Vertical Style */
        .card.is-vertical { width: 200px; aspect-ratio: 9/16; }

        @keyframes fadeInUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }
        .card:hover { transform: translateY(-10px); border-color: var(--primary); box-shadow: 0 20px 40px rgba(0,0,0,0.4); }

        .card-thumb { width: 100%; cursor: pointer; overflow: hidden; position: relative; background: #000; }
        .is-horizontal .card-thumb { height: 60%; }
        .is-vertical .card-thumb { height: 75%; }

        .card-thumb img { width: 100%; height: 100%; object-fit: cover; transition: 0.5s; }
        .card:hover .card-thumb img { transform: scale(1.05); }

        .card-body { padding: 12px; flex-grow: 1; display: flex; flex-direction: column; justify-content: space-between; overflow: hidden; }
        .card-body h3 { margin: 0; font-size: 14px; font-weight: 700; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .project-date { font-size: 10px; color: var(--text-muted); display: flex; align-items: center; gap: 5px; margin-bottom: 4px; }

        .dots-btn { 
            position: absolute; top: 10px; right: 10px; background: rgba(0,0,0,0.5); 
            color: white; border-radius: 50%; width: 28px; height: 28px; 
            display: flex; align-items: center; justify-content: center; cursor: pointer; 
            z-index: 10; transition: 0.3s;
        }
        .dots-btn:hover { background: var(--primary); }

        .dropdown { 
            position: absolute; top: 45px; right: 10px; background: var(--nav-bg); 
            border: 1px solid var(--border); border-radius: 12px; display: none; 
            flex-direction: column; overflow: hidden; box-shadow: 0 15px 30px rgba(0,0,0,0.6); 
            z-index: 100; min-width: 120px;
        }
        .dropdown.active { display: flex; }
        .dropdown button { padding: 10px; border: none; background: none; color: var(--text); text-align: left; cursor: pointer; font-size: 12px; display: flex; align-items: center; gap: 8px; width: 100%; }
        .dropdown button:hover { background: var(--primary); }

        .btn { display: inline-flex; align-items: center; gap: 10px; padding: 10px 20px; border-radius: 12px; border: none; font-weight: 700; cursor: pointer; transition: 0.3s; }
        .btn-primary { background: var(--primary); color: white; }
        .btn-ghost { background: transparent; color: var(--text); border: 1px solid var(--border); }

        .overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.85); display: none; align-items: center; justify-content: center; z-index: 2000; backdrop-filter: blur(15px); }
        .modal { background: var(--card-bg); width: 90%; max-width: 500px; border-radius: 25px; padding: 30px; border: 1px solid var(--border); max-height: 85vh; overflow-y: auto; }

        .thumb-slot { position: relative; aspect-ratio: 1; background: var(--bg); border: 1.5px dashed var(--border); border-radius: 15px; overflow: hidden; display: flex; align-items: center; justify-content: center; cursor: pointer; }
        .check-item { background: var(--bg); border: 1px solid var(--border); padding: 8px 12px; border-radius: 12px; display: flex; align-items: center; gap: 6px; cursor: pointer; font-size: 12px; }
        .checkbox-group { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 10px; }
        .hidden { display: none !important; }
    </style>
</head>
<body>

<canvas id="bgCanvas"></canvas>

<header>
    <div style="display:flex; align-items:center; gap:12px;">
        <div style="width:40px; height:40px; background:var(--primary); border-radius:10px; display:flex; align-items:center; justify-content:center;"><i data-lucide="zap" size="22" color="white"></i></div>
        <h1 style="font-size:22px; margin:0; letter-spacing:-1px; font-weight:800;">Clipflow<span style="color:var(--primary)">.</span></h1>
    </div>

    <div class="header-center">
        <div class="search-bar">
            <i data-lucide="search" size="18"></i>
            <input type="text" id="mainSearch" data-i18n="searchPlaceholder" placeholder="Search projects..." oninput="renderProjects()">
        </div>
        <div class="category-nav" id="catNav">
            <div class="cat-item active" onclick="setFilter('all')"><i data-lucide="layout-grid" size="14"></i> <span data-i18n="catAll">All</span> <span class="cat-count" id="cnt-all">0</span></div>
            <div class="cat-item" onclick="setFilter('youtube')"><i data-lucide="youtube" size="14"></i> YouTube <span class="cat-count" id="cnt-youtube">0</span></div>
            <div class="cat-item" onclick="setFilter('shorts')"><i data-lucide="play" size="14"></i> YT Shorts <span class="cat-count" id="cnt-shorts">0</span></div>
            <div class="cat-item" onclick="setFilter('reels')"><i data-lucide="instagram" size="14"></i> Instagram <span class="cat-count" id="cnt-reels">0</span></div>
            <div class="cat-item" onclick="setFilter('tiktok')"><i data-lucide="music" size="14"></i> TikTok <span class="cat-count" id="cnt-tiktok">0</span></div>
        </div>
    </div>

    <div style="display:flex; gap:10px;">
        <button class="btn btn-ghost" onclick="toggleLanguage()" id="langBtn">AR</button>
        <button class="btn btn-ghost" onclick="toggleTheme()"><i data-lucide="sun" id="themeIcon"></i></button>
        <button class="btn btn-primary" onclick="openModal('add')"><i data-lucide="plus"></i> <span data-i18n="newProject">New</span></button>
    </div>
</header>

<main>
    <div id="projectsContainer" class="grid"></div>
    <div id="setupView" style="text-align:center; padding:120px 0;" class="hidden">
        <i data-lucide="folder-lock" size="64" style="opacity:0.2; margin-bottom:20px;"></i>
        <h2 style="opacity:0.6" data-i18n="welcomeMsg">Welcome. Please connect your workspace.</h2>
        <button class="btn btn-primary" onclick="initWorkspace()"><i data-lucide="hard-drive"></i> <span data-i18n="selectFolder">Select Folder</span></button>
    </div>
</main>

<div class="overlay" id="formModal">
    <div class="modal">
        <h2 id="modalTitle" style="margin-top:0" data-i18n="createProject">Create Project</h2>
        
        <div id="videoUploadBox" style="margin-bottom:20px;">
            <div onclick="triggerVideo()" id="dropZone" style="border:2px dashed var(--primary); padding:30px; text-align:center; border-radius:15px; cursor:pointer;">
                <i data-lucide="upload-cloud" size="30"></i><br>
                <span id="videoLabelText" data-i18n="clickUpload">Click to Upload Video (.mp4)</span>
            </div>
        </div>

        <div style="display:grid; grid-template-columns: repeat(3, 1fr); gap:10px; margin-bottom:20px;">
            <div class="thumb-slot" onclick="pickThumb(0)">
                <img id="pre0" style="width:100%; height:100%; object-fit:cover; display:none"><i data-lucide="image-plus"></i>
            </div>
            <div class="thumb-slot" onclick="pickThumb(1)">
                <img id="pre1" style="width:100%; height:100%; object-fit:cover; display:none"><i data-lucide="image-plus"></i>
            </div>
            <div class="thumb-slot" onclick="pickThumb(2)">
                <img id="pre2" style="width:100%; height:100%; object-fit:cover; display:none"><i data-lucide="image-plus"></i>
            </div>
        </div>

        <div style="display:grid; grid-template-columns: 1fr; gap:12px;">
            <input type="date" id="projDate" style="width:100%; padding:12px; background:var(--bg); border:1px solid var(--border); border-radius:10px; color:var(--text); box-sizing:border-box;">
            <input type="text" id="projTitle" data-i18n="titlePlaceholder" placeholder="Project Title" style="width:100%; padding:12px; background:var(--bg); border:1px solid var(--border); border-radius:10px; color:var(--text); box-sizing:border-box;">
            <textarea id="projDesc" data-i18n="descPlaceholder" placeholder="Description..." rows="2" style="width:100%; padding:12px; background:var(--bg); border:1px solid var(--border); border-radius:10px; color:var(--text); box-sizing:border-box;"></textarea>
        </div>

        <div class="checkbox-group">
            <label class="check-item"><input type="checkbox" value="youtube"> YouTube</label>
            <label class="check-item"><input type="checkbox" value="shorts"> YT Shorts</label>
            <label class="check-item"><input type="checkbox" value="reels"> Instagram</label>
            <label class="check-item"><input type="checkbox" value="tiktok"> TikTok</label>
        </div>

        <div style="display:flex; gap:12px; margin-top:25px;">
            <button class="btn btn-ghost" style="flex:1" onclick="closeModal()" data-i18n="cancel">Cancel</button>
            <button class="btn btn-primary" style="flex:2" onclick="saveData()"><i data-lucide="save"></i> <span data-i18n="saveBtn">Save Project</span></button>
        </div>
    </div>
</div>

<script>
    let workspace = null;
    let projects = [];
    let selectedVideo = null;
    let tempThumbs = [null, null, null];
    let editMode = false;
    let currentEditName = null;
    let currentLang = localStorage.getItem('clipflow_lang') || 'en';
    let currentFilter = 'all';

    const i18n = {
        en: { searchPlaceholder: "Find project...", newProject: "New", welcomeMsg: "Connect workspace", selectFolder: "Select Folder", createProject: "Create Project", editProject: "Edit Project", clickUpload: "Upload Video", titlePlaceholder: "Project Title", descPlaceholder: "Description...", cancel: "Cancel", saveBtn: "Save Project", edit: "Edit", download: "ZIP", delete: "Delete", catAll: "All" },
        ar: { searchPlaceholder: "ابحث...", newProject: "جديد", welcomeMsg: "يرجى ربط المجلد", selectFolder: "اختيار المجلد", createProject: "إنشاء مشروع", editProject: "تعديل مشروع", clickUpload: "رفع فيديو", titlePlaceholder: "العنوان", descPlaceholder: "الوصف...", cancel: "إلغاء", saveBtn: "حفظ", edit: "تعديل", download: "تحميل", delete: "حذف", catAll: "الكل" }
    };

    const PLATFORM_ICONS = {
        youtube: '<i data-lucide="youtube" size="14"></i>',
        shorts: '<i data-lucide="play" size="14"></i>',
        reels: '<i data-lucide="instagram" size="14"></i>',
        tiktok: '<i data-lucide="music" size="14"></i>'
    };

    async function openDB() {
        return new Promise(res => {
            const req = indexedDB.open("ClipflowDB", 1);
            req.onupgradeneeded = () => req.result.createObjectStore("settings");
            req.onsuccess = () => res(req.result);
        });
    }

    async function initWorkspace() {
        try {
            workspace = await window.showDirectoryPicker({ mode: 'readwrite' });
            const db = await openDB();
            const tx = db.transaction("settings", "readwrite");
            tx.objectStore("settings").put(workspace, "folderHandle");
            document.getElementById('setupView').classList.add('hidden');
            loadProjects();
        } catch(e) { console.error("Workspace access denied", e); }
    }

    async function autoConnect() {
        const db = await openDB();
        const req = db.transaction("settings").objectStore("settings").get("folderHandle");
        req.onsuccess = async () => {
            const handle = req.result;
            if (handle && (await handle.queryPermission({mode: 'readwrite'})) === 'granted') {
                workspace = handle;
                document.getElementById('setupView').classList.add('hidden');
                loadProjects();
            } else {
                document.getElementById('setupView').classList.remove('hidden');
            }
        };
    }

    async function loadProjects() {
        projects = [];
        if(!workspace) return;
        const root = await workspace.getDirectoryHandle('Clipflow_Projects', { create: true });
        for await (const [name, handle] of root.entries()) {
            if(handle.kind === 'directory') {
                try {
                    const mFile = await (await handle.getFileHandle('meta.json')).getFile();
                    const meta = JSON.parse(await mFile.text());
                    const vFile = await handle.getFileHandle('video.mp4');
                    projects.push({ name, meta, videoFile: vFile });
                } catch(e) {}
            }
        }
        updateCounters();
        renderProjects();
    }

    function updateCounters() {
        document.getElementById('cnt-all').innerText = projects.length;
        document.getElementById('cnt-youtube').innerText = projects.filter(p => p.meta.platforms.includes('youtube')).length;
        document.getElementById('cnt-shorts').innerText = projects.filter(p => p.meta.platforms.includes('shorts')).length;
        document.getElementById('cnt-reels').innerText = projects.filter(p => p.meta.platforms.includes('reels')).length;
        document.getElementById('cnt-tiktok').innerText = projects.filter(p => p.meta.platforms.includes('tiktok')).length;
    }

    function setFilter(cat) {
        currentFilter = cat;
        document.querySelectorAll('.cat-item').forEach(el => el.classList.remove('active'));
        event.currentTarget.classList.add('active');
        renderProjects();
    }

    function renderProjects() {
        const container = document.getElementById('projectsContainer');
        const q = document.getElementById('mainSearch').value.toLowerCase();
        container.innerHTML = '';

        projects.sort((a,b) => new Date(b.meta.date) - new Date(a.meta.date)).forEach((p, idx) => {
            if(!p.meta.title.toLowerCase().includes(q)) return;
            if(currentFilter !== 'all' && !p.meta.platforms.includes(currentFilter)) return;

            // Logic to determine if it should be vertical
            const isVertical = p.meta.platforms.some(pl => ['shorts', 'reels', 'tiktok'].includes(pl)) && !p.meta.platforms.includes('youtube');

            const div = document.createElement('div');
            div.className = `card ${isVertical ? 'is-vertical' : 'is-horizontal'}`;
            div.innerHTML = `
                <div class="dots-btn" onclick="toggleMenu(event, ${idx})"><i data-lucide="more-vertical" size="16"></i></div>
                <div class="dropdown" id="menu-${idx}">
                    <button onclick="openModal('edit', ${idx}, event)"><i data-lucide="edit-3" size="14"></i> ${i18n[currentLang].edit}</button>
                    <button onclick="deleteProject(${idx}, event)" style="color:var(--danger)"><i data-lucide="trash-2" size="14"></i> ${i18n[currentLang].delete}</button>
                </div>
                <div class="card-thumb" onclick="playVideo(${idx})">
                    <img src="${p.meta.thumbs[0] || 'https://via.placeholder.com/400x225?text=No+Thumbnail'}">
                </div>
                <div class="card-body">
                    <div>
                        <span class="project-date"><i data-lucide="calendar" size="10"></i> ${p.meta.date || ''}</span>
                        <h3>${p.meta.title}</h3>
                    </div>
                    <div style="display:flex; gap:5px; margin-top:5px;">
                        ${p.meta.platforms.map(t => `<span style="color:var(--primary)">${PLATFORM_ICONS[t] || t}</span>`).join('')}
                    </div>
                </div>
            `;
            container.appendChild(div);
        });
        lucide.createIcons();
    }

    function toggleMenu(e, idx) {
        e.stopPropagation();
        const menu = document.getElementById(`menu-${idx}`);
        const wasActive = menu.classList.contains('active');
        document.querySelectorAll('.dropdown').forEach(d => d.classList.remove('active'));
        if(!wasActive) menu.classList.add('active');
    }

    window.onclick = () => document.querySelectorAll('.dropdown').forEach(d => d.classList.remove('active'));

    function openModal(mode, idx = null, e = null) {
        if(e) e.stopPropagation();
        editMode = mode === 'edit';
        document.getElementById('modalTitle').innerText = editMode ? i18n[currentLang].editProject : i18n[currentLang].createProject;
        document.getElementById('videoUploadBox').classList.toggle('hidden', editMode);
        
        if(editMode) {
            const p = projects[idx];
            currentEditName = p.name;
            document.getElementById('projTitle').value = p.meta.title;
            document.getElementById('projDesc').value = p.meta.desc;
            document.getElementById('projDate').value = p.meta.date;
            tempThumbs = [...p.meta.thumbs];
            document.querySelectorAll('.check-item input').forEach(cb => cb.checked = p.meta.platforms.includes(cb.value));
        } else {
            document.getElementById('projTitle').value = "";
            document.getElementById('projDesc').value = "";
            document.getElementById('projDate').value = new Date().toISOString().split('T')[0];
            tempThumbs = [null, null, null];
            selectedVideo = null;
            document.querySelectorAll('.check-item input').forEach(cb => cb.checked = false);
        }
        refreshThumbs();
        document.getElementById('formModal').style.display = 'flex';
    }

    async function saveData() {
        const title = document.getElementById('projTitle').value;
        const date = document.getElementById('projDate').value;
        const desc = document.getElementById('projDesc').value;
        const plats = Array.from(document.querySelectorAll('.check-item input:checked')).map(i => i.value);
        if(!title || (!selectedVideo && !editMode)) return;

        const root = await workspace.getDirectoryHandle('Clipflow_Projects', { create: true });
        const folderName = editMode ? currentEditName : title.replace(/\s+/g,'_') + "_" + Date.now();
        const pFolder = await root.getDirectoryHandle(folderName, { create: true });

        const mHandle = await pFolder.getFileHandle('meta.json', { create: true });
        const writer = await mHandle.createWritable();
        await writer.write(JSON.stringify({ title, date, desc, platforms: plats, thumbs: tempThumbs }));
        await writer.close();

        if(selectedVideo) {
            const vHandle = await pFolder.getFileHandle('video.mp4', { create: true });
            const vWriter = await vHandle.createWritable();
            await vWriter.write(selectedVideo);
            await vWriter.close();
        }
        closeModal(); loadProjects();
    }

    async function deleteProject(idx, e) {
        e.stopPropagation();
        if(confirm("Delete project?")) {
            const root = await workspace.getDirectoryHandle('Clipflow_Projects');
            await root.removeEntry(projects[idx].name, { recursive: true });
            loadProjects();
        }
    }

    function toggleLanguage() {
        currentLang = currentLang === 'en' ? 'ar' : 'en';
        localStorage.setItem('clipflow_lang', currentLang);
        location.reload();
    }

    function toggleTheme() {
        const t = document.documentElement.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
        document.documentElement.setAttribute('data-theme', t);
        lucide.createIcons();
    }

    function refreshThumbs() {
        tempThumbs.forEach((src, i) => {
            const img = document.getElementById(`pre${i}`);
            if(src) { img.src = src; img.style.display = 'block'; }
            else img.style.display = 'none';
        });
    }

    function triggerVideo() { 
        const input = document.createElement('input'); input.type = 'file'; input.accept = 'video/mp4'; 
        input.onchange = e => { selectedVideo = e.target.files[0]; document.getElementById('videoLabelText').innerText = selectedVideo.name; }; 
        input.click(); 
    }

    function pickThumb(i) { 
        const input = document.createElement('input'); input.type = 'file'; input.accept = 'image/*'; 
        input.onchange = e => { const r = new FileReader(); r.onload = f => { tempThumbs[i] = f.target.result; refreshThumbs(); }; r.readAsDataURL(e.target.files[0]); }; 
        input.click(); 
    }

    function closeModal() { document.getElementById('formModal').style.display = 'none'; }
    
    async function playVideo(idx) { 
        const f = await projects[idx].videoFile.getFile(); 
        const win = window.open(""); 
        win.document.write(`<body style="margin:0;background:#000;display:flex;align-items:center;justify-content:center;"><video src="${URL.createObjectURL(f)}" controls autoplay style="max-height:100vh;max-width:100%"></video></body>`); 
    }

    const canvas = document.getElementById('bgCanvas');
    const ctx = canvas.getContext('2d');
    function drawShapes() {
        canvas.width = window.innerWidth; canvas.height = window.innerHeight;
        ctx.clearRect(0,0,canvas.width, canvas.height);
        ctx.strokeStyle = '#6c63ff22';
        ctx.strokeRect(100, 100, 200, 200);
        ctx.beginPath(); ctx.arc(canvas.width-100, canvas.height-100, 50, 0, Math.PI*2); ctx.stroke();
    }
    window.onresize = drawShapes; drawShapes();
    autoConnect();
    lucide.createIcons();
</script>
</body>
</html>
