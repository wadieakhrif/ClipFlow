<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>ClipFlow Pro</title>

<style>
body { font-family:sans-serif; margin:0; background:white; color:black; }
nav { display:flex; justify-content:space-between; padding:15px; border-bottom:1px solid black;}
#projects { display:flex; flex-wrap:wrap; gap:10px; padding:10px; }
.card { border:1px solid black; width:200px; padding:10px; cursor:pointer;}
.card img { width:100%; height:120px; object-fit:cover;}
#player { padding:10px; }
video { width:100%; }

#modal {
 position:fixed; top:0; left:0;
 width:100%; height:100%;
 background:rgba(0,0,0,0.5);
 display:none; justify-content:center; align-items:center;
}
.modal-box {
 background:white; padding:20px; width:300px;
 display:flex; flex-direction:column; gap:10px;
}
</style>
</head>

<body>

<nav>
  <b>ClipFlow</b>
  <div>
    <button onclick="pickFolder()">📂</button>
    <button onclick="openModal()">+ مشروع</button>
  </div>
</nav>

<div id="projects"></div>
<div id="player"></div>

<div id="modal">
  <div class="modal-box">
    <input id="title" placeholder="العنوان">
    <button onclick="pickVideo()">اختيار فيديو</button>
    <button onclick="pickThumb()">اختيار صورة</button>
    <button onclick="saveProject()">حفظ</button>
    <button onclick="closeModal()">إلغاء</button>
  </div>
</div>

<script>
let dir;
let videoFile=null;
let thumbFile=null;

/* ===== IndexedDB ===== */
function openDB(){
  return new Promise(res=>{
    let req=indexedDB.open("clipflowDB",1);
    req.onupgradeneeded=()=>req.result.createObjectStore("store");
    req.onsuccess=()=>res(req.result);
  });
}

async function saveDir(handle){
  let db=await openDB();
  db.transaction("store","readwrite").objectStore("store").put(handle,"dir");
}

async function getDir(){
  let db=await openDB();
  return db.transaction("store","readonly").objectStore("store").get("dir");
}

/* ===== اختيار الفولدر ===== */
async function pickFolder(){
  dir = await window.showDirectoryPicker({mode:"readwrite"});
  await saveDir(dir);
  loadProjects();
}

/* ===== استرجاع تلقائي ===== */
window.onload = async ()=>{
  dir = await getDir();

  if(dir){
    let perm = await dir.queryPermission({mode:"readwrite"});
    if(perm !== "granted"){
      perm = await dir.requestPermission({mode:"readwrite"});
    }
    if(perm === "granted"){
      loadProjects();
    }
  }
};

/* ===== UI ===== */
function openModal(){ modal.style.display="flex"; }
function closeModal(){ modal.style.display="none"; }

/* ===== اختيار ملفات ===== */
function pickVideo(){
  let i=document.createElement("input");
  i.type="file"; i.accept="video/*";
  i.click();
  i.onchange=()=>videoFile=i.files[0];
}

function pickThumb(){
  let i=document.createElement("input");
  i.type="file"; i.accept="image/*";
  i.click();
  i.onchange=()=>thumbFile=i.files[0];
}

/* ===== حفظ مشروع ===== */
async function saveProject(){
  if(!dir) return alert("اختر فولدر");
  if(!videoFile || !thumbFile) return alert("أضف الملفات");

  let raw = document.getElementById("title").value || "مشروع";

  let name = raw.replace(/[\\/:*?"<>|]/g,"").trim() || "مشروع";

  let final = name;
  let i=1;

  while(true){
    try{
      await dir.getDirectoryHandle(final);
      final = name + "_" + i;
      i++;
    }catch{ break; }
  }

  let p = await dir.getDirectoryHandle(final,{create:true});

  // video
  let v = await p.getFileHandle("video.mp4",{create:true});
  let vw = await v.createWritable();
  await vw.write(videoFile); await vw.close();

  // thumb
  let t = await p.getFileHandle("thumb.png",{create:true});
  let tw = await t.createWritable();
  await tw.write(thumbFile); await tw.close();

  // data
  let d = await p.getFileHandle("data.json",{create:true});
  let dw = await d.createWritable();
  await dw.write(JSON.stringify({title:raw,date:new Date()}));
  await dw.close();

  closeModal();
  loadProjects();
}

/* ===== تحميل ===== */
async function loadProjects(){
  projects.innerHTML="";

  for await (const entry of dir.values()){
    if(entry.kind==="directory"){
      try{
        let f=await entry.getFileHandle("data.json");
        let data=JSON.parse(await (await f.getFile()).text());

        let thumbURL="";
        try{
          let t=await entry.getFileHandle("thumb.png");
          thumbURL=URL.createObjectURL(await t.getFile());
        }catch{}

        let div=document.createElement("div");
        div.className="card";
        div.innerHTML=`<img src="${thumbURL}"><b>${data.title}</b>`;

        div.onclick=async ()=>{
          let v=await entry.getFileHandle("video.mp4");
          let url=URL.createObjectURL(await v.getFile());
          player.innerHTML=`<video src="${url}" controls autoplay></video>`;
        };

        projects.appendChild(div);

      }catch{}
    }
  }
}
</script>

</body>
</html>
