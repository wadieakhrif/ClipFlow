<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Clip Flow</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap');

/* الألوان الأساسية */
:root {
  --dark-bg:#0d0f25;
  --dark-secondary:#1a0a36;
  --light-bg:#f5f5f5;
  --light-secondary:#ffffff;
  --blue-dark:#0d6cff;
  --blue-light:#63a4ff;
  --purple-dark:#6c63ff;
  --purple-light:#a394ff;
  --text-light:#fff;
  --text-dark:#000;
}

/* body */
body {
  margin:0;
  font-family:'Roboto',sans-serif;
  background:var(--dark-bg);
  color:var(--text-light);
  transition:0.5s;
  overflow-x:hidden;
}

/* Navbar */
nav {
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding:15px 25px;
  background: linear-gradient(90deg,var(--purple-dark),var(--blue-dark));
}

nav .logo {
  display:flex;
  align-items:center;
  gap:10px;
}

nav .logo img {
  width:40px;
  height:40px;
}

nav .logo h1 {
  font-size:22px;
  background: linear-gradient(90deg,#fff,#ddd);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
}

nav button {
  padding:8px 15px;
  border:none;
  border-radius:8px;
  font-weight:bold;
  cursor:pointer;
  transition:0.3s;
}

/* خلفية هندسية Outline */
#bgCanvas {
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  z-index:-1;
}

/* مشاريع */
#projectsContainer {
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(220px,1fr));
  gap:20px;
  padding:20px;
}

.project {
  background: linear-gradient(145deg,var(--dark-secondary),var(--dark-bg));
  border-radius:15px;
  overflow:hidden;
  box-shadow:0 5px 15px rgba(0,0,0,0.5);
  display:flex;
  flex-direction:column;
  cursor:pointer;
  transition:0.3s;
  position:relative;
}

.project:hover{ transform:translateY(-5px); }

.project img { width:100%; height:140px; object-fit:cover; }

.project-info { padding:10px; display:flex; flex-direction:column; gap:5px; }
.project-info h3{ font-size:16px; margin:0; font-weight:bold; }
.project-info p{ font-size:12px; margin:0; display:flex; align-items:center; gap:5px; }

.platform-label { padding:2px 6px; border-radius:5px; font-size:11px; font-weight:bold; color:#fff; }
.youtube { background:#FF0000; }
.youtube-shorts { background:#FF5555; }
.tiktok { background:#000; color:#fff; }
.instagram { background: linear-gradient(45deg,#feda75,#d62976,#8134af); }
.facebook { background:#1877F2; }
.snapchat { background:#FFFC00; color:#000; }
.linkedin { background:#0077B5; }
.twitter { background:#1DA1F2; }
.pinterest { background:#E60023; }

/* قائمة الثلاث نقاط */
.project .menu-btn {
  position:absolute;
  top:10px; right:10px;
  background:rgba(255,255,255,0.2);
  border:none;
  border-radius:50%;
  width:30px;
  height:30px;
  cursor:pointer;
  font-weight:bold;
  display:flex;
  align-items:center;
  justify-content:center;
}

.project .menu-content {
  display:none;
  position:absolute;
  top:40px;
  right:10px;
  background:var(--dark-secondary);
  border-radius:8px;
  overflow:hidden;
  z-index:5;
  flex-direction:column;
}

.project .menu-content button {
  background:none;
  color:#fff;
  padding:8px 12px;
  text-align:left;
  border:none;
  width:100%;
  cursor:pointer;
}

.project .menu-content button:hover{ background:rgba(255,255,255,0.2); }

/* نافذة popup */
#folderPopup, #projectPopup {
  position:fixed;
  top:50%; left:50%;
  transform:translate(-50%,-50%);
  background:var(--dark-secondary);
  padding:20px;
  border-radius:15px;
  z-index:10;
  display:none;
  width:350px;
  box-shadow:0 10px 25px rgba(0,0,0,0.7);
}

#folderPopup h2,#projectPopup h2{text-align:center; margin-bottom:15px;}

button.popupBtn{
  padding:10px 15px;
  margin:5px 0;
  border:none;
  border-radius:8px;
  cursor:pointer;
  width:100%;
  font-weight:bold;
}

/* Input الملفات */
#dropZone, #dropThumbs {
  border:2px dashed var(--purple-dark);
  border-radius:10px;
  padding:20px;
  text-align:center;
  margin:10px 0;
  cursor:pointer;
  transition:0.3s;
}
#dropZone:hover, #dropThumbs:hover { border-color:#fff; }

#thumbPreview img { margin:3px; border-radius:5px; width:50px; height:35px; object-fit:cover; }

input,textarea { width:100%; padding:8px; margin:5px 0; border-radius:8px; border:none; background:var(--dark-bg); color:var(--text-light); }

/* المنصات */
.platformBtn{ padding:5px 10px; margin:2px; border-radius:6px; background:var(--purple-dark); cursor:pointer; transition:0.3s; }
.platformBtn.selected{ background:#ff6c63; }
</style>
</head>
<body>

<canvas id="bgCanvas"></canvas>

<nav>
<div class="logo">
<img src="https://img.sanishtech.com/u/8a6ce39c01afd349c83d1c5b8f4cd7ac.png">
<h1>Clip Flow</h1>
</div>
<div>
<button id="toggleLang">EN/AR</button>
<button id="toggleMode">Dark/Light</button>
</div>
</nav>

<div id="projectsContainer"></div>

<!-- Popup اختيار مجلد -->
<div id="folderPopup">
<h2>اختر مجلد المشاريع</h2>
<button class="popupBtn" id="chooseFolderBtn">اختر مجلد</button>
</div>

<!-- Popup إنشاء مشروع -->
<div id="projectPopup">
<h2>مشروع جديد</h2>
<div id="dropZone">اسحب الفيديو هنا أو اضغط لاختياره</div>
<div id="dropThumbs">اسحب الصور المصغرة هنا أو اضغط لاختيارها (1-3)</div>
<div id="thumbPreview"></div>
<input type="text" id="title" placeholder="عنوان المشروع">
<textarea id="description" placeholder="الوصف"></textarea>
<label>اختر المنصات:</label>
<div id="platformsContainer"></div>
<label>اختر التاريخ والوقت:</label>
<input type="datetime-local" id="datetime">
<button class="popupBtn" id="saveProjectBtn">حفظ المشروع</button>
<button class="popupBtn" id="cancelProjectBtn">إلغاء</button>
</div>

<script>
// ====== إعداد المتغيرات ======
let projects = [];
let folderHandle = null;
let currentLang = 'ar';
let darkMode = true;

const projectsContainer = document.getElementById('projectsContainer');
const folderPopup = document.getElementById('folderPopup');
const projectPopup = document.getElementById('projectPopup');
const chooseFolderBtn = document.getElementById('chooseFolderBtn');
const dropZone = document.getElementById('dropZone');
const dropThumbs = document.getElementById('dropThumbs');
const thumbPreview = document.getElementById('thumbPreview');
const titleInput = document.getElementById('title');
const descriptionInput = document.getElementById('description');
const platformsContainer = document.getElementById('platformsContainer');
const datetimeInput = document.getElementById('datetime');
const saveProjectBtn = document.getElementById('saveProjectBtn');
const cancelProjectBtn = document.getElementById('cancelProjectBtn');
const toggleModeBtn = document.getElementById('toggleMode');
const toggleLangBtn = document.getElementById('toggleLang');

// ====== منصات التواصل الاجتماعي ======
const platforms = [
  {name:'YouTube',class:'youtube'},
  {name:'YouTube Shorts',class:'youtube-shorts'},
  {name:'TikTok',class:'tiktok'},
  {name:'Instagram',class:'instagram'},
  {name:'Facebook',class:'facebook'},
  {name:'Snapchat',class:'snapchat'},
  {name:'LinkedIn',class:'linkedin'},
  {name:'Twitter',class:'twitter'},
  {name:'Pinterest',class:'pinterest'}
];

// إنشاء أزرار المنصات
platforms.forEach(p=>{
  const btn = document.createElement('button');
  btn.className='platformBtn';
  btn.innerText=p.name;
  btn.dataset.class=p.class;
  btn.onclick=()=>btn.classList.toggle('selected');
  platformsContainer.appendChild(btn);
});

// ====== اختيار مجلد المشاريع ======
chooseFolderBtn.onclick=async ()=>{
  folderHandle = await window.showDirectoryPicker();
  // تأكد من إنشاء مجلد ClipFlow Projects داخله
  let clipFlowFolder;
  try {
    clipFlowFolder = await folderHandle.getDirectoryHandle('ClipFlow Projects',{create:true});
  } catch(e){ console.error(e); return; }
  folderPopup.style.display='none';
  loadProjects();
}

// ====== تحميل المشاريع من المجلد ======
async function loadProjects(){
  if(!folderHandle) return;
  projectsContainer.innerHTML='';
  const clipFlowFolder = await folderHandle.getDirectoryHandle('ClipFlow Projects');
  projects = [];
  for await (const [name,handle] of clipFlowFolder.entries()){
    if(handle.kind==='directory'){
      const videoFile = await handle.getFileHandle('video.mp4').catch(()=>null);
      const thumbs = [];
      for await(const [fname,fhandle] of handle.entries()){
        if(fname.startsWith('thumbnail') && fname.endsWith('.png')){
          thumbs.push(fhandle);
        }
      }
      const metaFile = await handle.getFileHandle('meta.json').catch(()=>null);
      let meta = {};
      if(metaFile){
        const fileData = await (await metaFile.getFile()).text();
        meta = JSON.parse(fileData);
      }
      projects.push({name,videoFile,thumbs,meta,folderHandle:handle});
    }
  }
  displayProjects();
}

// ====== عرض المشاريع ======
function displayProjects(){
  projectsContainer.innerHTML='';
  // ترتيب من الأحدث للأقدم حسب التاريخ
  projects.sort((a,b)=> new Date(b.meta.datetime)-new Date(a.meta.datetime));
  projects.forEach((p,index)=>{
    const div = document.createElement('div');
    div.className='project';

    const img = document.createElement('img');
    if(p.thumbs.length>0){
      img.src=URL.createObjectURL(awaitFile(p.thumbs[0]));
    } else img.src='';

    const info = document.createElement('div');
    info.className='project-info';
    const h3 = document.createElement('h3');
    h3.innerText=p.meta.title||p.name;
    const pInfo = document.createElement('p');
    const date = new Date(p.meta.datetime||Date.now());
    pInfo.innerText=`${date.toLocaleDateString(currentLang)} `;
    const platSpan = document.createElement('span');
    platSpan.className='platform-label '+(p.meta.platformClass||'youtube');
    platSpan.innerText=p.meta.platformName||'YouTube';
    pInfo.appendChild(platSpan);
    info.appendChild(h3);
    info.appendChild(pInfo);

    // القائمة الثلاث نقاط
    const menuBtn = document.createElement('button');
    menuBtn.className='menu-btn';
    menuBtn.innerText='⋮';
    const menuContent = document.createElement('div');
    menuContent.className='menu-content';
    const editBtn = document.createElement('button');
    editBtn.innerText='✏️ تعديل';
    editBtn.onclick=()=>openProjectPopup(p);
    const delBtn = document.createElement('button');
    delBtn.innerText='🗑️ حذف';
    delBtn.onclick=()=>deleteProject(p);
    menuContent.appendChild(editBtn);
    menuContent.appendChild(delBtn);
    menuBtn.onclick=()=>{menuContent.style.display=menuContent.style.display==='flex'?'none':'flex';}
    div.appendChild(img);
    div.appendChild(info);
    div.appendChild(menuBtn);
    div.appendChild(menuContent);
    div.onclick=()=>viewVideo(p);
    projectsContainer.appendChild(div);
  });
}

// ====== فتح الفيديو في نافذة صغيرة ======
async function viewVideo(project){
  const file = await project.videoFile.getFile();
  const url = URL.createObjectURL(file);
  const win = window.open('','Video Preview','width=600,height=400');
  win.document.write(`<video src="${url}" controls autoplay style="width:100%;height:100%;"></video>`);
}

// ====== حذف المشروع ======
async function deleteProject(project){
  if(!confirm('تحذير! سيتم حذف المشروع بالكامل من جهازك!')) return;
  await project.folderHandle.removeEntry('video.mp4');
  for(const t of project.thumbs) await project.folderHandle.removeEntry(await t.name);
  await project.folderHandle.removeEntry('meta.json');
  await folderHandle.getDirectoryHandle('ClipFlow Projects').then(f=>f.removeEntry(project.name,{recursive:true}));
  loadProjects();
}

// ====== فتح Popup مشروع جديد ======
function openProjectPopup(project=null){
  projectPopup.style.display='block';
  if(project){
    titleInput.value=project.meta.title||'';
    descriptionInput.value=project.meta.description||'';
    datetimeInput.value=project.meta.datetime||'';
    // يمكننا تحديد المنصات المحددة
  } else {
    titleInput.value='';
    descriptionInput.value='';
    datetimeInput.value='';
  }
}

// ====== حفظ المشروع ======
saveProjectBtn.onclick=async ()=>{
  if(!folderHandle) return alert('اختر مجلد المشروع أولاً');
  const clipFlowFolder = await folderHandle.getDirectoryHandle('ClipFlow Projects');
  const projectName = titleInput.value || 'New Project';
  const projectFolder = await clipFlowFolder.getDirectoryHandle(projectName,{create:true});
  // حفظ الفيديو
  const videoFileHandle = await projectFolder.getFileHandle('video.mp4',{create:true});
  // حفظ الصور المصغرة
  // حفظ البيانات meta.json
  projectPopup.style.display='none';
  loadProjects();
}

// ====== إلغاء Popup ======
cancelProjectBtn.onclick=()=>{projectPopup.style.display='none';}

// ====== Light/Dark Mode ======
toggleModeBtn.onclick=()=>{
  darkMode=!darkMode;
  document.body.style.background=darkMode?'var(--dark-bg)':'var(--light-bg)';
  document.body.style.color=darkMode?'var(--text-light)':'var(--text-dark)';
}

// ====== تغيير اللغة ======
toggleLangBtn.onclick=()=>{
  currentLang=currentLang==='ar'?'en':'ar';
  loadProjects();
}

// ====== Backend: تحميل File من FileHandle ======
async function awaitFile(fileHandle){ return await fileHandle.getFile(); }

// ====== الخلفية الهندسية Outline ======
const canvas = document.getElementById('bgCanvas');
const ctx = canvas.getContext('2d');
canvas.width=window.innerWidth; canvas.height=window.innerHeight;
class Shape{
  constructor(){
    this.x=Math.random()*canvas.width;
    this.y=Math.random()*canvas.height;
    this.size=Math.random()*100+50;
    this.type=['circle','square','triangle','parallelogram'][Math.floor(Math.random()*4)];
    this.speedX=(Math.random()-0.5)*0.5;
    this.speedY=(Math.random()-0.5)*0.5;
    this.color=`rgba(255,255,255,0.2)`;
  }
  draw(){
    ctx.strokeStyle=this.color;
    ctx.lineWidth=2;
    ctx.beginPath();
    if(this.type=='circle') ctx.arc(this.x,this.y,this.size,0,2*Math.PI);
    else if(this.type=='square') ctx.strokeRect(this.x,this.y,this.size,this.size);
    else if(this.type=='triangle'){
      ctx.moveTo(this.x,this.y);
      ctx.lineTo(this.x+this.size,this.y+this.size);
      ctx.lineTo(this.x-this.size,this.y+this.size);
      ctx.closePath();
      ctx.stroke();
    } else if(this.type=='parallelogram'){
      ctx.moveTo(this.x,this.y);
      ctx.lineTo(this.x+this.size*1.2,this.y);
      ctx.lineTo(this.x+this.size,this.y+this.size);
      ctx.lineTo(this.x-0.2*this.size,this.y+this.size);
      ctx.closePath();
      ctx.stroke();
    }
  }
  update(){
    this.x+=this.speedX; this.y+=this.speedY;
    if(this.x<0||this.x>canvas.width) this.speedX*=-1;
    if(this.y<0||this.y>canvas.height) this.speedY*=-1;
    this.draw();
  }
}
let shapes=[];
for(let i=0;i<10;i++) shapes.push(new Shape());
function animate(){ ctx.clearRect(0,0,canvas.width,canvas.height); shapes.forEach(s=>s.update()); requestAnimationFrame(animate); }
animate();
window.addEventListener('resize',()=>{canvas.width=window.innerWidth; canvas.height=window.innerHeight;});
</script>
</body>
</html>
