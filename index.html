<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>ClipFlow Elegant Simple</title>
<style>
body {
  font-family: sans-serif;
  margin:0;
  padding:0;
  background:white;
  color:black;
}
nav {
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:15px 25px;
  border-bottom:1px solid black;
}
nav h1 { margin:0; }
button {
  padding:6px 12px;
  margin-left:5px;
  cursor:pointer;
}
#projects {
  display:flex;
  flex-wrap:wrap;
  gap:15px;
  padding:15px;
}
.project-card {
  border:1px solid black;
  border-radius:8px;
  padding:10px;
  width:200px;
  cursor:pointer;
  transition:0.2s;
}
.project-card:hover {
  background:#f0f0f0;
}
.project-card img {
  width:100%;
  height:120px;
  object-fit:cover;
}
#playerContainer {
  margin:20px 15px;
}
video { width:100%; max-height:500px; }

/* Modal */
#modal {
  position:fixed;
  top:0;left:0;
  width:100%;height:100%;
  background: rgba(0,0,0,0.5);
  display:flex;
  justify-content:center;
  align-items:center;
}
.modal-content {
  background:white;
  color:black;
  padding:20px;
  border-radius:10px;
  width:350px;
  display:flex;
  flex-direction:column;
  gap:10px;
}
input, textarea, select {
  padding:8px;
  border-radius:6px;
  border:1px solid black;
  width:100%;
}
.dropzone {
  padding:10px;
  border:2px dashed black;
  text-align:center;
  cursor:pointer;
}
.dropzone.dragover {
  border-color:#333;
}
</style>
</head>
<body>

<nav>
  <h1>ClipFlow</h1>
  <div>
    <button onclick="pickFolder()">📂 اختر الفولدر</button>
    <button onclick="openModal()">+ مشروع جديد</button>
  </div>
</nav>

<div id="projects"></div>
<div id="playerContainer"></div>

<!-- Modal -->
<div id="modal" style="display:none;">
  <div class="modal-content">
    <h3>مشروع جديد</h3>
    <div class="dropzone" id="videoDrop">اسحب الفيديو هنا أو اضغط لاختياره</div>
    <div class="dropzone" id="thumbDrop">اسحب صورة المعاينة هنا أو اضغط لاختيارها</div>
    <input id="title" placeholder="العنوان">
    <textarea id="desc" placeholder="الوصف"></textarea>
    <select id="type">
      <option value="YouTube">YouTube</option>
      <option value="Short">Shorts / TikTok</option>
    </select>
    <div style="display:flex; justify-content:flex-end; gap:5px;">
      <button onclick="saveProject()">حفظ</button>
      <button onclick="closeModal()">إلغاء</button>
    </div>
  </div>
</div>

<script>
let dir;
let videoFile=null;
let thumbFile=null;

async function pickFolder(){
  dir = await window.showDirectoryPicker();
  loadProjects();
}

function openModal(){
  document.getElementById("modal").style.display="flex";
}
function closeModal(){
  document.getElementById("modal").style.display="none";
  videoFile=null;
  thumbFile=null;
}

const setupDrop = (id, callback)=>{
  const el = document.getElementById(id);
  el.onclick = ()=>{ 
    let input = document.createElement("input");
    input.type="file";
    input.accept=id=="videoDrop"?"video/*":"image/*";
    input.click();
    input.onchange=()=> callback(input.files[0]);
  };
  el.ondragover = e=>{e.preventDefault(); el.classList.add("dragover");};
  el.ondragleave = ()=> el.classList.remove("dragover");
  el.ondrop = e=>{ e.preventDefault(); el.classList.remove("dragover"); callback(e.dataTransfer.files[0]); };
};

setupDrop("videoDrop", f=>{ videoFile=f; });
setupDrop("thumbDrop", f=>{ thumbFile=f; });

async function saveProject(){
  if(!dir){ alert("اختر فولدر أولاً"); return;}
  if(!videoFile){ alert("اختر فيديو"); return;}
  if(!thumbFile){ alert("اختر صورة"); return;}

  let name = "Project_"+Date.now();
  let pDir = await dir.getDirectoryHandle(name, {create:true});

  // حفظ الفيديو
  let vHandle = await pDir.getFileHandle("video.mp4", {create:true});
  let vw = await vHandle.createWritable();
  await vw.write(videoFile); await vw.close();

  // حفظ الصورة
  let tHandle = await pDir.getFileHandle("thumb.png", {create:true});
  let tw = await tHandle.createWritable();
  await tw.write(thumbFile); await tw.close();

  // حفظ البيانات
  let data = {
    title: document.getElementById("title").value||"بدون عنوان",
    desc: document.getElementById("desc").value||"",
    type: document.getElementById("type").value
  };
  let dHandle = await pDir.getFileHandle("data.json",{create:true});
  let dw = await dHandle.createWritable();
  await dw.write(JSON.stringify(data)); await dw.close();

  closeModal();
  loadProjects();
}

async function loadProjects(){
  const container = document.getElementById("projects");
  container.innerHTML="";
  for await (const entry of dir.values()){
    if(entry.kind==="directory"){
      try{
        let f = await entry.getFileHandle("data.json");
        let data = JSON.parse(await (await f.getFile()).text());
        let thumbURL="";
        try{
          let t = await entry.getFileHandle("thumb.png");
          thumbURL = URL.createObjectURL(await t.getFile());
        }catch{}
        let div = document.createElement("div");
        div.className="project-card";
        div.innerHTML=`<img src="${thumbURL}"><b>${data.title}</b>`;
        div.onclick=async ()=>{
          let v = await entry.getFileHandle("video.mp4");
          let url = URL.createObjectURL(await v.getFile());
          document.getElementById("playerContainer").innerHTML=`<video src="${url}" controls autoplay></video>`;
        };
        container.appendChild(div);
      }catch{}
    }
  }
}
</script>

</body>
</html>
