<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clipflow</title>
    <style>
        :root {
            --bg: #0a0b1e; --card: #16183d; --text: #ffffff; --muted: #a0a4d0;
            --accent: #6c63ff; --border: rgba(255,255,255,0.1);
        }
        [data-theme="light"] {
            --bg: #f4f7fe; --card: #ffffff; --text: #1a1c3d; --muted: #64748b; --border: rgba(0,0,0,0.1);
        }

        body { margin: 0; font-family: sans-serif; background: var(--bg); color: var(--text); transition: 0.3s; }
        
        /* Navbar & Search */
        nav { padding: 15px 25px; background: var(--card); border-bottom: 1px solid var(--border); }
        .nav-top { display: flex; align-items: center; justify-content: space-between; margin-bottom: 15px; }
        .logo { display: flex; align-items: center; gap: 10px; font-weight: bold; font-size: 20px; }
        
        .search-area { display: flex; align-items: center; gap: 10px; background: var(--bg); padding: 8px 15px; border-radius: 8px; border: 1px solid var(--border); }
        .search-area input { background: none; border: none; color: var(--text); width: 100%; outline: none; }

        /* Platform Categories - Below Search */
        .categories { display: flex; gap: 10px; padding: 10px 25px; overflow-x: auto; background: var(--bg); }
        .cat-btn { display: flex; align-items: center; gap: 8px; padding: 8px 15px; background: var(--card); border: 1px solid var(--border); border-radius: 20px; cursor: pointer; color: var(--text); white-space: nowrap; }
        .cat-btn.active { border-color: var(--accent); background: rgba(108, 99, 255, 0.1); }

        /* Grid & Cards */
        #mainGrid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px; padding: 25px; }
        .video-card { background: var(--card); border-radius: 12px; border: 1px solid var(--border); overflow: hidden; position: relative; }
        
        .thumb-wrap { width: 100%; background: #000; cursor: pointer; position: relative; }
        .ratio-16-9 { aspect-ratio: 16/9; }
        .ratio-9-16 { aspect-ratio: 9/16; max-height: 450px; }
        .thumb-wrap img { width: 100%; height: 100%; object-fit: cover; }

        .card-content { padding: 15px; position: relative; }
        .edit-trigger { position: absolute; top: 15px; right: 10px; cursor: pointer; padding: 5px; z-index: 10; }

        /* Modal Layout: Video TOP, then Thumbs, then Meta */
        .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.9); display: none; justify-content: center; align-items: center; z-index: 2000; }
        .modal-content { background: var(--card); padding: 25px; border-radius: 15px; width: 90%; max-width: 500px; max-height: 90vh; overflow-y: auto; }
        
        .field { margin-bottom: 15px; }
        .field label { display: block; margin-bottom: 5px; font-size: 13px; color: var(--muted); display: flex; align-items: center; gap: 8px; }
        input, textarea, select { width: 100%; padding: 10px; background: var(--bg); border: 1px solid var(--border); color: var(--text); border-radius: 5px; box-sizing: border-box; }

        .thumb-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 15px; }
        .thumb-box { aspect-ratio: 16/9; border: 1px dashed var(--border); display: flex; align-items: center; justify-content: center; cursor: pointer; }
        .thumb-box img { width: 100%; height: 100%; object-fit: cover; }

        .icon-btn { background: none; border: none; cursor: pointer; padding: 5px; }
        .u-icon { width: 24px; height: 24px; object-fit: contain; }

        #bgCanvas { position: fixed; top: 0; left: 0; z-index: -1; pointer-events: none; }
    </style>
</head>
<body>

<canvas id="bgCanvas"></canvas>

<nav>
    <div class="nav-top">
        <div class="logo">
            <img src="youtube.png" class="u-icon"> Clipflow
        </div>
        <div style="display:flex; gap:15px;">
            <button class="icon-btn" onclick="toggleTheme()">
                <img src="brightness.png" id="themeIcon" class="u-icon">
            </button>
            <button class="icon-btn" onclick="toggleLang()">
                <img src="arabic.png" class="u-icon">
            </button>
            <button class="icon-btn" onclick="openForm()">
                <img src="sign.png" class="u-icon" style="width:30px;">
            </button>
        </div>
    </div>

    <div class="search-area">
        <img src="serch.png" class="u-icon" style="width:18px;">
        <input type="text" id="searchInp" placeholder="Search videos..." oninput="drawGrid()">
    </div>
</nav>

<div class="categories" id="platformTabs">
    <button class="cat-btn active" onclick="filterBy('all')">All</button>
    <button class="cat-btn" onclick="filterBy('yt')"><img src="youtube.png" class="u-icon" style="width:16px;"> YouTube</button>
    <button class="cat-btn" onclick="filterBy('reels')"><img src="reels.png" class="u-icon" style="width:16px;"> Instagram</button>
    <button class="cat-btn" onclick="filterBy('fb')"><img src="facebook.png" class="u-icon" style="width:16px;"> Facebook</button>
    <button class="cat-btn" onclick="filterBy('snap')"><img src="snap.png" class="u-icon" style="width:16px;"> Snapchat</button>
</div>

<div id="mainGrid"></div>

<div class="modal" id="formModal">
    <div class="modal-content">
        <h2 id="mHeader">New Video</h2>
        
        <div class="field">
            <label><img src="upload video.png" class="u-icon" style="width:16px;"> Step 1: Select Video File</label>
            <input type="file" id="vFile" accept="video/*">
        </div>

        <label style="font-size:12px; color:var(--muted);">Step 2: Add 3 Thumbnails (First is Cover)</label>
        <div class="thumb-grid">
            <div class="thumb-box" onclick="pickThumb(0)"><img id="p0" src="upload thimb.png"></div>
            <div class="thumb-box" onclick="pickThumb(1)"><img id="p1" src="upload thimb.png"></div>
            <div class="thumb-box" onclick="pickThumb(2)"><img id="p2" src="upload thimb.png"></div>
        </div>

        <div class="field">
            <label><img src="title.png" class="u-icon" style="width:16px;"> Title</label>
            <input type="text" id="vTitle">
        </div>
        <div class="field">
            <label><img src="description.png" class="u-icon" style="width:16px;"> Description</label>
            <textarea id="vDesc" rows="2"></textarea>
        </div>
        <div class="field">
            <label><img src="calendar.png" class="u-icon" style="width:16px;"> Date</label>
            <input type="date" id="vDate">
        </div>
        <div class="field">
            <label>Platform & Ratio</label>
            <select id="vPlat">
                <option value="yt">YouTube (16:9)</option>
                <option value="fb">Facebook (16:9)</option>
                <option value="reels">Instagram Reels (9:16)</option>
                <option value="shorts">YT Shorts (9:16)</option>
                <option value="snap">Snapchat (9:16)</option>
                <option value="tiktok">TikTok (9:16)</option>
            </select>
        </div>

        <button onclick="save()" style="width:100%; padding:12px; background:var(--accent); color:white; border:none; border-radius:5px; font-weight:bold; cursor:pointer;">Save Project</button>
        <button id="delBtn" onclick="remove()" style="width:100%; padding:8px; background:none; color:#ff4757; border:none; cursor:pointer; margin-top:10px; display:none;">
            <img src="trash.png" class="u-icon" style="width:14px;"> Delete Permanently
        </button>
        <button onclick="closeModal()" style="width:100%; padding:8px; background:none; color:var(--muted); border:none; cursor:pointer;">Cancel</button>
    </div>
</div>

<div class="modal" id="playModal" onclick="this.style.display='none'; document.getElementById('mainVid').pause();">
    <video id="mainVid" controls style="width:90%; max-height:80vh; border-radius:10px;"></video>
</div>

<script>
    let db = JSON.parse(localStorage.getItem('clipflow_db') || '[]');
    let currentFilter = 'all';
    let editIdx = null;
    let thumbs = [null, null, null];

    // THEME TOGGLE FIX
    function toggleTheme() {
        const root = document.documentElement;
        const isDark = root.getAttribute('data-theme') === 'dark';
        root.setAttribute('data-theme', isDark ? 'light' : 'dark');
        document.getElementById('themeIcon').src = isDark ? 'moon.png' : 'brightness.png';
    }

    function openForm() {
        editIdx = null;
        document.getElementById('mHeader').innerText = "New Video";
        document.getElementById('delBtn').style.display = 'none';
        document.getElementById('vTitle').value = '';
        document.getElementById('vDesc').value = '';
        document.getElementById('vDate').value = new Date().toISOString().split('T')[0];
        thumbs = [null, null, null];
        [0,1,2].forEach(i => document.getElementById('p'+i).src = 'upload thimb.png');
        document.getElementById('formModal').style.display = 'flex';
    }

    function pickThumb(i) {
        const inp = document.createElement('input');
        inp.type = 'file'; inp.accept = 'image/*';
        inp.onchange = (e) => {
            const reader = new FileReader();
            reader.onload = (f) => {
                thumbs[i] = f.target.result;
                document.getElementById('p'+i).src = f.target.result;
            };
            reader.readAsDataURL(e.target.files[0]);
        };
        inp.click();
    }

    function save() {
        const item = {
            title: document.getElementById('vTitle').value,
            desc: document.getElementById('vDesc').value,
            date: document.getElementById('vDate').value,
            plat: document.getElementById('vPlat').value,
            images: [...thumbs]
        };
        if(editIdx !== null) db[editIdx] = item;
        else db.push(item);
        
        localStorage.setItem('clipflow_db', JSON.stringify(db));
        closeModal();
        drawGrid();
    }

    function drawGrid() {
        const container = document.getElementById('mainGrid');
        container.innerHTML = '';
        const search = document.getElementById('searchInp').value.toLowerCase();

        // Sort Newest to Oldest
        const filtered = db
            .filter(i => (currentFilter === 'all' || i.plat === currentFilter) && i.title.toLowerCase().includes(search))
            .sort((a,b) => new Date(b.date) - new Date(a.date));

        filtered.forEach((item) => {
            const isVertical = ['reels','shorts','snap','tiktok'].includes(item.plat);
            const card = document.createElement('div');
            card.className = 'video-card';
            card.innerHTML = `
                <div class="thumb-wrap ${isVertical ? 'ratio-9-16' : 'ratio-16-9'}" onclick="watch()">
                    <img src="${item.images[0] || 'upload thimb.png'}">
                </div>
                <div class="card-content">
                    <div class="edit-trigger" onclick="event.stopPropagation(); startEdit(${db.indexOf(item)})">
                        <img src="edit.png" class="u-icon" style="width:18px;">
                    </div>
                    <div style="font-weight:bold; margin-bottom:5px;">${item.title}</div>
                    <div style="font-size:12px; color:var(--muted);">${item.date}</div>
                </div>
            `;
            container.appendChild(card);
        });
    }

    function startEdit(idx) {
        editIdx = idx;
        const i = db[idx];
        document.getElementById('mHeader').innerText = "Edit Video";
        document.getElementById('vTitle').value = i.title;
        document.getElementById('vDesc').value = i.desc;
        document.getElementById('vDate').value = i.date;
        document.getElementById('vPlat').value = i.plat;
        thumbs = [...i.images];
        thumbs.forEach((src, idx) => document.getElementById('p'+idx).src = src || 'upload thimb.png');
        document.getElementById('delBtn').style.display = 'block';
        document.getElementById('formModal').style.display = 'flex';
    }

    function remove() {
        if(confirm("PERMANENT DELETE: This cannot be recovered. Are you sure?")) {
            db.splice(editIdx, 1);
            localStorage.setItem('clipflow_db', JSON.stringify(db));
            closeModal();
            drawGrid();
        }
    }

    function watch() {
        // Since we are simulating local storage, real video files need a Blob URL
        // For this demo, we trigger the modal window
        document.getElementById('playModal').style.display = 'flex';
    }

    function filterBy(p) {
        currentFilter = p;
        document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
        event.currentTarget.classList.add('active');
        drawGrid();
    }

    function closeModal() { document.getElementById('formModal').style.display = 'none'; }
    
    // Background Shapes
    const canvas = document.getElementById('bgCanvas');
    const ctx = canvas.getContext('2d');
    canvas.width = window.innerWidth; canvas.height = window.innerHeight;
    function drawShapes() {
        ctx.clearRect(0,0,canvas.width, canvas.height);
        ctx.strokeStyle = 'rgba(108, 99, 255, 0.1)';
        ctx.strokeRect(100, 100, 50, 50);
        ctx.beginPath(); ctx.arc(canvas.width-100, 200, 30, 0, Math.PI*2); ctx.stroke();
    }
    drawShapes();
    drawGrid();
</script>
</body>
</html>
