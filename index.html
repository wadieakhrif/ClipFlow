<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clipflow Pro</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&family=Cairo:wght@400;700&display=swap');

        :root {
            --primary: #6c63ff; --primary-hover: #5a52d6;
            --bg: #05060f; --card-bg: rgba(17, 19, 34, 0.8);
            --nav-bg: rgba(13, 15, 30, 0.9); --text: #ffffff;
            --text-muted: #94a3b8; --border: rgba(255, 255, 255, 0.1);
            --danger: #ff4757;
        }

        [data-theme="light"] {
            --bg: #f8fafc; --card-bg: rgba(255, 255, 255, 0.8);
            --nav-bg: rgba(255, 255, 255, 0.9); --text: #0f172a;
            --text-muted: #64748b; --border: rgba(0, 0, 0, 0.1);
        }

        body {
            margin: 0; font-family: 'Inter', sans-serif;
            background: var(--bg); color: var(--text);
            transition: 0.3s; line-height: 1.6; overflow-x: hidden;
        }
        body.rtl { direction: rtl; font-family: 'Cairo', sans-serif; }

        #bgCanvas { position: fixed; top: 0; left: 0; z-index: -1; pointer-events: none; }

        header {
            position: sticky; top: 0; z-index: 1000;
            background: var(--nav-bg); backdrop-filter: blur(12px);
            border-bottom: 1px solid var(--border); padding: 15px 30px;
            display: flex; align-items: center; justify-content: space-between;
        }

        .search-bar { flex: 1; max-width: 450px; margin: 0 20px; }
        .search-bar input {
            width: 100%; background: var(--bg); border: 1px solid var(--border);
            padding: 12px 15px 12px 40px; border-radius: 25px; color: var(--text);
            outline: none;
        }

        .grid {
            display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
            gap: 25px; padding: 40px 30px; max-width: 1500px; margin: 0 auto;
        }

        .card {
            background: var(--card-bg); border-radius: 24px; border: 1px solid var(--border);
            overflow: hidden; position: relative; transition: 0.4s;
            backdrop-filter: blur(10px); height: fit-content;
        }

        /* Fixed Vertical Video Sizing */
        .card.vertical { max-width: 300px; justify-self: center; }
        .card.vertical .card-thumb { aspect-ratio: 9/16; max-height: 400px; }
        .card.horizontal .card-thumb { aspect-ratio: 16/9; }

        .card-thumb { width: 100%; background: #000; cursor: pointer; display: flex; align-items: center; justify-content: center; overflow: hidden; }
        .card-thumb img { width: 100%; height: 100%; object-fit: contain; }

        .card-body { padding: 15px; }
        .card-body h3 { margin: 0; font-size: 16px; }
        .project-date-tag { font-size: 11px; color: var(--text-muted); display: block; margin-bottom: 5px; }
        
        .platform-tags { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 10px; }
        .tag-icon { display: flex; align-items: center; gap: 4px; color: var(--primary); }

        .overlay {
            position: fixed; inset: 0; background: rgba(0,0,0,0.85);
            display: none; align-items: center; justify-content: center;
            z-index: 2000; backdrop-filter: blur(15px);
        }

        .modal {
            background: var(--card-bg); width: 95%; max-width: 500px;
            border-radius: 30px; padding: 30px; border: 1px solid var(--border);
            max-height: 90vh; overflow-y: auto;
        }

        .thumb-preview {
            position: relative; aspect-ratio: 1; background: var(--bg); 
            border: 1px solid var(--border); border-radius: 12px; 
            overflow: hidden; display: flex; align-items: center; justify-content: center; cursor: pointer;
        }
        .remove-thumb {
            position: absolute; top: 5px; right: 5px; background: var(--danger);
            color: white; border: none; border-radius: 50%; width: 20px; height: 20px;
            font-size: 12px; cursor: pointer; z-index: 5; display: none;
        }
        .thumb-preview:hover .remove-thumb.active { display: block; }

        .btn { display: inline-flex; align-items: center; gap: 8px; padding: 10px 20px; border-radius: 12px; border: none; font-weight: 600; cursor: pointer; }
        .btn-primary { background: var(--primary); color: white; }
        .btn-ghost { background: transparent; color: var(--text); border: 1px solid var(--border); }

        .dropdown { position: absolute; top: 55px; right: 15px; background: var(--card-bg); border: 1px solid var(--border); border-radius: 12px; display: none; flex-direction: column; z-index: 100; }
        .dropdown button { padding: 10px 15px; border: none; background: none; color: var(--text); text-align: left; cursor: pointer; display: flex; align-items: center; gap: 8px; border-bottom: 1px solid var(--border); }

        .hidden { display: none !important; }
    </style>
</head>
<body>

<canvas id="bgCanvas"></canvas>

<header>
    <div style="display:flex; align-items:center; gap:10px;">
        <div style="width:35px; height:35px; background:var(--primary); border-radius:8px; display:flex; align-items:center; justify-content:center;"><i data-lucide="clapperboard" size="20"></i></div>
        <h1 style="font-size:20px; margin:0;">Clipflow<span style="color:var(--primary)">.</span></h1>
    </div>

    <div class="search-bar">
        <input type="text" id="mainSearch" data-i18n="searchPlaceholder" placeholder="Search..." oninput="renderProjects()">
    </div>

    <div style="display:flex; gap:10px;">
        <button class="btn btn-ghost" onclick="toggleLanguage()" id="langBtn">AR</button>
        <button class="btn btn-ghost" onclick="toggleTheme()"><i data-lucide="moon" id="themeIcon"></i></button>
        <button class="btn btn-primary" onclick="openModal('add')"><i data-lucide="plus-circle"></i> <span data-i18n="newProject">New</span></button>
    </div>
</header>

<main>
    <div id="projectsContainer" class="grid"></div>
    <div id="setupView" style="text-align:center; padding:100px 0;" class="hidden">
        <i data-lucide="folder-lock" size="48" style="margin-bottom:20px; opacity:0.3"></i>
        <h2 data-i18n="welcomeMsg">Connect your workspace</h2>
        <button class="btn btn-primary" onclick="initWorkspace()"><i data-lucide="folder-up"></i> <span data-i18n="selectFolder">Select Folder</span></button>
    </div>
</main>

<div class="overlay" id="formModal">
    <div class="modal">
        <h2 id="modalTitle" data-i18n="createProject">Create Project</h2>
        
        <div id="videoUploadBox" style="margin-bottom:15px;">
            <div onclick="triggerVideo()" style="border:2px dashed var(--border); padding:20px; text-align:center; border-radius:15px; cursor:pointer;">
                <i data-lucide="video"></i> <br> <span id="videoLabelText" data-i18n="clickUpload">Upload MP4</span>
            </div>
        </div>

        <div style="display:grid; grid-template-columns: repeat(3, 1fr); gap:10px; margin-bottom:15px;">
            <div class="thumb-preview" onclick="pickThumb(0)">
                <button class="remove-thumb" id="rm0" onclick="clearThumb(event, 0)">×</button>
                <img id="pre0" style="width:100%; height:100%; object-fit:contain; display:none">
                <i data-lucide="image"></i>
            </div>
            <div class="thumb-preview" onclick="pickThumb(1)">
                <button class="remove-thumb" id="rm1" onclick="clearThumb(event, 1)">×</button>
                <img id="pre1" style="width:100%; height:100%; object-fit:contain; display:none">
                <i data-lucide="image"></i>
            </div>
            <div class="thumb-preview" onclick="pickThumb(2)">
                <button class="remove-thumb" id="rm2" onclick="clearThumb(event, 2)">×</button>
                <img id="pre2" style="width:100%; height:100%; object-fit:contain; display:none">
                <i data-lucide="image"></i>
            </div>
        </div>

        <input type="date" id="projDate" style="width:100%; padding:12px; background:var(--bg); border:1px solid var(--border); border-radius:10px; color:var(--text); margin-bottom:10px; box-sizing:border-box;">
        <input type="text" id="projTitle" data-i18n="titlePlaceholder" placeholder="Title" style="width:100%; padding:12px; background:var(--bg); border:1px solid var(--border); border-radius:10px; color:var(--text); margin-bottom:10px; box-sizing:border-box;">
        <textarea id="projDesc" data-i18n="descPlaceholder" placeholder="Description" rows="2" style="width:100%; padding:12px; background:var(--bg); border:1px solid var(--border); border-radius:10px; color:var(--text); box-sizing:border-box;"></textarea>

        <div class="checkbox-group" style="margin-top:15px;">
            <label class="check-item"><input type="checkbox" value="youtube"> <i data-lucide="youtube" size="14"></i> YouTube</label>
            <label class="check-item"><input type="checkbox" value="reels"> <i data-lucide="instagram" size="14"></i> Reels</label>
            <label class="check-item"><input type="checkbox" value="tiktok"> <i data-lucide="music-2" size="14"></i> TikTok</label>
        </div>

        <div style="display:flex; gap:10px; margin-top:20px;">
            <button class="btn btn-ghost" style="flex:1" onclick="closeModal()" data-i18n="cancel">Cancel</button>
            <button class="btn btn-primary" style="flex:2" onclick="saveData()"><i data-lucide="save"></i> <span data-i18n="saveBtn">Save</span></button>
        </div>
    </div>
</div>

<script>
    let workspace = null;
    let projects = [];
    let selectedVideo = null;
    let tempThumbs = [null, null, null];
    let currentLang = localStorage.getItem('clipflow_lang') || 'en';

    const i18n = {
        en: { searchPlaceholder: "Search...", newProject: "New Project", welcomeMsg: "Connect workspace", selectFolder: "Select Folder", createProject: "New Project", editProject: "Edit Project", clickUpload: "Upload MP4", titlePlaceholder: "Title", descPlaceholder: "Description", cancel: "Cancel", saveBtn: "Save", edit: "Edit", download: "ZIP", delete: "Delete" },
        ar: { searchPlaceholder: "بحث...", newProject: "مشروع جديد", welcomeMsg: "ربط مجلد العمل", selectFolder: "اختر المجلد", createProject: "مشروع جديد", editProject: "تعديل", clickUpload: "رفع فيديو", titlePlaceholder: "العنوان", descPlaceholder: "الوصف", cancel: "إلغاء", saveBtn: "حفظ", edit: "تعديل", download: "تحميل", delete: "حذف" }
    };

    const PLATFORM_ICONS = {
        youtube: '<i data-lucide="youtube" size="16"></i>',
        shorts: '<i data-lucide="zap" size="16"></i>',
        reels: '<i data-lucide="instagram" size="16"></i>',
        tiktok: '<i data-lucide="music-2" size="16"></i>',
        facebook: '<i data-lucide="facebook" size="16"></i>'
    };

    // --- Persistence Logic ---
    async function verifyPermission(handle) {
        if ((await handle.queryPermission({mode: 'readwrite'})) === 'granted') return true;
        if ((await handle.requestPermission({mode: 'readwrite'})) === 'granted') return true;
        return false;
    }

    async function initWorkspace() {
        workspace = await window.showDirectoryPicker({ mode: 'readwrite' });
        // Store handle in IndexedDB for persistence
        const db = await openDB();
        await db.put('settings', workspace, 'handle');
        document.getElementById('setupView').classList.add('hidden');
        loadProjects();
    }

    async function autoConnect() {
        const db = await openDB();
        const handle = await db.get('settings', 'handle');
        if (handle) {
            if (await verifyPermission(handle)) {
                workspace = handle;
                document.getElementById('setupView').classList.add('hidden');
                loadProjects();
            } else {
                document.getElementById('setupView').classList.remove('hidden');
            }
        } else {
            document.getElementById('setupView').classList.remove('hidden');
        }
    }

    function openDB() {
        return new Promise((resolve) => {
            const req = indexedDB.open('ClipflowDB', 1);
            req.onupgradeneeded = () => req.result.createObjectStore('settings');
            req.onsuccess = () => {
                const db = req.result;
                resolve({
                    put: (s, val, key) => new Promise(r => db.transaction(s, 'readwrite').objectStore(s).put(val, key).onsuccess = r),
                    get: (s, key) => new Promise(r => db.transaction(s).objectStore(s).get(key).onsuccess = e => r(e.target.result))
                });
            };
        });
    }

    async function loadProjects() {
        projects = [];
        const root = await workspace.getDirectoryHandle('Clipflow_Projects', { create: true });
        for await (const [name, handle] of root.entries()) {
            if(handle.kind === 'directory') {
                try {
                    const mFile = await (await handle.getFileHandle('meta.json')).getFile();
                    const meta = JSON.parse(await mFile.text());
                    const vFile = await handle.getFileHandle('video.mp4');
                    projects.push({ name, meta, videoFile: vFile, handle });
                } catch(e) {}
            }
        }
        renderProjects();
    }

    function renderProjects() {
        const container = document.getElementById('projectsContainer');
        const q = document.getElementById('mainSearch').value.toLowerCase();
        container.innerHTML = '';

        // SORTING: Oldest to Newest
        const sorted = projects.sort((a,b) => new Date(a.meta.date || 0) - new Date(b.meta.date || 0));
        
        sorted.forEach((p, idx) => {
            if(!p.meta.title.toLowerCase().includes(q)) return;
            const isVertical = p.meta.platforms.some(x => ['reels','tiktok','shorts'].includes(x));
            
            const div = document.createElement('div');
            div.className = `card ${isVertical ? 'vertical' : 'horizontal'}`;
            div.innerHTML = `
                <div class="dots-btn" onclick="toggleMenu(event, ${idx})" style="position:absolute; top:10px; right:10px; cursor:pointer; background:rgba(0,0,0,0.5); border-radius:50%; width:30px; height:30px; display:flex; align-items:center; justify-content:center;">⋮</div>
                <div class="dropdown" id="menu-${idx}">
                    <button onclick="openModal('edit', ${idx})"><i data-lucide="edit" size="14"></i> ${i18n[currentLang].edit}</button>
                    <button onclick="deleteProject(${idx})" style="color:var(--danger)"><i data-lucide="trash" size="14"></i> ${i18n[currentLang].delete}</button>
                </div>
                <div class="card-thumb" onclick="playVideo(${idx})">
                    <img src="${p.meta.thumbs[0] || ''}">
                </div>
                <div class="card-body">
                    <span class="project-date-tag">${p.meta.date || ''}</span>
                    <h3>${p.meta.title}</h3>
                    <div class="platform-tags">${p.meta.platforms.map(t => `<span class="tag-icon">${PLATFORM_ICONS[t] || t}</span>`).join('')}</div>
                </div>
            `;
            container.appendChild(div);
        });
        lucide.createIcons();
    }

    function clearThumb(e, i) {
        e.stopPropagation();
        tempThumbs[i] = null;
        refreshThumbs();
    }

    function openModal(mode, idx = null) {
        editMode = mode === 'edit';
        if(editMode) {
            const p = projects[idx];
            currentEditName = p.name;
            document.getElementById('projTitle').value = p.meta.title;
            document.getElementById('projDesc').value = p.meta.desc;
            document.getElementById('projDate').value = p.meta.date || "";
            tempThumbs = [...p.meta.thumbs];
        } else {
            document.getElementById('projTitle').value = "";
            document.getElementById('projDesc').value = "";
            document.getElementById('projDate').value = new Date().toISOString().split('T')[0];
            tempThumbs = [null, null, null];
        }
        refreshThumbs();
        document.getElementById('formModal').style.display = 'flex';
        lucide.createIcons();
    }

    async function saveData() {
        const title = document.getElementById('projTitle').value;
        const date = document.getElementById('projDate').value;
        const plats = Array.from(document.querySelectorAll('.checkbox-group input:checked')).map(i => i.value);
        
        const root = await workspace.getDirectoryHandle('Clipflow_Projects', { create: true });
        const folderName = editMode ? currentEditName : title.replace(/\s+/g,'_') + "_" + Date.now();
        const pFolder = await root.getDirectoryHandle(folderName, { create: true });

        const mHandle = await pFolder.getFileHandle('meta.json', { create: true });
        const writer = await mHandle.createWritable();
        await writer.write(JSON.stringify({
            title, date, desc: document.getElementById('projDesc').value,
            platforms: plats, thumbs: tempThumbs,
            timestamp: Date.now()
        }));
        await writer.close();

        if(selectedVideo) {
            const vHandle = await pFolder.getFileHandle('video.mp4', { create: true });
            const vWriter = await vHandle.createWritable();
            await vWriter.write(selectedVideo);
            await vWriter.close();
        }
        closeModal(); loadProjects();
    }

    function refreshThumbs() {
        tempThumbs.forEach((src, i) => {
            const img = document.getElementById(`pre${i}`);
            const btn = document.getElementById(`rm${i}`);
            if(src) { 
                img.src = src; img.style.display = 'block'; 
                btn.classList.add('active');
                img.nextElementSibling.style.display = 'none'; 
            } else { 
                img.style.display = 'none'; 
                btn.classList.remove('active');
                img.nextElementSibling.style.display = 'block'; 
            }
        });
    }

    function toggleLanguage() {
        currentLang = currentLang === 'en' ? 'ar' : 'en';
        localStorage.setItem('clipflow_lang', currentLang);
        location.reload();
    }

    function toggleTheme() {
        const t = document.documentElement.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
        document.documentElement.setAttribute('data-theme', t);
    }

    function toggleMenu(e, idx) {
        e.stopPropagation();
        document.querySelectorAll('.dropdown').forEach(d => d.style.display = 'none');
        document.getElementById(`menu-${idx}`).style.display = 'flex';
    }

    function closeModal() { document.getElementById('formModal').style.display = 'none'; }
    function triggerVideo() {
        const i = document.createElement('input'); i.type = 'file'; i.accept = 'video/mp4';
        i.onchange = e => { selectedVideo = e.target.files[0]; document.getElementById('videoLabelText').innerText = selectedVideo.name; };
        i.click();
    }
    function pickThumb(i) {
        const input = document.createElement('input'); input.type = 'file'; input.accept = 'image/*';
        input.onchange = e => {
            const r = new FileReader();
            r.onload = f => { tempThumbs[i] = f.target.result; refreshThumbs(); };
            r.readAsDataURL(e.target.files[0]);
        };
        input.click();
    }
    
    // Canvas Background
    const canvas = document.getElementById('bgCanvas');
    const ctx = canvas.getContext('2d');
    let shapes = [];
    function initShapes() {
        canvas.width = window.innerWidth; canvas.height = window.innerHeight;
        shapes = Array.from({length: 10}, () => ({
            x: Math.random()*canvas.width, y: Math.random()*canvas.height,
            s: Math.random()*100+50, dx: (Math.random()-0.5)*0.5, dy: (Math.random()-0.5)*0.5
        }));
    }
    function draw() {
        ctx.clearRect(0,0,canvas.width, canvas.height);
        ctx.strokeStyle = 'rgba(108, 99, 255, 0.1)';
        shapes.forEach(p => {
            ctx.strokeRect(p.x, p.y, p.s, p.s);
            p.x += p.dx; p.y += p.dy;
        });
        requestAnimationFrame(draw);
    }
    initShapes(); draw();
    
    autoConnect();
    lucide.createIcons();
</script>
</body>
</html>
