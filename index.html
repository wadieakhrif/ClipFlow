<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clipflow Pro | Creator Workspace</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Cairo:wght@400;700&display=swap');

        :root {
            --primary: #8b5cf6; 
            --primary-glow: rgba(139, 92, 246, 0.3);
            --bg: #030712; 
            --card-bg: rgba(17, 24, 39, 0.7);
            --nav-bg: rgba(3, 7, 18, 0.8);
            --text: #f9fafb;
            --text-muted: #9ca3af;
            --border: rgba(255, 255, 255, 0.08);
            --accent: #10b981;
        }

        [data-theme="light"] {
            --bg: #f3f4f6; 
            --card-bg: rgba(255, 255, 255, 0.8);
            --nav-bg: rgba(243, 244, 246, 0.9);
            --text: #111827;
            --text-muted: #6b7280;
            --border: rgba(0, 0, 0, 0.08);
        }

        body {
            margin: 0; font-family: 'Inter', sans-serif;
            background: var(--bg); color: var(--text);
            transition: background 0.3s; line-height: 1.5;
        }

        body.rtl { direction: rtl; font-family: 'Cairo', sans-serif; }

        /* Animated Background */
        #bgCanvas { position: fixed; top: 0; left: 0; z-index: -1; opacity: 0.4; }

        header {
            position: sticky; top: 0; z-index: 1000;
            background: var(--nav-bg); backdrop-filter: blur(16px);
            border-bottom: 1px solid var(--border); padding: 12px 40px;
            display: flex; align-items: center; justify-content: space-between;
        }

        .logo { display: flex; align-items: center; gap: 10px; font-weight: 800; font-size: 22px; letter-spacing: -0.5px; }
        .logo-icon { width: 36px; height: 36px; background: linear-gradient(135deg, var(--primary), #d946ef); border-radius: 10px; display: flex; align-items: center; justify-content: center; color: white; }

        .header-center { flex: 1; max-width: 600px; margin: 0 40px; }
        
        .search-bar { position: relative; }
        .search-bar i { position: absolute; left: 14px; top: 50%; transform: translateY(-50%); color: var(--text-muted); }
        .search-bar input {
            width: 100%; background: rgba(255,255,255,0.05); border: 1px solid var(--border);
            padding: 10px 15px 10px 42px; border-radius: 12px; color: var(--text);
            font-size: 14px; outline: none; transition: 0.2s;
        }
        .search-bar input:focus { border-color: var(--primary); box-shadow: 0 0 0 4px var(--primary-glow); }

        .grid {
            display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 24px; padding: 40px; max-width: 1600px; margin: 0 auto;
            align-items: start;
        }

        /* CARD DESIGN */
        .card {
            background: var(--card-bg); border-radius: 20px; border: 1px solid var(--border);
            overflow: hidden; position: relative; transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            backdrop-filter: blur(10px);
        }
        .card:hover { transform: translateY(-6px); border-color: rgba(255,255,255,0.2); box-shadow: 0 20px 40px rgba(0,0,0,0.3); }

        /* Dynamic Aspect Ratios */
        .card-thumb { width: 100%; background: #000; position: relative; overflow: hidden; cursor: pointer; }
        .ratio-16-9 { aspect-ratio: 16/9; }
        .ratio-9-16 { aspect-ratio: 9/16; }

        .card-thumb img { width: 100%; height: 100%; object-fit: cover; transition: 0.5s; }
        .card:hover .card-thumb img { transform: scale(1.08); }

        .card-body { padding: 18px; }
        .card-title { font-weight: 700; margin: 0 0 6px 0; font-size: 16px; }
        .card-meta { display: flex; justify-content: space-between; align-items: center; font-size: 12px; color: var(--text-muted); }

        /* Buttons & Chips */
        .btn { 
            padding: 10px 20px; border-radius: 12px; border: none; font-weight: 600; 
            cursor: pointer; display: inline-flex; align-items: center; gap: 8px; font-size: 14px; transition: 0.2s; 
        }
        .btn-primary { background: var(--primary); color: white; box-shadow: 0 4px 14px var(--primary-glow); }
        .btn-primary:hover { background: #7c3aed; transform: translateY(-1px); }
        .btn-ghost { background: transparent; border: 1px solid var(--border); color: var(--text); }
        .btn-ghost:hover { background: rgba(255,255,255,0.05); }

        .platform-chip {
            padding: 4px 8px; border-radius: 6px; background: rgba(255,255,255,0.05);
            display: flex; align-items: center; gap: 4px; font-size: 11px;
        }

        /* Modals */
        .overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.8); backdrop-filter: blur(8px); display: none; align-items: center; justify-content: center; z-index: 2000; }
        .modal { 
            background: #111827; width: 95%; max-width: 600px; border-radius: 24px; padding: 32px; 
            border: 1px solid var(--border); max-height: 90vh; overflow-y: auto; position: relative;
        }

        .input-group { margin-bottom: 20px; }
        .input-group label { display: block; font-size: 12px; font-weight: 600; color: var(--text-muted); margin-bottom: 8px; text-transform: uppercase; }
        .input-group input, .input-group textarea, .input-group select {
            width: 100%; background: #030712; border: 1px solid var(--border); padding: 12px; border-radius: 12px; color: var(--text); outline: none; box-sizing: border-box;
        }

        .thumb-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; margin-bottom: 20px; }
        .thumb-slot { 
            aspect-ratio: 16/9; background: #030712; border: 2px dashed var(--border); border-radius: 12px; 
            display: flex; align-items: center; justify-content: center; cursor: pointer; overflow: hidden; position: relative;
        }
        .thumb-slot img { width: 100%; height: 100%; object-fit: cover; }
        .thumb-slot.is-portrait { aspect-ratio: 9/16; }

        .format-toggle {
            display: flex; background: #030712; padding: 4px; border-radius: 10px; margin-bottom: 20px; gap: 4px;
        }
        .format-btn { 
            flex: 1; padding: 8px; text-align: center; font-size: 12px; font-weight: 600; 
            border-radius: 8px; cursor: pointer; transition: 0.2s; color: var(--text-muted);
        }
        .format-btn.active { background: var(--primary); color: white; }

        .hidden { display: none !important; }
    </style>
</head>
<body>

<canvas id="bgCanvas"></canvas>

<header>
    <div class="logo">
        <div class="logo-icon"><i data-lucide="zap" size="20"></i></div>
        Clipflow<span style="color:var(--primary)">.</span>
    </div>

    <div class="header-center">
        <div class="search-bar">
            <i data-lucide="search" size="16"></i>
            <input type="text" id="mainSearch" placeholder="Search your creative projects..." oninput="renderProjects()">
        </div>
    </div>

    <div style="display:flex; gap:12px; align-items:center;">
        <button class="btn btn-ghost" onclick="toggleLanguage()" id="langBtn" style="padding: 8px 12px;">EN</button>
        <button class="btn btn-ghost" onclick="toggleTheme()" style="padding: 8px 12px;"><i data-lucide="sun" id="themeIcon" size="18"></i></button>
        <button class="btn btn-primary" onclick="openModal('add')"><i data-lucide="plus" size="18"></i> <span data-i18n="newProject">New Project</span></button>
    </div>
</header>

<main>
    <div id="projectsContainer" class="grid"></div>
    <div id="setupView" style="text-align:center; padding:150px 0;" class="hidden">
        <div style="background:var(--primary-glow); width:80px; height:80px; border-radius:50%; display:flex; align-items:center; justify-content:center; margin:0 auto 24px;">
            <i data-lucide="folder-plus" size="40" color="var(--primary)"></i>
        </div>
        <h2 style="margin:0 0 10px 0;">No Workspace Connected</h2>
        <p style="color:var(--text-muted); margin-bottom:30px;">Select a folder on your computer to store your video projects.</p>
        <button class="btn btn-primary" onclick="initWorkspace()">Connect Local Folder</button>
    </div>
</main>

<div class="overlay" id="formModal">
    <div class="modal">
        <h2 id="modalTitle" style="margin:0 0 24px 0;">Create Project</h2>
        
        <div class="input-group">
            <label>Format</label>
            <div class="format-toggle">
                <div class="format-btn active" id="fmt-landscape" onclick="setFormat('landscape')">Landscape ($16:9$)</div>
                <div class="format-btn" id="fmt-portrait" onclick="setFormat('portrait')">Portrait ($9:16$)</div>
            </div>
        </div>

        <div id="videoUploadBox" class="input-group">
            <div onclick="triggerVideo()" style="border:2px dashed var(--primary); padding:30px; text-align:center; border-radius:16px; cursor:pointer; background:var(--primary-glow);">
                <i data-lucide="clapperboard" size="24"></i>
                <p id="videoLabelText" style="margin:10px 0 0 0; font-weight:600; font-size:14px;">Select Video Source (.mp4)</p>
            </div>
        </div>

        <label style="display:block; font-size:12px; font-weight:600; color:var(--text-muted); margin-bottom:8px;">THUMBNAILS (AUTO-FILL)</label>
        <div class="thumb-grid">
            <div class="thumb-slot" id="slot0" onclick="pickThumb(0)"><i data-lucide="image"></i><img id="pre0" class="hidden"></div>
            <div class="thumb-slot" id="slot1" onclick="pickThumb(1)"><i data-lucide="image"></i><img id="pre1" class="hidden"></div>
            <div class="thumb-slot" id="slot2" onclick="pickThumb(2)"><i data-lucide="image"></i><img id="pre2" class="hidden"></div>
        </div>

        <div class="input-group">
            <label>Project Details</label>
            <input type="text" id="projTitle" placeholder="Title your project..." style="margin-bottom:12px;">
            <textarea id="projDesc" placeholder="Brief description or captions..." rows="3"></textarea>
        </div>

        <div style="display:flex; gap:12px; margin-top:32px;">
            <button class="btn btn-ghost" style="flex:1" onclick="closeModal()">Cancel</button>
            <button class="btn btn-primary" style="flex:2" onclick="saveData()">Save Project</button>
        </div>
    </div>
</div>

<script>
    let workspace = null;
    let projects = [];
    let selectedVideo = null;
    let tempThumbs = [null, null, null];
    let selectedFormat = 'landscape';
    let editMode = false;
    let currentEditName = null;
    let currentLang = localStorage.getItem('clipflow_lang') || 'en';

    // Initialize Lucide
    lucide.createIcons();

    async function openDB() {
        return new Promise(res => {
            const req = indexedDB.open("ClipflowProDB", 1);
            req.onupgradeneeded = () => req.result.createObjectStore("settings");
            req.onsuccess = () => res(req.result);
        });
    }

    async function initWorkspace() {
        try {
            workspace = await window.showDirectoryPicker({ mode: 'readwrite' });
            const db = await openDB();
            const tx = db.transaction("settings", "readwrite");
            tx.objectStore("settings").put(workspace, "folderHandle");
            document.getElementById('setupView').classList.add('hidden');
            loadProjects();
        } catch(e) { console.error(e); }
    }

    async function autoConnect() {
        const db = await openDB();
        const req = db.transaction("settings").objectStore("settings").get("folderHandle");
        req.onsuccess = async () => {
            const handle = req.result;
            if (handle && (await handle.queryPermission({mode: 'readwrite'})) === 'granted') {
                workspace = handle;
                document.getElementById('setupView').classList.add('hidden');
                loadProjects();
            } else {
                document.getElementById('setupView').classList.remove('hidden');
            }
        };
    }

    async function loadProjects() {
        projects = [];
        if(!workspace) return;
        const root = await workspace.getDirectoryHandle('Clipflow_Vault', { create: true });
        for await (const [name, handle] of root.entries()) {
            if(handle.kind === 'directory') {
                try {
                    const mFile = await (await handle.getFileHandle('meta.json')).getFile();
                    const meta = JSON.parse(await mFile.text());
                    const vFile = await handle.getFileHandle('video.mp4');
                    projects.push({ name, meta, videoFile: vFile });
                } catch(e) {}
            }
        }
        renderProjects();
    }

    function setFormat(fmt) {
        selectedFormat = fmt;
        document.getElementById('fmt-landscape').classList.toggle('active', fmt === 'landscape');
        document.getElementById('fmt-portrait').classList.toggle('active', fmt === 'portrait');
        
        document.querySelectorAll('.thumb-slot').forEach(slot => {
            slot.classList.toggle('is-portrait', fmt === 'portrait');
        });
    }

    function renderProjects() {
        const container = document.getElementById('projectsContainer');
        const q = document.getElementById('mainSearch').value.toLowerCase();
        container.innerHTML = '';

        projects.filter(p => p.meta.title.toLowerCase().includes(q)).forEach((p, idx) => {
            const ratioClass = p.meta.format === 'portrait' ? 'ratio-9-16' : 'ratio-16-9';
            const card = document.createElement('div');
            card.className = 'card';
            card.innerHTML = `
                <div class="card-thumb ${ratioClass}" onclick="playVideo(${idx})">
                    <img src="${p.meta.thumbs[0] || ''}">
                </div>
                <div class="card-body">
                    <h3 class="card-title">${p.meta.title}</h3>
                    <div class="card-meta">
                        <span>${new Date(p.meta.timestamp).toLocaleDateString()}</span>
                        <div style="display:flex; gap:8px;">
                            <button class="btn-ghost" style="padding:4px;" onclick="deleteProject(${idx}, event)"><i data-lucide="trash-2" size="14"></i></button>
                            <button class="btn-ghost" style="padding:4px;" onclick="downloadZip(${idx}, event)"><i data-lucide="download" size="14"></i></button>
                        </div>
                    </div>
                </div>
            `;
            container.appendChild(card);
        });
        lucide.createIcons();
    }

    function openModal(mode) {
        editMode = mode === 'edit';
        document.getElementById('formModal').style.display = 'flex';
        tempThumbs = [null, null, null];
        selectedVideo = null;
        refreshThumbs();
    }

    function closeModal() { document.getElementById('formModal').style.display = 'none'; }

    async function captureFrame(videoFile) {
        return new Promise(res => {
            const v = document.createElement('video');
            v.src = URL.createObjectURL(videoFile);
            v.onloadedmetadata = () => v.currentTime = 0.5;
            v.onseeked = () => {
                const c = document.createElement('canvas');
                c.width = v.videoWidth; c.height = v.videoHeight;
                c.getContext('2d').drawImage(v, 0, 0);
                res(c.toDataURL('image/jpeg', 0.8));
            };
        });
    }

    function triggerVideo() {
        const inp = document.createElement('input');
        inp.type = 'file'; inp.accept = 'video/mp4';
        inp.onchange = async e => {
            selectedVideo = e.target.files[0];
            document.getElementById('videoLabelText').innerText = selectedVideo.name;
            if(!tempThumbs[0]) {
                tempThumbs[0] = await captureFrame(selectedVideo);
                refreshThumbs();
            }
        };
        inp.click();
    }

    function pickThumb(i) {
        const inp = document.createElement('input');
        inp.type = 'file'; inp.accept = 'image/*';
        inp.onchange = e => {
            const reader = new FileReader();
            reader.onload = f => { tempThumbs[i] = f.target.result; refreshThumbs(); };
            reader.readAsDataURL(e.target.files[0]);
        };
        inp.click();
    }

    function refreshThumbs() {
        tempThumbs.forEach((src, i) => {
            const img = document.getElementById(`pre${i}`);
            const slot = document.getElementById(`slot${i}`);
            if(src) {
                img.src = src; img.classList.remove('hidden');
                slot.querySelector('i').classList.add('hidden');
            } else {
                img.classList.add('hidden');
                slot.querySelector('i').classList.remove('hidden');
            }
        });
    }

    async function saveData() {
        const title = document.getElementById('projTitle').value;
        if(!title || !selectedVideo) return alert("Title and Video required");

        const root = await workspace.getDirectoryHandle('Clipflow_Vault', { create: true });
        const folderName = title.replace(/\s+/g, '_') + "_" + Date.now();
        const folder = await root.getDirectoryHandle(folderName, { create: true });

        const meta = { title, desc: document.getElementById('projDesc').value, format: selectedFormat, thumbs: tempThumbs, timestamp: Date.now() };
        
        const mFile = await folder.getFileHandle('meta.json', { create: true });
        const writer = await mFile.createWritable();
        await writer.write(JSON.stringify(meta));
        await writer.close();

        const vFile = await folder.getFileHandle('video.mp4', { create: true });
        const vWriter = await vFile.createWritable();
        await vWriter.write(selectedVideo);
        await vWriter.close();

        closeModal();
        loadProjects();
    }

    async function deleteProject(idx, e) {
        e.stopPropagation();
        if(confirm("Permanently delete this project?")) {
            const root = await workspace.getDirectoryHandle('Clipflow_Vault');
            await root.removeEntry(projects[idx].name, { recursive: true });
            loadProjects();
        }
    }

    async function downloadZip(idx, e) {
        e.stopPropagation();
        const p = projects[idx];
        const zip = new JSZip();
        zip.file("video.mp4", await p.videoFile.getFile());
        zip.file("meta.json", JSON.stringify(p.meta));
        const content = await zip.generateAsync({type:"blob"});
        saveAs(content, `${p.meta.title}.zip`);
    }

    async function playVideo(idx) {
        const file = await projects[idx].videoFile.getFile();
        const url = URL.createObjectURL(file);
        const win = window.open("");
        win.document.write(`<body style="margin:0;background:#000;display:flex;align-items:center;justify-content:center;"><video src="${url}" controls autoplay style="max-height:100vh;max-width:100%"></video></body>`);
    }

    // BG Animation
    const canvas = document.getElementById('bgCanvas');
    const ctx = canvas.getContext('2d');
    let circles = [];

    function initCircles() {
        canvas.width = window.innerWidth; canvas.height = window.innerHeight;
        circles = Array.from({length: 20}, () => ({
            x: Math.random() * canvas.width, y: Math.random() * canvas.height,
            r: Math.random() * 100 + 50, dx: (Math.random() - 0.5) * 0.5, dy: (Math.random() - 0.5) * 0.5
        }));
    }

    function animate() {
        ctx.clearRect(0,0,canvas.width, canvas.height);
        ctx.fillStyle = getComputedStyle(document.documentElement).getPropertyValue('--primary');
        ctx.globalAlpha = 0.05;
        circles.forEach(c => {
            ctx.beginPath(); ctx.arc(c.x, c.y, c.r, 0, Math.PI*2); ctx.fill();
            c.x += c.dx; c.y += c.dy;
            if(c.x<0 || c.x>canvas.width) c.dx*=-1;
            if(c.y<0 || c.y>canvas.height) c.dy*=-1;
        });
        requestAnimationFrame(animate);
    }

    window.onresize = initCircles;
    initCircles(); animate();
    autoConnect();
</script>

</body>
</html>
