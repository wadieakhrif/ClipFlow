<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Clip Flow</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap');

body {
    margin:0;
    font-family: 'Roboto', sans-serif;
    background: linear-gradient(135deg, #0d0f25, #1a0a36);
    overflow-x: hidden;
    color: #fff;
}

/* الخلفية المتحركة */
body::before {
    content:'';
    position:fixed;
    top:0; left:0;
    width:100%; height:100%;
    background: radial-gradient(circle, rgba(108,99,255,0.2) 1px, transparent 1px);
    background-size: 50px 50px;
    animation: moveBg 60s linear infinite;
    z-index:-1;
}

@keyframes moveBg {
    from {background-position:0 0;}
    to {background-position:500px 500px;}
}

header {
    display:flex;
    align-items:center;
    padding:20px;
    gap:15px;
}

header img {
    width:50px;
    height:50px;
}

header h1 {
    font-size:28px;
    background: linear-gradient(90deg,#6c63ff,#0d6cff);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
}

button {
    padding:10px 20px;
    margin:5px;
    cursor:pointer;
    border:none;
    border-radius:10px;
    font-weight:bold;
    transition:0.3s;
}

button:hover {
    transform:scale(1.05);
}

button#addProjectBtn {
    background:#6c63ff;
    color:#fff;
}

button#chooseFolder {
    background:#0d6cff;
    color:#fff;
}

/* واجهة المشروع */
#projectsContainer {
    display:grid;
    grid-template-columns: repeat(auto-fill, minmax(220px,1fr));
    gap:20px;
    padding:20px;
}

.project {
    background: linear-gradient(145deg, #1a0a36, #0d0f25);
    border-radius:15px;
    overflow:hidden;
    box-shadow:0 5px 15px rgba(0,0,0,0.5);
    display:flex;
    flex-direction:column;
    cursor:pointer;
    transition:0.3s;
}

.project:hover {
    transform: translateY(-5px);
}

.project img {
    width:100%;
    height:140px;
    object-fit:cover;
}

.project-info {
    padding:10px;
    display:flex;
    flex-direction:column;
    gap:5px;
}

.project-info h3 {
    font-size:16px;
    margin:0;
    font-weight:bold;
}

.project-info p {
    font-size:12px;
    margin:0;
    display:flex;
    align-items:center;
    gap:5px;
}

/* ألوان المنصات */
.platform-label {
    padding:2px 6px;
    border-radius:5px;
    font-size:11px;
    font-weight:bold;
    color:#fff;
}

.youtube { background:#FF0000; }
.youtube-shorts { background:#FF5555; }
.tiktok { background:#000000; color:#fff; }
.instagram { background: linear-gradient(45deg,#feda75,#d62976,#8134af); }

/* فورم إضافة مشروع */
#projectForm {
    background:#1a0a36;
    padding:15px;
    margin:20px;
    border-radius:15px;
}

#dropZone, #dropThumbs {
    border:2px dashed #6c63ff;
    border-radius:10px;
    padding:20px;
    text-align:center;
    margin:10px 0;
    cursor:pointer;
    transition:0.3s;
}

#dropZone:hover, #dropThumbs:hover { border-color:#fff; }

#thumbPreview img { margin:3px; border-radius:5px; width:50px; height:35px; object-fit:cover; }

input, textarea {
    width:100%;
    border:none;
    border-radius:8px;
    padding:8px;
    margin:5px 0;
    background:#0d0f25;
    color:#fff;
}

.platformBtn {
    padding:5px 10px;
    margin:2px;
    border-radius:6px;
    background:#6c63ff;
    transition:0.3s;
}

.platformBtn.selected { background:#ff6c63; }
</style>
</head>
<body>

<header>
    <img src="https://img.sanishtech.com/u/8a6ce39c01afd349c83d1c5b8f4cd7ac.png" alt="Logo">
    <h1>Clip Flow</h1>
</header>

<div style="padding:0 20px;">
<button id="chooseFolder">اختر مجلد المشاريع</button>
<button id="addProjectBtn" disabled>مشروع جديد</button>
</div>

<div id="projectForm" style="display:none;">
    <h2 id="formTitle">إضافة مشروع جديد</h2>
    <div id="dropZone">اسحب الفيديو هنا أو اضغط لاختياره</div>
    <div id="dropThumbs">اسحب الصور المصغرة هنا أو اضغط لاختيارها (1-3)</div>
    <div id="thumbPreview"></div>
    <input type="text" id="title" placeholder="عنوان المشروع">
    <textarea id="description" placeholder="الوصف"></textarea>
    <div>
        <span>اختر المنصات:</span>
        <button class="platformBtn" data-name="YouTube">YouTube</button>
        <button class="platformBtn" data-name="YouTube Shorts">YouTube Shorts</button>
        <button class="platformBtn" data-name="TikTok">TikTok</button>
        <button class="platformBtn" data-name="Instagram">Instagram Reels</button>
    </div>
    <label>اختر الوقت والتاريخ:</label>
    <input type="datetime-local" id="datetime">
    <button id="saveProject">حفظ المشروع</button>
    <button id="cancelProject">إلغاء</button>
</div>

<div id="projectsContainer"></div>

<script>
// --- هنا يمكنك إضافة كل سكريبت إدارة المشاريع نفسه كما في النسخة الأخيرة ---
// لا تتغير أي وظيفة، فقط تغيّر الشكل

</script>

</body>
</html>
