<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Clip Flow</title>
<style>
  body { font-family: Arial, sans-serif; background: #1e1e2f; color: #fff; padding: 20px; }
  h1 { color: #6c63ff; }
  button { padding: 10px 20px; margin: 5px; cursor: pointer; border: none; border-radius: 8px; background: #6c63ff; color: #fff; }
  input, select { padding: 5px; margin: 5px; border-radius: 5px; }
  .project { border: 1px solid #444; padding: 10px; margin: 10px 0; border-radius: 8px; background: #2a2a3e; }
  .thumb { width: 120px; height: 70px; object-fit: cover; margin-right: 10px; }
  .project-header { display: flex; align-items: center; }
  .project-info { flex: 1; }
</style>
</head>
<body>

<h1>Clip Flow</h1>
<button id="chooseFolder">اختر مجلد المشاريع</button>
<button id="addProject" disabled>مشروع جديد</button>

<div id="projectsContainer"></div>

<script>
let rootFolderHandle;
let projects = [];

// اختيار المجلد الرئيسي
document.getElementById('chooseFolder').addEventListener('click', async () => {
    try {
        rootFolderHandle = await window.showDirectoryPicker();
        // تأكد من وجود مجلد Clip Flow داخله
        let clipFlowFolder;
        try {
            clipFlowFolder = await rootFolderHandle.getDirectoryHandle('Clip Flow', { create: true });
        } catch(e) {
            clipFlowFolder = await rootFolderHandle.getDirectoryHandle('Clip Flow', { create: true });
        }
        rootFolderHandle = clipFlowFolder;
        document.getElementById('addProject').disabled = false;
        loadProjects();
    } catch(e) {
        alert('الموقع يحتاج الوصول لمجلد على جهازك للعمل.');
    }
});

// تحميل المشاريع الموجودة
async function loadProjects() {
    projects = [];
    const entries = rootFolderHandle.values();
    for await (const entry of entries) {
        if(entry.kind === 'directory') {
            const metaFile = await entry.getFileHandle('meta.json').catch(() => null);
            if(metaFile){
                const file = await metaFile.getFile();
                const text = await file.text();
                const data = JSON.parse(text);
                projects.push({ handle: entry, ...data });
            }
        }
    }
    // ترتيب المشاريع حسب التاريخ من الأحدث إلى الأقدم
    projects.sort((a,b) => new Date(b.date) - new Date(a.date));
    renderProjects();
}

// عرض المشاريع
function renderProjects() {
    const container = document.getElementById('projectsContainer');
    container.innerHTML = '';
    projects.forEach((p, index) => {
        const div = document.createElement('div');
        div.className = 'project';
        div.innerHTML = `
            <div class="project-header">
                ${p.thumbs && p.thumbs.length > 0 ? `<img src="${p.thumbs[0]}" class="thumb">` : ''}
                <div class="project-info">
                    <h3>${p.title}</h3>
                    <p>${p.description}</p>
                    <p>منصات: ${p.platforms.join(', ')}</p>
                    <p>تاريخ: ${p.date}</p>
                </div>
            </div>
            <button onclick="editProject(${index})">تعديل</button>
            <button onclick="deleteProject(${index})">حذف</button>
        `;
        container.appendChild(div);
    });
}

// إضافة مشروع جديد
document.getElementById('addProject').addEventListener('click', async () => {
    const videoFile = await window.showOpenFilePicker({ types: [{ description: 'MP4', accept: { 'video/mp4': ['.mp4'] } }] });
    if(!videoFile) return;
    const thumbsFiles = await window.showOpenFilePicker({ multiple: true, types: [{ description: 'Images', accept: { 'image/*': ['.png', '.jpg', '.jpeg'] } }] });
    
    const title = prompt('أدخل عنوان المشروع:');
    if(!title) return;
    const description = prompt('أدخل الوصف:') || '';
    const platforms = prompt('أدخل المنصات (مثال: YouTube, TikTok):')?.split(',').map(p=>p.trim()) || [];
    const date = prompt('أدخل التاريخ (مثال: 2026-03-20):') || new Date().toISOString();

    // إنشاء مجلد المشروع
    const projectFolder = await rootFolderHandle.getDirectoryHandle(title, { create: true });
    // نسخ الفيديو
    const videoHandle = videoFile[0];
    const videoData = await videoHandle.getFile();
    const videoArrayBuffer = await videoData.arrayBuffer();
    const videoWriteHandle = await projectFolder.getFileHandle(videoData.name, { create: true });
    const writable = await videoWriteHandle.createWritable();
    await writable.write(videoArrayBuffer);
    await writable.close();

    // نسخ الصور المصغرة
    let thumbs = [];
    for(let i=0; i<Math.min(3, thumbsFiles.length); i++){
        const thumbFile = thumbsFiles[i];
        const thumbData = await thumbFile.getFile();
        const thumbArrayBuffer = await thumbData.arrayBuffer();
        const thumbWriteHandle = await projectFolder.getFileHandle(thumbData.name, { create: true });
        const writableThumb = await thumbWriteHandle.createWritable();
        await writableThumb.write(thumbArrayBuffer);
        await writableThumb.close();
        thumbs.push(URL.createObjectURL(thumbData));
    }

    // إنشاء ملف meta.json
    const meta = { title, description, platforms, date, thumbs: thumbs.map(t => t) };
    const metaHandle = await projectFolder.getFileHandle('meta.json', { create: true });
    const metaWritable = await metaHandle.createWritable();
    await metaWritable.write(JSON.stringify(meta));
    await metaWritable.close();

    projects.push({ handle: projectFolder, ...meta });
    projects.sort((a,b) => new Date(b.date) - new Date(a.date));
    renderProjects();
});

// تعديل المشروع (مثال: تعديل الوصف فقط)
async function editProject(index) {
    const newDesc = prompt('عدل الوصف:', projects[index].description);
    if(newDesc === null) return;
    projects[index].description = newDesc;
    // تحديث meta.json
    const metaHandle = await projects[index].handle.getFileHandle('meta.json');
    const writable = await metaHandle.createWritable();
    await writable.write(JSON.stringify(projects[index]));
    await writable.close();
    renderProjects();
}

// حذف المشروع
async function deleteProject(index) {
    if(!confirm('هل أنت متأكد من حذف المشروع؟')) return;
    await projects[index].handle.removeEntry('meta.json').catch(()=>{});
    await rootFolderHandle.removeEntry(projects[index].handle.name, { recursive: true });
    projects.splice(index,1);
    renderProjects();
}

</script>

</body>
</html>
